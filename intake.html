<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>問診票 - あんど整骨院</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f4f8;min-height:100vh;}
.header{background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:white;padding:16px;text-align:center;}
.header h1{font-size:18px;font-weight:800;}
.header p{font-size:12px;opacity:0.75;margin-top:4px;}
.container{max-width:480px;margin:0 auto;padding:20px 16px;}
.card{background:white;border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.card-header{padding:12px 16px;font-size:13px;font-weight:700;color:white;}
.card-header.blue{background:#1e3a5f;}
.card-header.green{background:#059669;}
.card-header.orange{background:#d97706;}
.card-header.gray{background:#6b7280;}
.card-body{padding:14px 16px;}
.row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.row:last-child{border-bottom:none;}
.label{color:#9ca3af;font-size:12px;font-weight:600;min-width:90px;flex-shrink:0;}
.value{color:#1e3a5f;font-size:13px;font-weight:600;}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.badge-green{background:#dcfce7;color:#15803d;}
.badge-orange{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.btn-start{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#059669,#047857);color:white;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;text-align:center;margin-bottom:12px;text-decoration:none;}
.btn-back{display:block;width:100%;padding:12px;background:white;color:#666;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;}
.history-item{border-left:3px solid #d97706;background:#fffbeb;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.history-date{font-size:12px;color:#9ca3af;font-weight:600;margin-bottom:6px;}
.history-row{display:flex;gap:8px;margin-bottom:4px;}
.history-label{color:#9ca3af;font-size:11px;font-weight:600;min-width:70px;}
.history-value{color:#1e3a5f;font-size:12px;font-weight:600;}
.result-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.result-成約{background:#dcfce7;color:#15803d;}
.result-持ち帰り{background:#fef3c7;color:#92400e;}
.result-バツ{background:#fee2e2;color:#991b1b;}
.auth-wait{text-align:center;padding:60px 20px;color:#9ca3af;}
</style>
</head>
<body>
<div class="header">
  <h1>🩺 あんど整骨院 問診票</h1>
  <p>スタッフ専用ページ</p>
</div>
<div class="container" id="root">
  <div style="text-align:center;padding:60px 20px;color:#9ca3af;">読み込み中...</div>
</div>

<script>
const SUPABASE_URL = "https://dctlirxcwitcupaewiyt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjdGxpcnhjd2l0Y3VwYWV3aXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTI1NTgsImV4cCI6MjA5Nzk2ODU1OH0.ym1WINmz3W7T2HWvtzWkQcKs96RB5JU1JZL7EiMz704";
const STAFF = {1:"岩永",2:"大皿",3:"定井",4:"細永",5:"広川"};

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: window.sessionStorage, persistSession: true, autoRefreshToken: true }
});

async function getAuthToken(){
  const {data:{session}} = await supabaseClient.auth.getSession();
  return session ? session.access_token : SUPABASE_ANON_KEY;
}
async function sbGet(table, filter) {
  const token = await getAuthToken();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${filter||""}`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${token}` }
  });
  return res.json();
}

function resultBadge(result) {
  if (!result) return "—";
  return `<span class="result-badge result-${result}">${result === "成約" ? "✅" : result === "持ち帰り" ? "🤔" : "❌"} ${result}</span>`;
}

function jifeeText(t) {
  if (!t || t === "なし") return "なし";
  if (t.jifee_type === "回数券") return `回数券 ${t.jifee_count||""}枚 ${t.jifee_amount ? "¥"+Number(t.jifee_amount).toLocaleString() : ""}`;
  if (t.jifee_type === "FP（フリーパス）") return `FP ¥${t.jifee_amount ? Number(t.jifee_amount).toLocaleString() : "—"}`;
  return "なし";
}

async function load() {
  const root = document.getElementById('root');

  // ログイン確認（スタッフ専用ページのため必須）
  const {data:{session}} = await supabaseClient.auth.getSession();
  if (!session) {
    root.innerHTML = `
      <div class="auth-wait">
        <div style="font-size:40px;margin-bottom:12px;">🔒</div>
        <div style="font-weight:700;color:#374151;margin-bottom:10px;">ログインが必要です</div>
        <div style="font-size:13px;color:#9ca3af;margin-bottom:20px;">管理画面からログインした状態でこのページを開いてください。</div>
        <a href="/index.html" class="btn-back">管理画面へ</a>
      </div>`;
    return;
  }

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    root.innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444;">❌ 予約IDが指定されていません</div>';
    return;
  }

  try {
    const bookings = await sbGet("bookings", `?id=eq.${id}`);
    if (!bookings || bookings.length === 0) {
      root.innerHTML = '<div style="text-align:center;padding:60px;color:#ef4444;">❌ 予約が見つかりません</div>';
      return;
    }
    const b = bookings[0];
    const staffName = STAFF[b.staff_id] || '不明';

    const pastBookings = await sbGet("bookings", `?patient_name=eq.${encodeURIComponent(b.patient_name)}&id=neq.${id}&order=date.desc`);
    const pastIds = (pastBookings || []).map(pb => pb.id);

    let historyHtml = "";
    if (pastIds.length > 0) {
      const treatments = await sbGet("treatments", `?booking_id=in.(${pastIds.join(",")})&order=treated_at.desc&limit=5`);

      if (treatments && treatments.length > 0) {
        const items = treatments.map(t => {
          const pb = pastBookings.find(pb => pb.id === t.booking_id);
          const dateStr = pb ? pb.date : (t.treated_at ? t.treated_at.split("T")[0] : "—");
          const staffStr = pb ? (STAFF[pb.staff_id] || "不明") : "不明";
          return `
            <div class="history-item">
              <div class="history-date">📅 ${dateStr}　担当：${staffStr} 先生</div>
              <div class="history-row"><span class="history-label">施術種別</span><span class="history-value">${t.treatment_types || "—"}</span></div>
              <div class="history-row"><span class="history-label">施術部位</span><span class="history-value">${t.body_parts || "—"}</span></div>
              <div class="history-row"><span class="history-label">自費</span><span class="history-value">${jifeeText(t)}</span></div>
              <div class="history-row"><span class="history-label">結果</span><span class="history-value">${resultBadge(t.result)}</span></div>
              ${t.memo ? `<div class="history-row"><span class="history-label">メモ</span><span class="history-value">${t.memo}</span></div>` : ""}
            </div>
          `;
        }).join("");

        historyHtml = `
          <div class="card">
            <div class="card-header orange">📋 前回までの施術記録</div>
            <div class="card-body">${items}</div>
          </div>
        `;
      } else {
        historyHtml = `
          <div class="card">
            <div class="card-header gray">📋 前回までの施術記録</div>
            <div class="card-body" style="text-align:center;color:#9ca3af;padding:16px;">施術記録なし（初回）</div>
          </div>
        `;
      }
    } else {
      historyHtml = `
        <div class="card">
          <div class="card-header gray">📋 前回までの施術記録</div>
          <div class="card-body" style="text-align:center;color:#9ca3af;padding:16px;">施術記録なし（初回）</div>
        </div>
      `;
    }

    root.innerHTML = `
      <div class="card">
        <div class="card-header blue">📅 予約情報</div>
        <div class="card-body">
          <div class="row"><span class="label">患者名</span><span class="value">${b.patient_name} 様</span></div>
          <div class="row"><span class="label">電話番号</span><span class="value">${b.phone || '—'}</span></div>
          <div class="row"><span class="label">日時</span><span class="value">${b.date} ${b.time}</span></div>
          <div class="row"><span class="label">メニュー</span><span class="value">${b.menu}</span></div>
          <div class="row"><span class="label">担当</span><span class="value">${staffName} 先生</span></div>
          <div class="row"><span class="label">LINE</span><span class="value">${b.line_user_id ? '<span class="badge badge-green">✅ 連携済み</span>' : '未連携'}</span></div>
        </div>
      </div>

      ${(b.body_parts || b.injury_cause || b.pain_when) ? `
      <div class="card">
        <div class="card-header green">🩺 問診情報</div>
        <div class="card-body">
          ${b.body_parts ? `<div class="row"><span class="label">負傷部位</span><span class="value">${b.body_parts}</span></div>` : ''}
          ${b.injury_cause ? `<div class="row"><span class="label">負傷原因</span><span class="value">${b.injury_cause}</span></div>` : ''}
          ${b.pain_when ? `<div class="row"><span class="label">いつから</span><span class="value">${b.pain_when}</span></div>` : ''}
          ${b.pain_level ? `<div class="row"><span class="label">痛みの強さ</span><span class="value">${b.pain_level} / 10</span></div>` : ''}
          ${b.symptoms ? `<div class="row"><span class="label">症状</span><span class="value">${b.symptoms}</span></div>` : ''}
          ${b.other_clinic ? `<div class="row"><span class="label">他院受診</span><span class="value">${b.other_clinic}</span></div>` : ''}
          ${b.medical_history ? `<div class="row"><span class="label">既往歴</span><span class="value">${b.medical_history}</span></div>` : ''}
          ${b.want_continue ? `<div class="row"><span class="label">継続意思</span><span class="value">${b.want_continue}</span></div>` : ''}
          ${b.how_know ? `<div class="row"><span class="label">来院経路</span><span class="value">${b.how_know}</span></div>` : ''}
        </div>
      </div>` : ''}

      ${historyHtml}

      <a href="/treatment.html?id=${id}" class="btn-start">⚕️ 施術を開始する →</a>
      <a href="/index.html" class="btn-back">← 管理画面へ戻る</a>
      <div style="height:24px;"></div>
    `;
  } catch(e) {
    root.innerHTML = `<div style="text-align:center;padding:60px;color:#ef4444;">❌ 読み込みエラー：${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
