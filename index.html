// ===== 店舗管理パネル =====
function StoreMgmtPanel(){
  const [stores,setStores]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [editId,setEditId]=React.useState(null); // null=一覧, "new"=新規, number=編集
  const [form,setForm]=React.useState({name:"",address:"",tel:"",email:"",memo:""});
  const [saving,setSaving]=React.useState(false);
  const [toast,setToast]=React.useState("");
  const [searchQ,setSearchQ]=React.useState("");

  React.useEffect(()=>{loadStores();},[]);

  async function loadStores(){
    setLoading(true);
    try{
      const data=await sb.select("stores","?order=id.asc");
      setStores(Array.isArray(data)?data:[]);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}

  function openNew(){
    setForm({name:"",address:"",tel:"",email:"",memo:""});
    setEditId("new");
  }

  function openEdit(store){
    setForm({name:store.name||"",address:store.address||"",tel:store.tel||"",email:store.email||"",memo:store.memo||""});
    setEditId(store.id);
  }

  async function saveStore(){
    if(!form.name.trim()){alert("店舗名を入力してください");return;}
    setSaving(true);
    try{
      if(editId==="new"){
        const result=await sb.insert("stores",{name:form.name,address:form.address,tel:form.tel,email:form.email,memo:form.memo,active:true});
        if(Array.isArray(result)&&result.length>0) setStores(prev=>[...prev,result[0]]);
        showToast("店舗を追加しました");
      }else{
        await sb.update("stores",editId,{name:form.name,address:form.address,tel:form.tel,email:form.email,memo:form.memo});
        setStores(prev=>prev.map(s=>s.id===editId?{...s,...form}:s));
        showToast("店舗情報を更新しました");
      }
      setEditId(null);
      loadStores();
    }catch(e){alert("保存に失敗しました："+e.message);}
    setSaving(false);
  }

  async function toggleActive(store){
    try{
      await sb.update("stores",store.id,{active:!store.active});
      setStores(prev=>prev.map(s=>s.id===store.id?{...s,active:!s.active}:s));
      showToast(store.active?"店舗を無効にしました":"店舗を有効にしました");
    }catch(e){alert("更新に失敗しました");}
  }

  const filtered=stores.filter(s=>!searchQ||(s.name&&s.name.includes(searchQ))||(s.address&&s.address.includes(searchQ)));

  if(editId!==null){
    return(
      <div style={{maxWidth:600,margin:"0 auto"}}>
        {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",fontSize:13,display:"flex",alignItems:"center",gap:4,fontFamily:"inherit"}}>← 一覧に戻る</button>
          <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>{editId==="new"?"店舗を追加":"店舗情報を編集"}</div>
        </div>
        <div style={{background:"white",borderRadius:12,padding:"20px",boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
          {[
            {label:"店舗名 *",key:"name",placeholder:"例：あんど整骨院 香里園駅前院",type:"text"},
            {label:"住所",key:"address",placeholder:"例：大阪府寝屋川市香里園駅前",type:"text"},
            {label:"電話番号",key:"tel",placeholder:"例：072-000-0000",type:"tel"},
            {label:"メールアドレス",key:"email",placeholder:"例：info@ando.jp",type:"email"},
          ].map(f=>(
            <div key={f.key} style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>{f.label}</label>
              <input type={f.type} value={form[f.key]} placeholder={f.placeholder}
                onChange={e=>setForm(prev=>({...prev,[f.key]:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
            </div>
          ))}
          <div style={{marginBottom:20}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>メモ</label>
            <textarea value={form.memo} placeholder="運営会社・備考など" rows={3}
              onChange={e=>setForm(prev=>({...prev,memo:e.target.value}))}
              style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"none"}}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setEditId(null)} style={{flex:1,padding:"11px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>キャンセル</button>
            <button onClick={saveStore} disabled={saving} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",opacity:saving?0.7:1}}>
              {saving?"保存中...":"💾 保存する"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{maxWidth:800,margin:"0 auto"}}>
      {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}

      {/* ヘッダー */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>店舗管理</div>
        <button onClick={openNew} style={{padding:"9px 18px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 6px rgba(37,99,235,.3)"}}>
          + 店舗を追加
        </button>
      </div>

      {/* 検索 */}
      <div style={{background:"white",borderRadius:10,padding:"12px 14px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
        <input placeholder="店舗名・住所で検索" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          style={{width:"100%",padding:"8px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontFamily:"inherit"}}/>
      </div>

      {/* 店舗一覧 */}
      {loading?(
        <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>読み込み中...</div>
      ):filtered.length===0?(
        <div style={{background:"white",borderRadius:12,padding:40,textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{fontSize:32,marginBottom:12}}>🏥</div>
          <div style={{fontWeight:700,color:"#374151",marginBottom:6}}>店舗が登録されていません</div>
          <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>「店舗を追加」ボタンから登録してください</div>

          <div style={{background:store.active?"linear-gradient(135deg,#1e3a5f,#2d6a9f)":"#9ca3af",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontWeight:800,fontSize:15,color:"white"}}>{store.name}</div>
            <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:12,background:store.active?"rgba(255,255,255,.2)":"rgba(0,0,0,.2)",color:"white"}}>

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14,textAlign:"center"}}>

            {store.tel&&<div style={{fontSize:13,color:"#64748b",marginBottom:10}}>📞 {store.tel}</div>}
            {store.email&&<div style={{fontSize:13,color:"#64748b",marginBottom:10}}>✉️ {store.email}</div>}
            {store.memo&&<div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>📝 {store.memo}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>openEdit(store)} style={{flex:2,padding:"9px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>

          </div>
        </div>
      ))}
    </div>
  );
}

// ===== 患者管理パネル =====
function PatientsPanel({bookings,setView,setForm,setEditId,setConflict,todayStr}){
  const [patientQ,setPatientQ]=React.useState("");
  const [selPatient,setSelPatient]=React.useState(null);
  const [activeTab,setActiveTab]=React.useState("intake");
  const [treatments,setTreatments]=React.useState([]);
  const [loadingDetail,setLoadingDetail]=React.useState(false);
  const [editMode,setEditMode]=React.useState(false);
  const [editForm,setEditForm]=React.useState({name:"",phone:"",address:""});

  const GOJUON=[
    {label:"あ行",chars:["あ","い","う","え","お","ア","イ","ウ","エ","オ"]},
    {label:"か行",chars:["か","き","く","け","こ","カ","キ","ク","ケ","コ"]},
    {label:"さ行",chars:["さ","し","す","せ","そ","サ","シ","ス","セ","ソ"]},
    {label:"た行",chars:["た","ち","つ","て","と","タ","チ","ツ","テ","ト"]},
    {label:"な行",chars:["な","に","ぬ","ね","の","ナ","ニ","ヌ","ネ","ノ"]},
    {label:"は行",chars:["は","ひ","ふ","へ","ほ","ハ","ヒ","フ","ヘ","ホ"]},
    {label:"ま行",chars:["ま","み","む","め","も","マ","ミ","ム","メ","モ"]},
    {label:"や行",chars:["や","ゆ","よ","ヤ","ユ","ヨ"]},
    {label:"ら行",chars:["ら","り","る","れ","ろ","ラ","リ","ル","レ","ロ"]},
    {label:"わ行",chars:["わ","を","ん","ワ","ヲ","ン"]},
    {label:"英数",chars:[]},
  ];

  function getGroup(name){
    if(!name) return "英数";
    const first=name.charAt(0);
    for(const g of GOJUON){
      if(g.label==="英数") continue;
      if(g.chars.includes(first)) return g.label;
    }
    return "英数";
  }

  const pm={};
  bookings.forEach(b=>{
    if(!pm[b.patient_name])pm[b.patient_name]={name:b.patient_name,phone:b.phone,count:0,lastDate:"",lastStaff:null};
    pm[b.patient_name].count++;
    if(b.date>pm[b.patient_name].lastDate){pm[b.patient_name].lastDate=b.date;pm[b.patient_name].lastStaff=b.staff_id;}
  });
  const allPatients=Object.values(pm);

  const q=patientQ.trim().toLowerCase();
  const filtered=allPatients.filter(p=>{
    if(!q) return true;
    return p.name.toLowerCase().includes(q)||(p.phone&&p.phone.replace(/-/g,"").includes(q.replace(/-/g,"")));
  });
  const sorted=[...filtered].sort((a,b)=>a.name.localeCompare(b.name,"ja"));
  const isSearching=q.length>0;
  const groups={};
  if(!isSearching){
    GOJUON.forEach(g=>{groups[g.label]=[];});
    sorted.forEach(p=>{const g=getGroup(p.name);if(groups[g])groups[g].push(p);else groups["英数"].push(p);});
  }

  // 患者選択時に施術録を取得
  async function selectPatient(name){
    setSelPatient(name);
    setActiveTab("intake");
    setLoadingDetail(true);
    const patientBks=bookings.filter(b=>b.patient_name===name);
    if(patientBks.length>0){
      const ids=patientBks.map(b=>b.id).join(",");
      const data=await sb.select("treatments",`?booking_id=in.(${ids})&order=treated_at.desc`);
      setTreatments(Array.isArray(data)?data:[]);
    }else{setTreatments([]);}
    setLoadingDetail(false);
  }

  // 選択中患者の情報
  const selBks=selPatient?bookings.filter(b=>b.patient_name===selPatient).sort((a,b)=>b.date.localeCompare(a.date)):[];
  const firstBk=selBks.length>0?selBks[selBks.length-1]:null;

  function openEdit(){
    if(!firstBk) return;
    setEditForm({name:firstBk.patient_name||"",phone:firstBk.phone||"",address:firstBk.address||""});
    setEditMode(true);
  }

  async function saveEdit(){
    if(!editForm.name.trim()) return;
    try{
      const bkIds=selBks.map(b=>b.id);
      for(const id of bkIds){
        await sb.update("bookings",id,{patient_name:editForm.name,phone:editForm.phone,address:editForm.address});
      }
      setEditMode(false);
      selectPatient(editForm.name);
    }catch(e){alert("更新に失敗しました");}
  }

  function resultBadge(r){
    if(!r) return null;
    const map={"成約":["badge-green","✅ 成約"],"持ち帰り":["badge-yellow","🤔 持ち帰り"],"バツ":["badge-red","❌ バツ"]};
    const[cls,label]=map[r]||["badge-gray",r];
    return <span className={`badge ${cls}`}>{label}</span>;
  }

  const TABS=[
    {id:"intake",label:"問診票"},
    {id:"treatments",label:`施術録（${treatments.length}件）`},
    {id:"history",label:`来院履歴（${selBks.length}回）`},
  ];

  return(
    <div style={{display:"flex",gap:14,height:"calc(100vh - 120px)",minHeight:600}}>

      {/* 左：患者リスト */}
      <div style={{width:300,flexShrink:0,display:"flex",flexDirection:"column",gap:10}}>
        {/* 検索 */}
        <div style={{background:"white",borderRadius:12,padding:"10px 14px",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#94a3b8",pointerEvents:"none"}}>🔍</span>
            <input className="form-input" placeholder="患者名・電話番号で検索..."
              value={patientQ} onChange={e=>setPatientQ(e.target.value)}
              style={{paddingLeft:32,paddingRight:patientQ?32:12,fontSize:13}}/>
            {patientQ&&<button onClick={()=>setPatientQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"#e2e8f0",border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:11,color:"#64748b",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
          </div>
          <div style={{fontSize:12,color:"#64748b",marginTop:6,fontWeight:600}}>{isSearching?`${sorted.length}名`:`患者数：${allPatients.length}名`}</div>
        </div>

        {/* 患者リスト */}
        <div style={{flex:1,overflowY:"auto"}}>
          {isSearching?(
            sorted.length===0?(
              <div style={{textAlign:"center",padding:30,color:"#94a3b8",fontSize:13}}>該当なし</div>
            ):sorted.map(p=>{
              const s=STAFF_ACCOUNTS.find(x=>x.id===p.lastStaff)||{color:"#888",initial:"？"};
              const isSel=selPatient===p.name;
              return(
                <div key={p.name} onClick={()=>selectPatient(p.name)}
                  style={{background:isSel?"#eff6ff":"white",borderRadius:10,marginBottom:6,padding:"10px 14px",cursor:"pointer",border:`1.5px solid ${isSel?"#2563eb":"#e2e8f0"}`,boxShadow:isSel?"0 2px 8px rgba(37,99,235,.15)":"0 1px 3px rgba(0,0,0,.04)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${s.color},${s.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:14,flexShrink:0}}>{p.name.charAt(0)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                        <span style={{fontWeight:800,fontSize:13,color:isSel?"#2563eb":"#1e293b"}}>{p.name}</span>
                        {p.count>=2?<span className="badge badge-yellow" style={{fontSize:9}}>{p.count}回</span>:<span className="badge badge-gray" style={{fontSize:9}}>初回</span>}
                      </div>
                      <div style={{fontSize:10,color:"#64748b"}}>最終：{p.lastDate}</div>
                      {p.phone&&<div style={{fontSize:10,color:"#94a3b8"}}>{p.phone}</div>}
                    </div>
                    {isSel&&<span style={{color:"#2563eb",fontSize:16}}>›</span>}
                  </div>
                </div>
              );
            })
          ):(
            GOJUON.map(g=>{
              const patients=groups[g.label]||[];
              if(patients.length===0) return null;
              return(
                <div key={g.label} style={{marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div style={{padding:"2px 10px",borderRadius:20,fontWeight:800,fontSize:11,background:"#1e3a5f",color:"white"}}>{g.label}</div>
                    <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
                    <span style={{fontSize:10,color:"#94a3b8"}}>{patients.length}名</span>
                  </div>
                  {patients.map(p=>{
                    const s=STAFF_ACCOUNTS.find(x=>x.id===p.lastStaff)||{color:"#888",initial:"？"};
                    const isSel=selPatient===p.name;
                    return(
                      <div key={p.name} onClick={()=>selectPatient(p.name)}

// ===== シフト・休日管理パネル =====
function ShiftPanel({currentUser}){
  const today=new Date();
  const [selMonth,setSelMonth]=React.useState(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`);
  const [shifts,setShifts]=React.useState({});
  const [holidays,setHolidays]=React.useState({});
  const [toast,setToast]=React.useState("");
  const [editHoliday,setEditHoliday]=React.useState(null);
  // 一括設定
  const [bulkTarget,setBulkTarget]=React.useState("all"); // "all" | staffId
  const [bulkType,setBulkType]=React.useState("出勤");
  const [bulkDayTypes,setBulkDayTypes]=React.useState(["平日"]); // 平日/土/日/全て
  const [editingCell,setEditingCell]=React.useState(null); // "staffId_date"

  const SHIFT_TYPES=["出勤","休み","有休","振替","祝振替"];
  const SHIFT_COLORS={"出勤":"#2563eb","休み":"#9ca3af","有休":"#059669","振替":"#d97706","祝振替":"#7c3aed"};
  const SHIFT_ABBR={"出勤":"勤","休み":"休","有休":"有","振替":"振","祝振替":"祝"};

  const [y,m]=selMonth.split("-").map(Number);
  const lastDay=new Date(y,m,0);
  const daysInMonth=lastDay.getDate();
  const dates=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(y,m-1,i+1);
    return {date:`${y}-${String(m).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`,day:d.getDay(),label:i+1};
  });
  const DAYS_JP=["日","月","火","水","木","金","土"];

  React.useEffect(()=>{
    try{
      const s=localStorage.getItem(`shifts_${selMonth}`);
      if(s) setShifts(JSON.parse(s));
      else setShifts({});
      const h=localStorage.getItem("holiday_balance");
      if(h) setHolidays(JSON.parse(h));
      else{const init={};STAFF_ACCOUNTS.forEach(s=>{init[s.id]={有休残:10,振替残:0,祝振替残:0};});setHolidays(init);}
    }catch{}
  },[selMonth]);

  function save(){
    try{
      localStorage.setItem(`shifts_${selMonth}`,JSON.stringify(shifts));
      localStorage.setItem("holiday_balance",JSON.stringify(holidays));
      setToast("保存しました");setTimeout(()=>setToast(""),2000);
    }catch{setToast("エラー");}
  }

  // セル個別変更（プルダウン）
  function setShiftCell(staffId,date,val){
    const key=`${staffId}_${date}`;
    const cur=shifts[key]||"出勤";
    const newH={...holidays};
    if(!newH[staffId]) newH[staffId]={有休残:10,振替残:0,祝振替残:0};
    // 旧値の残高を戻す
    if(cur==="有休") newH[staffId].有休残=(newH[staffId].有休残||0)+1;
    if(cur==="振替") newH[staffId].振替残=(newH[staffId].振替残||0)+1;
    if(cur==="祝振替") newH[staffId].祝振替残=(newH[staffId].祝振替残||0)+1;
    // 新値の残高を減らす
    if(val==="有休") newH[staffId].有休残=Math.max(0,(newH[staffId].有休残||0)-1);
    if(val==="振替") newH[staffId].振替残=Math.max(0,(newH[staffId].振替残||0)-1);
    if(val==="祝振替") newH[staffId].祝振替残=Math.max(0,(newH[staffId].祝振替残||0)-1);
    setHolidays(newH);
    setShifts(prev=>({...prev,[key]:val}));
    setEditingCell(null);
  }

  // 一括設定適用
  function applyBulk(){
    const staffIds=bulkTarget==="all"?STAFF_ACCOUNTS.map(s=>s.id):[parseInt(bulkTarget)];
    const newShifts={...shifts};
    const newH={...holidays};
    dates.forEach(({date,day})=>{
      const isSun=day===0,isSat=day===6,isWeekday=day!==0&&day!==6;
      const match=(bulkDayTypes.includes("全て"))||(bulkDayTypes.includes("平日")&&isWeekday)||(bulkDayTypes.includes("土")&&isSat)||(bulkDayTypes.includes("日")&&isSun);
      if(!match) return;
      staffIds.forEach(sid=>{
        const key=`${sid}_${date}`;
        const cur=newShifts[key]||"出勤";
        if(!newH[sid]) newH[sid]={有休残:10,振替残:0,祝振替残:0};
        if(cur==="有休") newH[sid].有休残=(newH[sid].有休残||0)+1;
        if(cur==="振替") newH[sid].振替残=(newH[sid].振替残||0)+1;
        if(cur==="祝振替") newH[sid].祝振替残=(newH[sid].祝振替残||0)+1;
        if(bulkType==="有休") newH[sid].有休残=Math.max(0,(newH[sid].有休残||0)-1);
        if(bulkType==="振替") newH[sid].振替残=Math.max(0,(newH[sid].振替残||0)-1);
        if(bulkType==="祝振替") newH[sid].祝振替残=Math.max(0,(newH[sid].祝振替残||0)-1);
        newShifts[key]=bulkType;
      });
    });
    setShifts(newShifts);setHolidays(newH);
    setToast(`一括設定しました（${bulkTarget==="all"?"全員":STAFF_ACCOUNTS.find(s=>s.id===parseInt(bulkTarget))?.name}・${bulkDayTypes.join("/")}・${bulkType}）`);
    setTimeout(()=>setToast(""),3000);
  }

  function updateBalance(staffId,key,val){
    setHolidays(prev=>({...prev,[staffId]:{...(prev[staffId]||{}), [key]:Math.max(0,parseInt(val)||0)}}));
  }

  function calcMonthSummary(staffId){
    const result={出勤:0,休み:0,有休:0,振替:0,祝振替:0};
    dates.forEach(({date})=>{const key=`${staffId}_${date}`;const v=shifts[key]||"出勤";result[v]=(result[v]||0)+1;});
    return result;
  }

  const toggleBulkDayType=(t)=>setBulkDayTypes(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);

  return(
    <div>
      {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}

      {/* ヘッダー */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>シフト・休日管理</div>
        <input type="month" value={selMonth} onChange={e=>setSelMonth(e.target.value)}
          style={{padding:"6px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:700}}/>
        <button onClick={save} className="btn btn-primary btn-sm" style={{marginLeft:"auto"}}>💾 保存する</button>
      </div>

      {/* 一括設定カード */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:13,color:"#1e3a5f"}}>⚡ 一括設定</div>
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {/* 対象スタッフ */}
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6}}>対象スタッフ</div>
              <select value={bulkTarget} onChange={e=>setBulkTarget(e.target.value)}
                style={{width:"100%",padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontFamily:"inherit"}}>
                <option value="all">🏥 院全体（全員）</option>
                {STAFF_ACCOUNTS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            {/* シフト種別 */}

// ===== 来院受付パネル（QRコード読み取り） =====
function CheckInPanel({bookings,onOpenPatient}){
  const videoRef=React.useRef(null);
  const canvasRef=React.useRef(null);
  const streamRef=React.useRef(null);
  const rafRef=React.useRef(null);
  const scanningRef=React.useRef(true);

  const [cameraError,setCameraError]=React.useState("");
  const [result,setResult]=React.useState(null); // {booking, isNew, visitCount}
  const [checkingIn,setCheckingIn]=React.useState(false);
  const [manualId,setManualId]=React.useState("");

  function stopCamera(){
    if(streamRef.current){
      streamRef.current.getTracks().forEach(t=>t.stop());
      streamRef.current=null;
    }
    if(rafRef.current){
      cancelAnimationFrame(rafRef.current);
      rafRef.current=null;
    }
  }

  function extractBookingId(text){
    try{
      const u=new URL(text);
      const id=u.searchParams.get("id");
      return id||null;
    }catch(e){
      if(/^\d+$/.test(text.trim())) return text.trim();
      return null;
    }
  }

  async function handleDecoded(text){
    if(!scanningRef.current) return;
    const id=extractBookingId(text);
    if(!id){
      setCameraError("QRコードの内容を読み取れませんでした（予約IDが見つかりません）");
      return;
    }
    scanningRef.current=false;
    stopCamera();
    await lookupAndCheckIn(id);
  }

  async function lookupAndCheckIn(id){
    setCheckingIn(true);
    setCameraError("");
    try{
      const found=await sb.select("bookings",`?id=eq.${id}`);
      const booking=Array.isArray(found)&&found.length>0?found[0]:null;
      if(!booking){
        setCameraError("予約が見つかりませんでした（QRコードが古い可能性があります）");
        setCheckingIn(false);
        return;
      }
      const patientBookings=bookings.filter(b=>b.patient_name===booking.patient_name);
      const isNew=patientBookings.length<=1;

      try{
        await sb.update("bookings",booking.id,{checked_in_at:new Date().toISOString()});
      }catch(e){/* 列が無い場合などは無視 */}

      setResult({booking,isNew,visitCount:patientBookings.length});
      setCheckingIn(false);

      if(isNew){
        window.open(`intake.html?id=${booking.id}`,"_blank");
      }
    }catch(e){
      setCameraError("読み取り処理に失敗しました："+e.message);
      setCheckingIn(false);
    }
  }

  function resetScan(){
    setResult(null);
    setCameraError("");
    scanningRef.current=true;
    startCamera();
  }

  function startCamera(){
    if(!window.jsQR){
      setCameraError("QR読み取りライブラリの読み込みに失敗しました。ページを再読み込みしてください。");
      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
      .then(stream=>{
        streamRef.current=stream;
        if(videoRef.current){
          videoRef.current.srcObject=stream;
          videoRef.current.play();
        }
        tick();
      })
      .catch(e=>{
        setCameraError("カメラを起動できませんでした。ブラウザの設定でカメラへのアクセスを許可してください。");
      });
  }

  function tick(){
    if(!scanningRef.current){return;}
    const video=videoRef.current,canvas=canvasRef.current;
    if(video&&canvas&&video.readyState===video.HAVE_ENOUGH_DATA){
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=window.jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:"dontInvert"});
      if(code&&code.data){
        handleDecoded(code.data);
        return;
      }
    }
    rafRef.current=requestAnimationFrame(tick);
  }

  React.useEffect(()=>{
    startCamera();
    return ()=>{stopCamera();};
  },[]);

  function submitManualId(){
    if(!manualId.trim()) return;
    scanningRef.current=false;
    stopCamera();
    lookupAndCheckIn(manualId.trim());
  }

  const staff=result?STAFF_ACCOUNTS.find(s=>s.id===result.booking.staff_id):null;

  return(
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-header blue">📷 来院受付（QRコード読み取り）</div>
        <div className="card-body">
          {!result&&(
            <div>
              <div style={{position:"relative",borderRadius:12,overflow:"hidden",background:"#000",aspectRatio:"1/1",maxHeight:360}}>
                <video ref={videoRef} playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                <canvas ref={canvasRef} style={{display:"none"}}/>
                {checkingIn&&(
                  <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700}}>
                    確認中...
                  </div>
                )}
              </div>
              <div style={{fontSize:12,color:"#94a3b8",marginTop:10,textAlign:"center"}}>
                患者様のLINEに届いたQRコードを、カメラに映してください
              </div>
              {cameraError&&(
                <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:8,padding:"10px 14px",marginTop:12,color:"#dc2626",fontSize:13,fontWeight:700}}>
                  ⚠ {cameraError}
                </div>
              )}
              <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid #f1f5f9"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6}}>カメラが使えない場合：予約IDを直接入力</div>
                <div style={{display:"flex",gap:8}}>
                  <input className="form-input" value={manualId} onChange={e=>setManualId(e.target.value)} placeholder="予約ID"/>
                  <button className="btn btn-outline" onClick={submitManualId}>確認</button>
                </div>
              </div>
            </div>
          )}

          {result&&(
            <div>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:40,marginBottom:8}}>{result.isNew?"📋":"✅"}</div>
                <div style={{fontWeight:800,fontSize:17,color:"#1e3a5f"}}>{result.isNew?"初回の患者様です":"来院受付が完了しました"}</div>
                {result.isNew&&<div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>問診票を別タブで開きました</div>}
              </div>
              <div style={{background:"#f8fafc",borderRadius:10,padding:"14px 16px",border:"1px solid #e2e8f0",marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>患者名</span>
                  <span style={{fontSize:14,fontWeight:800,color:"#1e293b"}}>{result.booking.patient_name} 様</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>本日の予約</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#1e293b"}}>{result.booking.date} {result.booking.time}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>担当</span>
                  <span style={{fontSize:14,fontWeight:700,color:staff?staff.color:"#1e293b"}}>{staff?staff.name:"—"}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"6px 0"}}>
                  <span style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>メニュー</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#1e293b"}}>{result.booking.menu}</span>
                </div>
              </div>
              <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginBottom:14}}>来院{result.visitCount}回目</div>
              <button className="btn btn-primary" style={{width:"100%",justifyContent:"center"}} onClick={resetScan}>次の患者様を受付する</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                      </div>

          );
        })}
      </div>
    </div>
  );
}

                    const isToday=dStr===todayStr;
                    const isSun=d.getDay()===0,isSat=d.getDay()===6;
                    const cnt=bookings.filter(b=>b.date===dStr).length;
                    return(
                      <button key={dStr} onClick={()=>setBaseDate(new Date(dStr+"T00:00:00"))}
                        style={{flex:1,minWidth:72,padding:"6px 4px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:800,fontSize:12,textAlign:"center",transition:"all .15s",
                          background:isToday?"#d97706":isSelected?"rgba(255,255,255,.3)":"rgba(255,255,255,.1)",
                          color:"white",boxShadow:isToday?"0 2px 8px rgba(217,119,6,.5)":"none"}}>
                        <div style={{color:isSun?"#fca5a5":isSat?"#c4b5fd":"white"}}>{d.getMonth()+1}/{d.getDate()}({DAYS_JP[d.getDay()]})</div>
                        {cnt>0&&<div style={{fontSize:10,opacity:.8,marginTop:1}}>{cnt}件</div>}
                        {isToday&&<div style={{fontSize:9,fontWeight:700,marginTop:1}}>今日</div>}
                      </button>
                    );
                  })}
                  <button onClick={nextWeek} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",borderRadius:8,width:32,height:32,cursor:"pointer",fontWeight:800,fontSize:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>
                </div>}

                {/* 日付ピッカー */}
                {(!selStaff||weekViewMode==="calendar")&&<div style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,background:"#f8fafc"}}>
                  <span style={{fontSize:13,fontWeight:800,color:"#1e3a5f"}}>{baseDate.getFullYear()}年{baseDate.getMonth()+1}月{baseDate.getDate()}日（{DAYS_JP[baseDate.getDay()]}）</span>
                  {ds!==todayStr&&<button className="btn btn-outline btn-xs" onClick={()=>setBaseDate(new Date())}>今日</button>}
                  <input type="date" value={ds} onChange={e=>{if(e.target.value)setBaseDate(new Date(e.target.value+"T00:00:00"));}}
                    style={{marginLeft:"auto",padding:"3px 8px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:12,color:"#374151",cursor:"pointer"}}/>
                </div>}

                {(!selStaff||weekViewMode==="calendar")&&<div style={{overflowX:"auto"}}>
                  <div style={{minWidth:HEADER_W+TOTAL_MINS*CELL_W+20}}>

                    {/* 時間ヘッダー（固定） */}
                    <div style={{display:"flex",borderBottom:"2px solid #e2e8f0",background:"#f8fafc",position:"sticky",top:0,zIndex:10}}>
                      <div style={{width:HEADER_W,flexShrink:0,padding:"5px 8px",fontWeight:700,fontSize:11,color:"#64748b",borderRight:"1px solid #e2e8f0"}}>スタッフ</div>
                      <div style={{position:"relative",height:24,flex:1}}>
                        {MINS.filter((_,i)=>i%3===0).map(({h,m,label})=>(
                          <div key={label} style={{position:"absolute",left:(h-9)*60/10*CELL_W+m/10*CELL_W,top:0,height:"100%",borderLeft:"1px solid #e2e8f0",paddingLeft:2,display:"flex",alignItems:"center"}}>
                            <span style={{fontSize:9,fontWeight:600,color:"#94a3b8",whiteSpace:"nowrap"}}>{label}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 7日分ループ */}
                    {weekDates.map(wd=>{
                      const wdStr=fmtDate(wd);
                      const isToday=wdStr===todayStr;
                      const isSun=wd.getDay()===0,isSat=wd.getDay()===6;
                      const dayBookings=bookings.filter(b=>b.date===wdStr);
                      const dayColor=isSun?"#ef4444":isSat?"#7c3aed":"#1e293b";

                      // 対応可能・予約数（その日の）
                      const daySlots30=[];
                      for(let h=9;h<=18;h++){
                        for(let m=0;m<60;m+=30){
                          if(h===18&&m>0) break;
                          const label=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
                          const booked=dayBookings.filter(b=>b.time===label).length;
                          const resting=breaks.filter(b=>b.date===wdStr&&b.time===label).length;
                          const available=Math.max(0,filteredStaff.length-resting);
                          daySlots30.push({label,booked,available,x:(h-9)*60/10*CELL_W+m/10*CELL_W,w:30/10*CELL_W});
                        }
                      }

                      return(
                        <div key={wdStr}>
                          {/* 日付ヘッダー行 */}
                          <div style={{display:"flex",background:isToday?"#1e3a5f":isSun?"#fff1f2":isSat?"#faf5ff":"#f1f5f9",borderBottom:"1px solid #e2e8f0",borderTop:"2px solid #e2e8f0"}}>
                            <div style={{width:HEADER_W,flexShrink:0,padding:"5px 8px",borderRight:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontWeight:800,fontSize:12,color:isToday?"white":dayColor}}>
                                {wd.getMonth()+1}/{wd.getDate()}({DAYS_JP[wd.getDay()]})
                              </span>
                              {isToday&&<span style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,.8)"}}>今日</span>}
                            </div>
                            {/* 対応可能・予約数 */}
                            <div style={{position:"relative",flex:1,height:22}}>
                              {daySlots30.map(slot=>(
                                <div key={slot.label} style={{position:"absolute",left:slot.x,top:0,width:slot.w-1,height:"100%",display:"flex",borderRight:"1px solid rgba(0,0,0,.05)"}}>
                                  <div style={{flex:1,background:"rgba(37,99,235,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,fontWeight:800,color:"#2563eb"}}>{slot.available}</span></div>
                                  <div style={{flex:1,background:"rgba(5,150,105,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,fontWeight:800,color:"#059669"}}>{slot.booked}</span></div>
                                </div>
                              ))}
                            </div>
                          </div>

                          {/* スタッフ行 */}
                          {filteredStaff.map(staff=>{
                            const staffBookings=dayBookings.filter(b=>b.staff_id===staff.id);
                            const staffBreaks=breaks.filter(b=>b.date===wdStr&&b.staff_id===staff.id);
                            return(
                              <div key={staff.id} style={{display:"flex",borderBottom:"1px solid #f1f5f9",minHeight:48}}>
                                <div style={{width:HEADER_W,flexShrink:0,padding:"4px 8px",borderRight:"1px solid #e2e8f0",background:"#fafbfc",display:"flex",alignItems:"center",gap:5}}>
                                  <div style={{width:22,height:22,borderRadius:6,background:`linear-gradient(135deg,${staff.color},${staff.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:10,flexShrink:0}}>{staff.initial}</div>
                                  <div>
                                    <div style={{fontWeight:700,fontSize:10,color:"#1e293b",lineHeight:1.2}}>{staff.name}</div>
                                    <div style={{fontSize:9,color:staff.color,fontWeight:700}}>{staffBookings.length}件</div>
                                  </div>
                                </div>
                                <div style={{position:"relative",flex:1,minHeight:48,cursor:"pointer",background:isToday?"#fafeff":"white"}}
                                  onClick={e=>{
                                    const rect=e.currentTarget.getBoundingClientRect();
                                    const x=e.clientX-rect.left;
                                    const totalMinFromStart=Math.round(x/CELL_W)*10;
                                    const h=9+Math.floor(totalMinFromStart/60);
                                    const m=totalMinFromStart%60;
                                    if(h>=9&&h<=17){openAdd(wdStr,`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);setForm(f=>f?{...f,staff_id:staff.id}:f);}
                                  }}>
                                  {MINS.filter((_,i)=>i%3===0).map(({h,m,label})=>(
                                    <div key={label} style={{position:"absolute",left:(h-9)*60/10*CELL_W+m/10*CELL_W,top:0,bottom:0,borderLeft:"1px solid #f1f5f9",pointerEvents:"none"}}/>
                                  ))}
                                  {staffBreaks.map(br=>(
                                    <div key={`br-${br.id}`} style={{position:"absolute",left:timeToX(br.time),top:4,bottom:4,width:CELL_W*3,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,pointerEvents:"none"}}>
                                      <span style={{fontSize:9,color:"#94a3b8",fontWeight:600}}>{br.reason}</span>
                                    </div>
                                  ))}
                                  {staffBookings.map(b=>{
                                    const x=timeToX(b.time);const w=durationToW(b);const cnt=visitCounts[b.id]||1;
                                    const isPaid=paidBookingIds.has(b.id);
                                    return(
                                      <div key={b.id} onClick={e=>{e.stopPropagation();setBookingPopup({booking:b,x:e.clientX,y:e.clientY});}}
                                        style={{position:"absolute",left:x,top:3,bottom:3,width:Math.max(w-2,20),background:isPaid?"linear-gradient(135deg,#9ca3af,#6b7280)":`linear-gradient(135deg,${staff.color},${staff.color}bb)`,borderRadius:6,padding:"2px 5px",cursor:"pointer",boxShadow:isPaid?"0 1px 3px rgba(0,0,0,.2)":`0 2px 6px ${staff.color}44`,display:"flex",flexDirection:"column",justifyContent:"center",overflow:"hidden",zIndex:2,opacity:isPaid?.75:1}}>
                                        <div style={{fontWeight:800,fontSize:10,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isPaid?"✓ ":""}{b.patient_name}</div>
                                        <div style={{fontSize:9,color:"rgba(255,255,255,.85)"}}>{b.time}{cnt>1&&<span style={{marginLeft:2,background:"rgba(255,255,255,.25)",borderRadius:2,padding:"0 2px"}}>{cnt}回</span>}</div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                </div>}
              </div>
            );
          })()}

          {/* 来院受付（QR読み取り） */}
          {view==="checkin"&&<CheckInPanel bookings={bookings} onOpenPatient={(patientName)=>{setView("patients");}}/>}

          {/* 患者管理 */}
          {view==="patients"&&<PatientsPanel bookings={bookings} setView={setView} setForm={setForm} setEditId={setEditId} setConflict={setConflict} todayStr={todayStr}/>}

          {/* サマリー */}
          {view==="stats"&&<StatsPanel bookings={bookings} payments={payments} todayStr={todayStr}/>}

          {/* 店舗管理 */}
          {view==="store_mgmt"&&<StoreMgmtPanel/>}

          {/* スタッフ・シフト管理（統合） */}
          {view==="staff_mgmt"&&<StaffMgmtPanel currentUser={user}/>}

          {/* メニュー・コース管理 */}
          {view==="menu_mgmt"&&<MenuMgmtPanel/>}

          {/* 営業時間・休憩 */}
          {view==="business_hours"&&<BusinessHoursPanel/>}

          {/* 各種設定 */}
          {view==="settings"&&<SettingsPanel/>}

          {/* その他準備中ページ */}
          {["user_mgmt"].includes(view)&&(()=>{
            const labels={
              user_mgmt:{title:"ユーザー管理",desc:"ログインアカウントの追加・編集・削除ができます。"},
              settings:{title:"各種設定",desc:"予約受付設定・LINE連携・通知設定などができます。"},
            };
            const {title,desc}=labels[view]||{title:"準備中",desc:""};
            return(
              <div style={{maxWidth:600,margin:"0 auto",paddingTop:40,textAlign:"center"}}>
                <div style={{width:72,height:72,background:"#eff6ff",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:32}}>⚙️</div>
                <div style={{fontSize:22,fontWeight:800,color:"#1e3a5f",marginBottom:8}}>{title}</div>
                <div style={{fontSize:14,color:"#64748b",marginBottom:24,lineHeight:1.7}}>{desc}</div>
                <div style={{background:"#fef9ec",border:"1px solid #fde68a",borderRadius:12,padding:"16px 24px",display:"inline-block",fontSize:13,color:"#92400e",fontWeight:600}}>
                  この機能は現在開発中です。<br/>順次追加予定です。
                </div>
              </div>
            );
          })()}

          {/* 予約フォーム */}
          {view==="form"&&form&&(
            <FormPanel form={form} setForm={setForm} editId={editId} conflict={conflict} setConflict={setConflict} isAdmin={isAdmin} bookings={bookings} save={save} onClose={()=>setView("calendar")} onDelete={()=>setDelConfirm(bookings.find(b=>b.id===editId))} businessHours={businessHours} closures={closures}/>
          )}
        </div>
      </div>

      {/* 予約ブロック アクションポップアップ */}
      {bookingPopup&&(()=>{
        const b=bookingPopup.booking;
        const s=STAFF_ACCOUNTS.find(x=>x.id===b.staff_id)||{color:"#888",name:"不明"};
        const cnt=visitCounts[b.id]||1;
        const posLeft=Math.min(bookingPopup.x, window.innerWidth-200);
        const posTop=Math.min(bookingPopup.y, window.innerHeight-220);
        return(
          <>
            {/* オーバーレイ（クリックで閉じる） */}
            <div onClick={()=>setBookingPopup(null)} style={{position:"fixed",inset:0,zIndex:300}}/>
            {/* ポップアップ */}
            <div style={{position:"fixed",left:posLeft,top:posTop,zIndex:400,background:"white",borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,.2)",width:190,overflow:"hidden",border:"1px solid #e2e8f0"}}>
              {/* ヘッダー */}
              <div style={{background:`linear-gradient(135deg,${s.color},${s.color}cc)`,padding:"10px 14px"}}>
                <div style={{fontWeight:800,fontSize:14,color:"white"}}>{b.patient_name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:2}}>{b.date}　{b.time}　{s.name}</div>
                {cnt>1&&<div style={{fontSize:10,color:"rgba(255,255,255,.7)",marginTop:1}}>{cnt}回目</div>}
              </div>
              {/* アクション */}
              <div style={{padding:8,display:"flex",flexDirection:"column",gap:4}}>
                <button onClick={()=>{
                  window.open(`pos.html?id=${b.id}`,"_blank");
                  setBookingPopup(null);
                }} style={{width:"100%",padding:"9px 12px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                  会計へ進む
                </button>
                <button onClick={()=>{
                  window.open(`treatment.html?id=${b.id}`,"_blank");
                  setBookingPopup(null);
                }} style={{width:"100%",padding:"9px 12px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  施術記録
                </button>
                <button onClick={()=>{setHistoryPatient(b.patient_name);setBookingPopup(null);}} style={{width:"100%",padding:"9px 12px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
                  来院履歴
                </button>
                {(isAdmin||b.staff_id===user.id)&&(
                  <button onClick={()=>{openEdit(b);setBookingPopup(null);}} style={{width:"100%",padding:"9px 12px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    予約を編集
                  </button>
                )}
              </div>
            </div>
          </>
        );
      })()}

      {/* PatientHistoryModal removed - now shown inline in PatientsPanel */}
      {showBreakModal&&<BreakModal onClose={()=>setShowBreakModal(false)} bookings={bookings} breaks={breaks} setBreaks={setBreaks}/>}

      {delConfirm&&(
        <div className="confirm-box">
          <div style={{background:"white",borderRadius:14,padding:24,maxWidth:300,width:"100%",boxShadow:"0 16px 48px rgba(0,0,0,.2)"}}>
            <div style={{width:52,height:52,background:"#fef2f2",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:24}}>🗑</div>
            <div style={{fontWeight:800,fontSize:16,textAlign:"center",marginBottom:6,color:"#1e293b"}}>削除しますか？</div>
            <div style={{color:"#64748b",fontSize:13,textAlign:"center",marginBottom:20,lineHeight:1.6}}>{delConfirm.patient_name}さん<br/>{delConfirm.date} {delConfirm.time}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} className="btn btn-outline" style={{flex:1,justifyContent:"center",padding:11}}>キャンセル</button>
              <button onClick={()=>del(delConfirm.id)} className="btn btn-danger" style={{flex:1,justifyContent:"center",padding:11}}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {toast&&(<div className="toast" style={{background:toast.type==="delete"?"#1e293b":"#059669",color:"white"}}>{toast.type==="delete"?"削除しました":"✓ "}{toast.msg}</div>)}
    </div>
  );
}

function App(){
  const [user,setUser]=React.useState(null);
  const [checking,setChecking]=React.useState(true);

  React.useEffect(()=>{
    async function restoreSession(){
      try{
        const session=await sb.getSession();
        const saved=sessionStorage.getItem("ando_user");
        if(session&&saved){
          setUser(JSON.parse(saved));
        }
      }catch{}
      setChecking(false);
    }
    restoreSession();
  },[]);

  function handleLogin(u){
    try{sessionStorage.setItem("ando_user",JSON.stringify(u));}catch{}
    setUser(u);
  }
  function handleLogout(){
    try{sessionStorage.removeItem("ando_user");}catch{}
    sb.logout();
    setUser(null);
  }

  if(checking)return(<div className="loading"><div className="loading-spinner"></div><div style={{fontWeight:700,color:"#1e3a5f",fontSize:14}}>確認中...</div></div>);
  if(!user)return <LoginScreen onLogin={handleLogin}/>;
  return <Dashboard user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
