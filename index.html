// 全itemsをフラット化するヘルパー
function allCatItems(cat){ return cat.subs.flatMap(s=>s.items); }

// 後方互換：全メニュー名一覧・時間マップ
const MENUS = MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>i.name));
const DURATION = Object.fromEntries(MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>[i.name,i.duration])));
const MENU_PRICE = Object.fromEntries(MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>[i.name,i.price])));
const DURATION_OPTIONS = Array.from({length:12},(_,i)=>(i+1)*10); // 10〜120分

const SLOTS = (()=>{const s=[];for(let h=9;h<=19;h++){for(let m=0;m<60;m+=10){if(h===19&&m>0) break;s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);}}return s;})();

// Supabase公式クライアント（Authセッション管理付き）
// storage を sessionStorage にすることで「タブを閉じるまでログイン維持」を実現
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: window.sessionStorage, persistSession: true, autoRefreshToken: true }
});

const sb = {
  async query(table,method="GET",body=null,filters=""){
    // ログイン中ならセッショントークンを、未ログインならanonキーを使う
    const {data:{session}} = await supabaseClient.auth.getSession();
    const token = session ? session.access_token : SUPABASE_ANON_KEY;
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${filters}`,{
      method,headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${token}`,"Content-Type":"application/json","Prefer":"return=representation"},
      body:body?JSON.stringify(body):null,
    });
    const text=await res.text();return text?JSON.parse(text):[];
  },
  select:(t,f="")=>sb.query(t,"GET",null,f),
  insert:(t,d)=>sb.query(t,"POST",d),
  update:(t,id,d)=>sb.query(t,"PATCH",d,`?id=eq.${id}`),
  delete:(t,id)=>sb.query(t,"DELETE",null,`?id=eq.${id}`),

  // ===== Auth関連 =====
  async login(email,password){
    const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});
    if(error) throw error;
    return data;
  },
  async logout(){
    await supabaseClient.auth.signOut();
  },
  async getSession(){
    const {data:{session}}=await supabaseClient.auth.getSession();
    return session;
  },
};

const today=new Date();
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function getWeekDates(base){
  const day=base.getDay(),mon=new Date(base);
  mon.setDate(base.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function overlaps(a,b){
  const as=toMin(a.time),ae=as+(a.duration||DURATION[a.menu]||30),bs=toMin(b.time),be=bs+(b.duration||DURATION[b.menu]||30);
  return as<be&&bs<ae;
}

    }
    load();

    if(!r) return null;
    const map={"成約":["badge-green","成約"],"持ち帰り":["badge-yellow","持ち帰り"],"バツ":["badge-red","バツ"]};

    return <span className={`badge ${cls}`}>{label}</span>;
  }
  function jifeeText(t){
    if(!t.jifee_type||t.jifee_type==="なし") return null;
    if(t.jifee_type==="回数券") return `回数券 ${t.jifee_count||""}枚`;

    return null;

            <div style={{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:2}}>施術・来院履歴</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div style={{padding:16}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"来院回数",value:`${visitCount}回`,color:"#2563eb"},{label:"施術記録",value:`${treatCount}件`,color:"#059669"},{label:"成約数",value:`${contracts}件`,color:"#d97706"}].map(item=>(
              <div key={item.label} className="stat-card" style={{borderTopColor:item.color,textAlign:"center",padding:12}}>
                <div style={{fontSize:22,fontWeight:800,color:item.color,margin:"4px 0 2px"}}>{item.value}</div>
                <div style={{fontSize:11,color:"#9ca3af",fontWeight:600}}>{item.label}</div>

          {loading?(<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>読み込み中...</div>):patientBookings.length===0?(<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>予約記録がありません</div>):patientBookings.map((b,i)=>{
            const staff=STAFF_ACCOUNTS.find(s=>s.id===b.staff_id)||{name:"不明",color:"#888",initial:"？"};
            const treat=treatments.find(t=>t.booking_id===b.id);
            const isFirst=i===patientBookings.length-1;
            return (
              <div key={b.id} style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:`1px solid ${treat?"#bbf7d0":"#e2e8f0"}`,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                <div style={{background:treat?"#f0fdf4":"#f8fafc",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+(treat?"#bbf7d0":"#e2e8f0")}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:800,fontSize:13,color:"#1e3a5f"}}>{b.date} {b.time}</span>
                    {isFirst&&<span className="badge badge-orange">初回</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:staff.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:11,boxShadow:`0 0 0 2px white,0 0 0 3px ${staff.color}`}}>{staff.initial}</div>

function StatsPanel({bookings,payments,todayStr}){
  const [tab,setTab]=React.useState("daily");
  const [selMonth,setSelMonth]=React.useState(todayStr.slice(0,7));
  const [selDate,setSelDate]=React.useState(todayStr);
  const fmt=n=>"¥"+Number(n||0).toLocaleString();
  const DAYS=["日","月","火","水","木","金","土"];
  const dayBookings=bookings.filter(b=>b.date===selDate);
  const dayPayments=payments.filter(p=>p.payment_date===selDate);
  const dayTotal=dayPayments.reduce((s,p)=>s+(p.total_amount||0),0);
  const dayIns=dayPayments.reduce((s,p)=>s+(p.insurance_amount||0),0);
  const dayJifee=dayPayments.reduce((s,p)=>s+(p.jifee_amount||0),0);
  const monthBookings=bookings.filter(b=>b.date&&b.date.startsWith(selMonth));
  const monthPayments=payments.filter(p=>p.payment_date&&p.payment_date.startsWith(selMonth));
  const monthTotal=monthPayments.reduce((s,p)=>s+(p.total_amount||0),0);
  const monthIns=monthPayments.reduce((s,p)=>s+(p.insurance_amount||0),0);
  const monthJifee=monthPayments.reduce((s,p)=>s+(p.jifee_amount||0),0);
  function calcTechSales(pmts){
    const techMap={};
    pmts.forEach(p=>{if(!p.memo) return;p.memo.split("・").forEach(tech=>{if(!techMap[tech]) techMap[tech]={count:0,amount:0};techMap[tech].count++;const types=p.memo.split("・").length;techMap[tech].amount+=Math.round((p.jifee_amount||0)/types);});});
    return Object.entries(techMap).sort((a,b)=>b[1].amount-a[1].amount);
  }
  function calcStaffSales(pmts,bks){
    return STAFF_ACCOUNTS.map(s=>{
      const staffPmts=pmts.filter(p=>p.staff_id===s.id);
      const staffBks=bks.filter(b=>b.staff_id===s.id);
      return {...s,count:staffBks.length,total:staffPmts.reduce((sum,p)=>sum+(p.total_amount||0),0),ins:staffPmts.reduce((sum,p)=>sum+(p.insurance_amount||0),0),jifee:staffPmts.reduce((sum,p)=>sum+(p.jifee_amount||0),0)};
    });
  }
  function calcRetention(bks){
    const patientMap={};
    bks.forEach(b=>{if(!patientMap[b.patient_name]) patientMap[b.patient_name]=[];patientMap[b.patient_name].push(b.date);});
    let newPatients=0,retained=0;
    Object.values(patientMap).forEach(dates=>{if(dates.length===1) newPatients++;else if(dates.length>=2){newPatients++;retained++;}});
    return {newPatients,retained,rate:newPatients>0?Math.round(retained/newPatients*100):0};
  }
  function calcDailySales(){
    const map={};
    monthPayments.forEach(p=>{if(!map[p.payment_date]) map[p.payment_date]={date:p.payment_date,total:0,ins:0,jifee:0,count:0};map[p.payment_date].total+=p.total_amount||0;map[p.payment_date].ins+=p.insurance_amount||0;map[p.payment_date].jifee+=p.jifee_amount||0;map[p.payment_date].count++;});
    return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  }
  const tabStyle=(t)=>({padding:"7px 14px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,background:tab===t?"#1e3a5f":"white",color:tab===t?"white":"#64748b",boxShadow:tab===t?"0 2px 6px rgba(30,58,95,.3)":"0 1px 3px rgba(0,0,0,.06)",fontFamily:"inherit"});
  const monthRetention=calcRetention(monthBookings);
  const allRetention=calcRetention(bookings);
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[["daily","日計"],["monthly","月計"],["tech","技術別"],["staff","スタッフ別"],["retention","新患継続"]].map(([t,label])=>(<button key={t} onClick={()=>setTab(t)} style={tabStyle(t)}>{label}</button>))}
      </div>
      {tab==="daily"&&(
        <div>
          <div style={{marginBottom:14}}><input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{padding:"8px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:700}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"来院数",value:`${dayBookings.length}件`,color:"#2563eb"},{label:"会計済み",value:`${dayPayments.length}件`,color:"#059669"},{label:"日計売上",value:fmt(dayTotal),color:"#d97706"}].map(item=>(<div key={item.label} className="stat-card" style={{borderTopColor:item.color,padding:14,textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:item.color}}>{item.value}</div><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginTop:2}}>{item.label}</div></div>))}
          </div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{padding:"12px 16px"}}>
              <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>売上内訳</div>
              {[{label:"保険窓口負担計",val:dayIns,color:"#2563eb"},{label:"自費売上計",val:dayJifee,color:"#059669"},{label:"合計",val:dayTotal,color:"#d97706",bold:true}].map(item=>(<div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}><span style={{fontSize:13,color:"#374151",fontWeight:item.bold?800:600}}>{item.label}</span><span style={{fontSize:item.bold?18:14,fontWeight:800,color:item.color}}>{fmt(item.val)}</span></div>))}
            </div>
          </div>
          <div className="card">
            <div style={{padding:"12px 16px"}}>
              <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>スタッフ別（本日）</div>
              {calcStaffSales(dayPayments,dayBookings).map(s=>(<div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:30,height:30,borderRadius:8,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:12}}>{s.initial}</div><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:700}}>{s.name}</span><span style={{fontSize:13,fontWeight:800,color:s.color}}>{s.count}件　{fmt(s.total)}</span></div><div style={{height:6,background:"#f1f5f9",borderRadius:3}}><div style={{height:"100%",width:`${Math.min(s.count*20,100)}%`,background:s.color,borderRadius:3}}></div></div></div></div>))}
            </div>
          </div>
        </div>
      )}
      {tab==="monthly"&&(()=>{
        // ===== 指標計算 =====
        const monthPays=monthPayments;
        const monthBks=monthBookings;

        // 売上
        const totalSales=monthPays.reduce((s,p)=>s+(p.total_amount||0),0);
        const insSales=monthPays.reduce((s,p)=>s+(p.insurance_amount||0),0);
        const jifeeSales=monthPays.reduce((s,p)=>s+(p.jifee_amount||0),0);

        // 来院患者（ユニーク）
        const uniquePatients=[...new Set(monthBks.map(b=>b.patient_name))];
        const totalUniqueCount=uniquePatients.length;

        // 全期間の来院データ（新規・再訪・継続・LTV計算用）
        const allPatientMap={};
        bookings.forEach(b=>{
          if(!allPatientMap[b.patient_name]) allPatientMap[b.patient_name]=[];
          allPatientMap[b.patient_name].push(b.date);
        });

        // 今月の来院区分
        let newCount=0,revisitCount=0,continuedCount=0;
        uniquePatients.forEach(name=>{
          const allDates=(allPatientMap[name]||[]).sort();
          const monthDates=monthBks.filter(b=>b.patient_name===name).map(b=>b.date).sort();
          const firstEver=allDates[0];
          const isNewThisMonth=firstEver&&firstEver.startsWith(selMonth);
          if(isNewThisMonth) newCount++;
          else if(monthDates.length>=3) continuedCount++;
          else revisitCount++;
        });

        // 平均通院回数（今月の来院患者の全期間累計）
        const totalVisitSum=uniquePatients.reduce((s,name)=>{
          return s+(allPatientMap[name]||[]).length;
        },0);
        const avgVisit=totalUniqueCount>0?(totalVisitSum/totalUniqueCount).toFixed(1):"0";

        // 総来院数（今月の予約件数）
        const totalVisits=monthBks.length;

        // 単価計算
        const paidCount=monthPays.length;
        const allUnitPrice=paidCount>0?Math.round(totalSales/paidCount):0; // 全体単価
        const windowUnitPrice=paidCount>0?Math.round(insSales/paidCount):0; // 窓口単価
        const newPayments=monthPays.filter(p=>{
          const name=p.patient_name;
          const firstDate=(allPatientMap[name]||[]).sort()[0];
          return firstDate&&firstDate.startsWith(selMonth);
        });
        const newUnitPrice=newPayments.length>0?Math.round(newPayments.reduce((s,p)=>s+(p.total_amount||0),0)/newPayments.length):0;

        // LTV（月計売上 ÷ ユニーク来院患者数）
        const ltv=totalUniqueCount>0?Math.round(totalSales/totalUniqueCount):0;

        // 離反（今月来院なし、かつ最終来院が30日以上前）
        const allUniquePatients=[...new Set(bookings.map(b=>b.patient_name))];
        const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
        const cutoffStr=cutoff.toISOString().split("T")[0];
        const churned=allUniquePatients.filter(name=>{
          const lastDate=(allPatientMap[name]||[]).sort().slice(-1)[0];
          const visitedThisMonth=monthBks.some(b=>b.patient_name===name);
          return !visitedThisMonth&&lastDate&&lastDate<cutoffStr;
        });

            p.totalVisits=combined.length;
            p.lastDate=combined[combined.length-1].date;
            p.lastStaff=combined[combined.length-1].staff;
            // 初回担当
            p.firstStaff=combined[0].staff;

            const stepRates={};
            for(let v=2;v<=8;v++){
              const prev=visitDist[v-1];
              stepRates[v]=prev>0?Math.round(visitDist[v]/prev*100):0;
            }
            return {
              ...s, total, retained2, retained8, churned,
              rate2:total>0?Math.round(retained2/total*100):0,
              churnRate:total>0?Math.round(churned/total*100):0,
              visitDist, stepRates,
            };
          });

        const staffStatsMonth=calcStaffRetention(monthPM);

                              <span style={{fontWeight:700,fontSize:12,color:"#1e293b"}}>{s.name.replace(" 先生","")}</span>
                            </div>
                          </td>
                          {[1,2,3,4,5,6,7].map(v=>{
                            const count=Object.values(allPM).filter(p=>p.firstStaff===s.id&&p.totalVisits===v).length;
                            return(<td key={v} style={{padding:"8px 6px",textAlign:"center",fontWeight:count>0?700:400,color:count>0?s.color:"#d1d5db",borderBottom:"1px solid #f1f5f9"}}>{count>0?count:"-"}</td>);
                          })}
                          <td style={{padding:"8px 6px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                            {(()=>{const count=Object.values(allPM).filter(p=>p.firstStaff===s.id&&p.totalVisits>=8).length;return <span style={{fontWeight:count>0?700:400,color:count>0?s.color:"#d1d5db"}}>{count>0?count:"-"}</span>;})()} 
                          </td>
                          <td style={{padding:"8px 6px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                            <span style={{fontWeight:s.churned>0?700:400,color:s.churned>0?"#ef4444":"#d1d5db"}}>{s.churned>0?s.churned:"-"}</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ===== 予約フォーム =====
function FormPanel({form,setForm,editId,conflict,setConflict,isAdmin,bookings,save,onClose,onDelete}){
  const [searchQ,setSearchQ]=React.useState("");
  const [searchResults,setSearchResults]=React.useState([]);
  const [searching,setSearching]=React.useState(false);
  const [showSearch,setShowSearch]=React.useState(editId===null);

  // メニューの現在カテゴリ・サブカテゴリを初期化
  const initCat=()=>{
    const menus=Array.isArray(form.menus)&&form.menus.length>0?form.menus:[form.menu].filter(Boolean);
    if(!menus.length) return MENU_CATEGORIES[0].id;
    const cat=MENU_CATEGORIES.find(c=>allCatItems(c).some(i=>menus.includes(i.name)));
    return cat?cat.id:MENU_CATEGORIES[0].id;
  };
  const initSub=(catId)=>{
    const cat=MENU_CATEGORIES.find(c=>c.id===catId)||MENU_CATEGORIES[0];
    const menus=Array.isArray(form.menus)&&form.menus.length>0?form.menus:[form.menu].filter(Boolean);
    if(!menus.length) return cat.subs[0].id;
    const sub=cat.subs.find(s=>s.items.some(i=>menus.includes(i.name)));
    return sub?sub.id:cat.subs[0].id;
  };
  const [selCategory,setSelCategory]=React.useState(initCat);
  const [selSub,setSelSub]=React.useState(()=>initSub(initCat()));

  // 選択中メニュー一覧（配列）
  const selectedMenus=Array.isArray(form.menus)&&form.menus.length>0?form.menus:(form.menu?[form.menu]:[]);
  function toggleMenu(itemName, itemDuration){
    const cur=selectedMenus;
    const next=cur.includes(itemName)?cur.filter(m=>m!==itemName):[...cur,itemName];
    // durationは選択メニューの最大値
    const maxDur=next.length>0?Math.max(...next.map(m=>DURATION[m]||30)):itemDuration;
    setForm(f=>({...f,menus:next,menu:next[0]||"",duration:maxDur}));
  }
  function clearMenus(){setForm(f=>({...f,menus:[],menu:"",duration:30}));}

  async function searchPatients(q){
    if(!q.trim()){setSearchResults([]);return;}
    setSearching(true);
    try{
      const [byName,byKarte]=await Promise.all([sb.select("bookings",`?patient_name=ilike.*${encodeURIComponent(q)}*&order=date.desc&limit=20`),sb.select("bookings",`?karte_no=eq.${encodeURIComponent(q)}&order=date.desc&limit=10`)]);
      const all=[...(Array.isArray(byName)?byName:[]),...(Array.isArray(byKarte)?byKarte:[])];
      const seen={};const unique=[];
      all.forEach(b=>{const key=b.patient_name;if(!seen[key]){seen[key]=true;unique.push(b);}});
      setSearchResults(unique.slice(0,10));
    }catch(e){console.error(e);}
    setSearching(false);
  }
  function selectPatient(b){
    setForm(f=>({...f,patient_name:b.patient_name,phone:b.phone||"",karte_no:b.karte_no||"",line_user_id:b.line_user_id||null,line_notify:!!b.line_user_id}));
    setSearchQ("");setSearchResults([]);setShowSearch(false);
  }
  const visitCount=React.useMemo(()=>{if(!form.patient_name) return 0;return bookings.filter(b=>b.patient_name===form.patient_name).length;},[form.patient_name,bookings]);
  return(
    <div className="card" style={{maxWidth:520,padding:22}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f"}}>{editId!==null?"予約を編集":"新規予約"}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8",lineHeight:1}}>✕</button>
      </div>
      {conflict&&<div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#dc2626",fontSize:13,fontWeight:700}}>ダブルブッキングになります</div>}
      {showSearch?(
        <div style={{background:"#f0f9ff",borderRadius:10,padding:14,marginBottom:16,border:"1px solid #bae6fd"}}>
          <div style={{fontWeight:800,fontSize:13,color:"#0369a1",marginBottom:10}}>既存患者を検索</div>
          <div style={{position:"relative",marginBottom:8}}>
            <input className="form-input" placeholder="患者名またはカルテ番号で検索..." value={searchQ} onChange={e=>{setSearchQ(e.target.value);searchPatients(e.target.value);}} style={{paddingRight:40}} autoFocus/>
            {searching&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#94a3b8"}}>検索中...</div>}
          </div>
          {searchResults.length>0&&(
            <div style={{background:"white",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden",maxHeight:220,overflowY:"auto"}}>
              {searchResults.map((b,i)=>(<button key={i} onClick={()=>selectPatient(b)} style={{width:"100%",padding:"10px 14px",background:"none",border:"none",borderBottom:"1px solid #f1f5f9",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{b.patient_name}</div><div style={{fontSize:12,color:"#64748b"}}>{b.phone||"電話なし"}{b.karte_no?`　カルテ：${b.karte_no}`:""}</div></div><div style={{fontSize:11,color:"#94a3b8",textAlign:"right"}}><div>{b.date}</div>{b.line_user_id&&<div style={{color:"#059669",fontWeight:700}}>LINE✓</div>}</div></button>))}
            </div>
          )}
          {searchQ&&!searching&&searchResults.length===0&&<div style={{fontSize:13,color:"#94a3b8",textAlign:"center",padding:"8px 0"}}>該当患者なし</div>}
          <button onClick={()=>setShowSearch(false)} className="btn btn-outline btn-sm" style={{marginTop:8,width:"100%",justifyContent:"center"}}>新規患者として入力</button>
        </div>
      ):(
        <div style={{marginBottom:14}}>
          {form.patient_name&&(
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",marginBottom:10,border:"1px solid #bbf7d0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{form.patient_name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{form.phone}{form.karte_no?`　カルテ：${form.karte_no}`:""}</div>
                {visitCount>0&&<div style={{fontSize:11,color:"#059669",fontWeight:700}}>来院{visitCount}回目</div>}
              </div>
              {editId===null&&<button onClick={()=>setShowSearch(true)} className="btn btn-outline btn-xs">変更</button>}
            </div>
          )}
        </div>
      )}
      {!showSearch&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:14}}>
          <div><label className="form-label">患者名 *</label><input className="form-input" value={form.patient_name||""} placeholder="山本 花子" onChange={e=>{setForm(f=>({...f,patient_name:e.target.value}));setConflict(false);}}/></div>
          <div style={{minWidth:110}}><label className="form-label">カルテ番号</label><input className="form-input" value={form.karte_no||""} placeholder="K-001" onChange={e=>setForm(f=>({...f,karte_no:e.target.value}))}/></div>
        </div>
      )}
      <div className="form-group"><label className="form-label">電話番号</label><input type="tel" className="form-input" value={form.phone||""} placeholder="090-0000-0000" onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div><label className="form-label">日付</label><input type="date" className="form-input" value={form.date||""} onChange={e=>{setForm(f=>({...f,date:e.target.value}));setConflict(false);}}/></div>
        <div><label className="form-label">時間</label><input type="time" step="600" className="form-input" value={form.time||""} onChange={e=>{setForm(f=>({...f,time:e.target.value}));setConflict(false);}}/></div>
      </div>
      {isAdmin&&(<div className="form-group"><label className="form-label">担当スタッフ</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{STAFF_ACCOUNTS.map(s=>(<button key={s.id} onClick={()=>{setForm(f=>({...f,staff_id:s.id}));setConflict(false);}} className="btn" style={{background:form.staff_id===s.id?s.color:"white",color:form.staff_id===s.id?"white":"#374151",border:`2px solid ${s.color}`,borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700,boxShadow:form.staff_id===s.id?`0 2px 8px ${s.color}55`:"none"}}>{s.name}</button>))}</div></div>)}
      {/* ===== メニュー選択 ===== */}
      <div className="form-group">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <label className="form-label" style={{marginBottom:0}}>メニュー（複数選択可）</label>
          {selectedMenus.length>0&&(
            <button onClick={clearMenus} style={{fontSize:11,color:"#ef4444",background:"none",border:"none",cursor:"pointer",fontWeight:700}}>クリア</button>
          )}
        </div>

        {/* 選択済みバッジ */}
        {selectedMenus.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,padding:"8px 10px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>
            {selectedMenus.map(m=>{
              const cat=MENU_CATEGORIES.find(c=>allCatItems(c).some(i=>i.name===m))||MENU_CATEGORIES[0];
              const item=allCatItems(cat).find(i=>i.name===m);
              return(
                <span key={m} style={{display:"inline-flex",alignItems:"center",gap:4,background:cat.color,color:"white",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>
                  {m}
                  {item&&<span style={{opacity:.8,fontSize:10}}>¥{item.price.toLocaleString()}</span>}
                  <button onClick={()=>toggleMenu(m,item?.duration||30)} style={{background:"rgba(255,255,255,.3)",border:"none",color:"white",borderRadius:"50%",width:14,height:14,cursor:"pointer",fontSize:10,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </span>
              );
            })}
            <span style={{fontSize:11,color:"#059669",fontWeight:700,alignSelf:"center"}}>
              合計 ¥{selectedMenus.reduce((s,m)=>{const cat=MENU_CATEGORIES.find(c=>allCatItems(c).some(i=>i.name===m));const item=allCatItems(cat||MENU_CATEGORIES[0]).find(i=>i.name===m);return s+(item?.price||0);},0).toLocaleString()}
            </span>
          </div>
        )}

        {/* Lv1: 大分類 */}
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {MENU_CATEGORIES.map(c=>(
            <button key={c.id} onClick={()=>{setSelCategory(c.id);setSelSub(c.subs[0].id);}}
              className="btn" style={{flex:1,padding:"7px 4px",borderRadius:8,fontSize:12,fontWeight:700,background:selCategory===c.id?c.color:"white",color:selCategory===c.id?"white":"#374151",border:`2px solid ${selCategory===c.id?c.color:"#e2e8f0"}`,boxShadow:selCategory===c.id?`0 2px 8px ${c.color}44`:"none",justifyContent:"center"}}>
              {c.label}
            </button>
          ))}
        </div>

        {/* Lv2: サブ分類（保険→3割/2割/1割、自費→1回/回数券FP） */}
        {(()=>{
          const cat=MENU_CATEGORIES.find(c=>c.id===selCategory)||MENU_CATEGORIES[0];
          if(cat.subs.length<=1) return null;
          return(
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              {cat.subs.map(sub=>(
                <button key={sub.id} onClick={()=>setSelSub(sub.id)}
                  className="btn" style={{flex:1,padding:"6px 4px",borderRadius:8,fontSize:12,fontWeight:700,background:selSub===sub.id?"#1e3a5f":"#f1f5f9",color:selSub===sub.id?"white":"#475569",border:`1.5px solid ${selSub===sub.id?"#1e3a5f":"#e2e8f0"}`,justifyContent:"center"}}>
                  {sub.label}
                </button>
              ))}
            </div>
          );
        })()}

        {/* Lv3: メニュー一覧（複数選択） */}
        {(()=>{
          const cat=MENU_CATEGORIES.find(c=>c.id===selCategory)||MENU_CATEGORIES[0];
          const sub=cat.subs.find(s=>s.id===selSub)||cat.subs[0];
          return(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,maxHeight:220,overflowY:"auto",padding:2}}>
              {sub.items.map(item=>{
                const isSel=selectedMenus.includes(item.name);
                return(
                  <button key={item.name} onClick={()=>toggleMenu(item.name,item.duration)}
                    className="btn" style={{padding:"8px 10px",borderRadius:8,fontSize:12,fontWeight:isSel?700:500,textAlign:"left",justifyContent:"flex-start",flexDirection:"column",alignItems:"flex-start",height:"auto",background:isSel?cat.color+"18":"#f8fafc",color:isSel?cat.color:"#374151",border:`1.5px solid ${isSel?cat.color:"#e2e8f0"}`,position:"relative"}}>
                    {isSel&&<span style={{position:"absolute",top:5,right:6,fontSize:10,fontWeight:800,color:cat.color}}>✓</span>}
                    <span style={{fontWeight:700,paddingRight:14}}>{item.name}</span>
                    <span style={{fontSize:10,color:isSel?cat.color:"#94a3b8",marginTop:2}}>¥{item.price.toLocaleString()}</span>
                  </button>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* 施術時間 */}
      <div className="form-group">
        <label className="form-label">施術時間</label>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {DURATION_OPTIONS.map(min=>{
            const isSel=(form.duration||DURATION[form.menu]||30)===min;
            return(
              <button key={min} onClick={()=>setForm(f=>({...f,duration:min}))} className="btn"
                style={{padding:"6px 8px",borderRadius:8,fontSize:12,fontWeight:isSel?700:500,background:isSel?"#1e3a5f":"white",color:isSel?"white":"#374151",border:`1.5px solid ${isSel?"#1e3a5f":"#e2e8f0"}`,minWidth:44,justifyContent:"center"}}>
                {min}分
              </button>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,padding:"10px 12px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>
        <input type="checkbox" id="ln" checked={!!form.line_notify} onChange={e=>setForm(f=>({...f,line_notify:e.target.checked}))} style={{width:16,height:16,accentColor:"#059669"}}/>
        <label htmlFor="ln" style={{fontSize:13,color:"#059669",fontWeight:700,cursor:"pointer"}}>LINEリマインドを前日に送る</label>
      </div>
      <div style={{display:"flex",gap:10}}>
        {editId!==null&&<button onClick={onDelete} className="btn btn-danger" style={{flex:1,justifyContent:"center",padding:11,fontSize:14}}>削除</button>}
        <button onClick={save} className="btn btn-primary" style={{flex:2,justifyContent:"center",padding:11,fontSize:14}}>{editId!==null?"更新する":"予約を登録"}</button>
      </div>
    </div>
  );
}

// ===== 患者管理パネル =====
function PatientsPanel({bookings,onHistory}){
  const [patientQ,setPatientQ]=React.useState("");
  const [sortBy,setSortBy]=React.useState("name");

  // 五十音グループ定義
  const GOJUON=[
    {label:"あ行",chars:["あ","い","う","え","お","ア","イ","ウ","エ","オ"]},
    {label:"か行",chars:["か","き","く","け","こ","カ","キ","ク","ケ","コ"]},
    {label:"さ行",chars:["さ","し","す","せ","そ","サ","シ","ス","セ","ソ"]},
    {label:"た行",chars:["た","ち","つ","て","と","タ","チ","ツ","テ","ト"]},
    {label:"な行",chars:["な","に","ぬ","ね","の","ナ","ニ","ヌ","ネ","ノ"]},
    {label:"は行",chars:["は","ひ","ふ","へ","ほ","ハ","ヒ","フ","ヘ","ホ"]},
    {label:"ま行",chars:["ま","み","む","め","も","マ","ミ","ム","メ","モ"]},
    {label:"や行",chars:["や","ゆ","よ","ヤ","ユ","ヨ"]},
    {label:"ら行",chars:["ら","り","る","れ","ろ","ラ","リ","ル","レ","ロ"]},
    {label:"わ行",chars:["わ","を","ん","ワ","ヲ","ン"]},
    {label:"英数",chars:[]}, // それ以外
  ];

  function getGroup(name){
    if(!name) return "英数";
    const first=name.charAt(0);
    for(const g of GOJUON){
      if(g.label==="英数") continue;
      if(g.chars.includes(first)) return g.label;
    }
    return "英数";
  }

  const pm={};
  bookings.forEach(b=>{
    if(!pm[b.patient_name])pm[b.patient_name]={name:b.patient_name,phone:b.phone,count:0,lastDate:"",lastStaff:null};
    pm[b.patient_name].count++;
    if(b.date>pm[b.patient_name].lastDate){pm[b.patient_name].lastDate=b.date;pm[b.patient_name].lastStaff=b.staff_id;}
  });
  const allPatients=Object.values(pm);

  const q=patientQ.trim().toLowerCase();
  const filtered=allPatients.filter(p=>{
    if(!q) return true;
    return p.name.toLowerCase().includes(q)||(p.phone&&p.phone.replace(/-/g,"").includes(q.replace(/-/g,"")));
  });
  const sorted=[...filtered].sort((a,b)=>a.name.localeCompare(b.name,"ja"));

  function highlight(text){
    if(!q||!text) return text;
    const idx=text.toLowerCase().indexOf(q);
    if(idx===-1) return text;
    return <span>{text.slice(0,idx)}<mark style={{background:"#fef08a",borderRadius:2,padding:"0 1px"}}>{text.slice(idx,idx+q.length)}</mark>{text.slice(idx+q.length)}</span>;
  }

  function PatientCard({p}){
    const s=STAFF_ACCOUNTS.find(x=>x.id===p.lastStaff)||{color:"#888",name:"不明",initial:"？"};
    return(
      <div className="card" style={{marginBottom:8}}>
        <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
            <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${s.color},${s.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:15,flexShrink:0,boxShadow:`0 3px 8px ${s.color}44`}}>{p.name.charAt(0)}</div>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                <span style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>{highlight(p.name)}</span>
                {p.count>=2?<span className="badge badge-yellow">{p.count}回</span>:<span className="badge badge-gray">初回</span>}
              </div>
              <div style={{fontSize:11,color:"#64748b"}}>最終：{p.lastDate}　{s.name}</div>
              {p.phone&&<div style={{fontSize:11,color:"#94a3b8"}}>{highlight(p.phone)}</div>}
            </div>
          </div>
          <button onClick={()=>onHistory(p.name)} className="btn btn-primary btn-sm" style={{whiteSpace:"nowrap",flexShrink:0}}>履歴</button>
        </div>
      </div>
    );
  }

  // 検索中は通常リスト表示
  const isSearching=q.length>0;

  // グループ化
  const groups={};
  if(!isSearching){
    GOJUON.forEach(g=>{groups[g.label]=[];});
    sorted.forEach(p=>{const g=getGroup(p.name);if(groups[g])groups[g].push(p);else groups["英数"].push(p);});
  }

  return(
    <div>
      {/* 検索バー */}
      <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16,color:"#94a3b8",pointerEvents:"none"}}>🔍</span>
          <input className="form-input" placeholder="患者名・電話番号で検索..."
            value={patientQ} onChange={e=>setPatientQ(e.target.value)}
            style={{paddingLeft:38,paddingRight:patientQ?36:12}}/>
          {patientQ&&<button onClick={()=>setPatientQ("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"#e2e8f0",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:12,color:"#64748b",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>}
        </div>
      </div>

      {/* 件数 */}
      <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:13,color:"#64748b",fontWeight:700}}>
          {isSearching?`「${patientQ}」の検索結果：${sorted.length}名`:`患者数：${allPatients.length}名`}
        </span>
        {isSearching&&sorted.length===0&&<span className="badge badge-red">該当なし</span>}
      </div>

      {/* 検索結果 or 五十音グループ */}
      {isSearching?(
        sorted.length===0?(
          <div className="card" style={{padding:40,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:12}}>🔍</div>
            <div style={{fontWeight:700,color:"#374151",marginBottom:6}}>「{patientQ}」に一致する患者が見つかりません</div>
            <button onClick={()=>setPatientQ("")} className="btn btn-outline btn-sm" style={{marginTop:14}}>検索をクリア</button>
          </div>
        ):sorted.map(p=><PatientCard key={p.name} p={p}/>)
      ):(
        GOJUON.map(g=>{
          const patients=groups[g.label]||[];
          if(patients.length===0) return null;
          return(
            <div key={g.label} style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{padding:"3px 14px",borderRadius:20,fontWeight:800,fontSize:13,background:"#1e3a5f",color:"white"}}>{g.label}</div>
                <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
                <span className="badge badge-gray">{patients.length}名</span>
              </div>
              {patients.map(p=><PatientCard key={p.name} p={p}/>)}
            </div>
          );
        })
      )}
    </div>
  );
}

// ===== シフト・休日管理パネル =====
function ShiftPanel({currentUser}){
  const today=new Date();
  const [selMonth,setSelMonth]=React.useState(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`);
  const [shifts,setShifts]=React.useState({});
  const [holidays,setHolidays]=React.useState({});
  const [toast,setToast]=React.useState("");
  const [editHoliday,setEditHoliday]=React.useState(null);
  // 一括設定
  const [bulkTarget,setBulkTarget]=React.useState("all"); // "all" | staffId
  const [bulkType,setBulkType]=React.useState("出勤");
  const [bulkDayTypes,setBulkDayTypes]=React.useState(["平日"]); // 平日/土/日/全て
  const [editingCell,setEditingCell]=React.useState(null); // "staffId_date"

  const SHIFT_TYPES=["出勤","休み","有休","振替","祝振替"];
  const SHIFT_COLORS={"出勤":"#2563eb","休み":"#9ca3af","有休":"#059669","振替":"#d97706","祝振替":"#7c3aed"};
  const SHIFT_ABBR={"出勤":"勤","休み":"休","有休":"有","振替":"振","祝振替":"祝"};

  const [y,m]=selMonth.split("-").map(Number);
  const lastDay=new Date(y,m,0);
  const daysInMonth=lastDay.getDate();
  const dates=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(y,m-1,i+1);
    return {date:`${y}-${String(m).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`,day:d.getDay(),label:i+1};
  });
  const DAYS_JP=["日","月","火","水","木","金","土"];

  React.useEffect(()=>{
    try{
      const s=localStorage.getItem(`shifts_${selMonth}`);
      if(s) setShifts(JSON.parse(s));
      else setShifts({});
      const h=localStorage.getItem("holiday_balance");
      if(h) setHolidays(JSON.parse(h));
      else{const init={};STAFF_ACCOUNTS.forEach(s=>{init[s.id]={有休残:10,振替残:0,祝振替残:0};});setHolidays(init);}
    }catch{}
  },[selMonth]);

  function save(){
    try{
      localStorage.setItem(`shifts_${selMonth}`,JSON.stringify(shifts));
      localStorage.setItem("holiday_balance",JSON.stringify(holidays));
      setToast("保存しました");setTimeout(()=>setToast(""),2000);
    }catch{setToast("エラー");}
  }

  // セル個別変更（プルダウン）
  function setShiftCell(staffId,date,val){
    const key=`${staffId}_${date}`;
    const cur=shifts[key]||"出勤";
    const newH={...holidays};
    if(!newH[staffId]) newH[staffId]={有休残:10,振替残:0,祝振替残:0};
    // 旧値の残高を戻す
    if(cur==="有休") newH[staffId].有休残=(newH[staffId].有休残||0)+1;
    if(cur==="振替") newH[staffId].振替残=(newH[staffId].振替残||0)+1;
    if(cur==="祝振替") newH[staffId].祝振替残=(newH[staffId].祝振替残||0)+1;
    // 新値の残高を減らす
    if(val==="有休") newH[staffId].有休残=Math.max(0,(newH[staffId].有休残||0)-1);
    if(val==="振替") newH[staffId].振替残=Math.max(0,(newH[staffId].振替残||0)-1);
    if(val==="祝振替") newH[staffId].祝振替残=Math.max(0,(newH[staffId].祝振替残||0)-1);
    setHolidays(newH);
    setShifts(prev=>({...prev,[key]:val}));
    setEditingCell(null);
  }

  // 一括設定適用
  function applyBulk(){
    const staffIds=bulkTarget==="all"?STAFF_ACCOUNTS.map(s=>s.id):[parseInt(bulkTarget)];
    const newShifts={...shifts};
    const newH={...holidays};
    dates.forEach(({date,day})=>{
      const isSun=day===0,isSat=day===6,isWeekday=day!==0&&day!==6;
      const match=(bulkDayTypes.includes("全て"))||(bulkDayTypes.includes("平日")&&isWeekday)||(bulkDayTypes.includes("土")&&isSat)||(bulkDayTypes.includes("日")&&isSun);
      if(!match) return;
      staffIds.forEach(sid=>{
        const key=`${sid}_${date}`;
        const cur=newShifts[key]||"出勤";
        if(!newH[sid]) newH[sid]={有休残:10,振替残:0,祝振替残:0};
        if(cur==="有休") newH[sid].有休残=(newH[sid].有休残||0)+1;
        if(cur==="振替") newH[sid].振替残=(newH[sid].振替残||0)+1;
        if(cur==="祝振替") newH[sid].祝振替残=(newH[sid].祝振替残||0)+1;
        if(bulkType==="有休") newH[sid].有休残=Math.max(0,(newH[sid].有休残||0)-1);
        if(bulkType==="振替") newH[sid].振替残=Math.max(0,(newH[sid].振替残||0)-1);
        if(bulkType==="祝振替") newH[sid].祝振替残=Math.max(0,(newH[sid].祝振替残||0)-1);
        newShifts[key]=bulkType;
      });
    });
    setShifts(newShifts);setHolidays(newH);
    setToast(`一括設定しました（${bulkTarget==="all"?"全員":STAFF_ACCOUNTS.find(s=>s.id===parseInt(bulkTarget))?.name}・${bulkDayTypes.join("/")}・${bulkType}）`);
    setTimeout(()=>setToast(""),3000);
  }

  function updateBalance(staffId,key,val){
    setHolidays(prev=>({...prev,[staffId]:{...(prev[staffId]||{}), [key]:Math.max(0,parseInt(val)||0)}}));
  }

  function calcMonthSummary(staffId){
    const result={出勤:0,休み:0,有休:0,振替:0,祝振替:0};
    dates.forEach(({date})=>{const key=`${staffId}_${date}`;const v=shifts[key]||"出勤";result[v]=(result[v]||0)+1;});
    return result;
  }

  const toggleBulkDayType=(t)=>setBulkDayTypes(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);

  return(
    <div>
      {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}

      {/* ヘッダー */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>シフト・休日管理</div>
        <input type="month" value={selMonth} onChange={e=>setSelMonth(e.target.value)}
          style={{padding:"6px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:700}}/>
        <button onClick={save} className="btn btn-primary btn-sm" style={{marginLeft:"auto"}}>💾 保存する</button>
      </div>

      {/* 一括設定カード */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:13,color:"#1e3a5f"}}>⚡ 一括設定</div>
        <div style={{padding:"14px 16px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {/* 対象スタッフ */}
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6}}>対象スタッフ</div>
              <select value={bulkTarget} onChange={e=>setBulkTarget(e.target.value)}
                style={{width:"100%",padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontFamily:"inherit"}}>
                <option value="all">🏥 院全体（全員）</option>
                {STAFF_ACCOUNTS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            {/* シフト種別 */}
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:6}}>シフト種別</div>
              <select value={bulkType} onChange={e=>setBulkType(e.target.value)}
                style={{width:"100%",padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontFamily:"inherit"}}>
                {SHIFT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </div>
          {/* 対象曜日 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>対象曜日（複数選択可）</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {["平日","土","日","全て"].map(t=>{
                const sel=bulkDayTypes.includes(t);
                return <button key={t} onClick={()=>toggleBulkDayType(t)} className="btn"
                  style={{padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:700,
                    background:sel?"#1e3a5f":"white",color:sel?"white":"#374151",
                    border:`1.5px solid ${sel?"#1e3a5f":"#e2e8f0"}`,
                    boxShadow:sel?"0 2px 6px rgba(30,58,95,.25)":"none"}}>{t}</button>;
              })}
            </div>
          </div>
          <button onClick={applyBulk} className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:"11px"}}>
            ⚡ 一括適用する
          </button>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>※ 適用後は「保存する」ボタンで確定してください。</div>
        </div>
      </div>

      {/* 休日残高カード */}
      <div className="card" style={{marginBottom:14}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:13,color:"#1e3a5f"}}>🏖️ 休日残高管理</div>
        <div style={{padding:"12px 16px"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#f8fafc"}}>
                  <th style={{padding:"8px 10px",textAlign:"left",color:"#64748b",fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>スタッフ</th>
                  {["有休残","振替残","祝振替残"].map(k=>(
                    <th key={k} style={{padding:"8px 10px",textAlign:"center",color:"#64748b",fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>{k}</th>
                  ))}
                  <th style={{padding:"8px 10px",textAlign:"center",color:"#64748b",fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>操作</th>
                </tr>
              </thead>
              <tbody>
                {STAFF_ACCOUNTS.map(s=>{
                  const bal=holidays[s.id]||{有休残:10,振替残:0,祝振替残:0};
                  const isEditing=editHoliday===s.id;
                  return(
                    <tr key={s.id}>
                      <td style={{padding:"8px 10px",borderBottom:"1px solid #f1f5f9"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:24,height:24,borderRadius:6,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:11}}>{s.initial}</div>
                          <span style={{fontWeight:700}}>{s.name}</span>
                        </div>
                      </td>
                      {["有休残","振替残","祝振替残"].map(k=>(
                        <td key={k} style={{padding:"8px 10px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                          {isEditing?(
                            <input type="number" min="0" value={bal[k]||0} onChange={e=>updateBalance(s.id,k,e.target.value)}
                              style={{width:60,padding:"4px 6px",border:"1.5px solid #e2e8f0",borderRadius:6,textAlign:"center",fontSize:13,fontWeight:700}}/>
                          ):(
                            <span style={{fontWeight:800,fontSize:16,color:(bal[k]||0)<=2?"#ef4444":(bal[k]||0)<=5?"#d97706":"#059669"}}>{bal[k]||0}<span style={{fontSize:11,fontWeight:600,color:"#94a3b8"}}>日</span></span>
                          )}
                        </td>
                      ))}
                      <td style={{padding:"8px 10px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                        <button onClick={()=>setEditHoliday(isEditing?null:s.id)} className="btn btn-outline btn-xs">{isEditing?"完了":"編集"}</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {/* シフト表 */}
      <div className="card">
        <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontWeight:800,fontSize:13,color:"#1e3a5f"}}>{y}年{m}月 シフト表</span>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginLeft:"auto"}}>
            {SHIFT_TYPES.map(t=>(
              <span key={t} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700}}>
                <span style={{width:10,height:10,borderRadius:2,background:SHIFT_COLORS[t],display:"inline-block"}}></span>{t}
              </span>
            ))}
          </div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",fontSize:11}}>
            <thead>
              <tr style={{background:"#f8fafc"}}>
                <th style={{padding:"6px 8px",textAlign:"left",fontWeight:700,color:"#64748b",borderBottom:"2px solid #e2e8f0",borderRight:"1px solid #e2e8f0",minWidth:90,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>スタッフ</th>
                {dates.map(({date,day,label})=>(
                  <th key={date} style={{padding:"4px 2px",textAlign:"center",fontWeight:700,borderBottom:"2px solid #e2e8f0",borderRight:"1px solid #f1f5f9",minWidth:36,
                    color:day===0?"#ef4444":day===6?"#7c3aed":"#374151",
                    background:day===0?"#fff1f2":day===6?"#faf5ff":"#f8fafc"}}>
                    <div>{label}</div>
                    <div style={{fontSize:9,fontWeight:600}}>{DAYS_JP[day]}</div>
                  </th>
                ))}
                <th style={{padding:"6px 8px",textAlign:"center",fontWeight:700,color:"#64748b",borderBottom:"2px solid #e2e8f0",borderLeft:"2px solid #e2e8f0",minWidth:120}}>月間集計</th>
              </tr>
            </thead>
            <tbody>
              {STAFF_ACCOUNTS.map(s=>{
                const summary=calcMonthSummary(s.id);
                return(
                  <tr key={s.id}>
                    <td style={{padding:"6px 8px",borderBottom:"1px solid #f1f5f9",borderRight:"1px solid #e2e8f0",position:"sticky",left:0,background:"white",zIndex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        <div style={{width:20,height:20,borderRadius:5,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:10}}>{s.initial}</div>
                        <span style={{fontWeight:700,fontSize:11}}>{s.name.replace(" 先生","")}</span>
                      </div>
                    </td>
                    {dates.map(({date,day})=>{
                      const key=`${s.id}_${date}`;
                      const val=shifts[key]||"出勤";
                      const color=SHIFT_COLORS[val];
                      const isEditing=editingCell===key;
                      return(
                        <td key={date} style={{padding:2,textAlign:"center",borderBottom:"1px solid #f1f5f9",borderRight:"1px solid #f1f5f9",
                          background:day===0?"#fff8f8":day===6?"#faf8ff":"white",position:"relative"}}>
                          {isEditing?(
                            <select autoFocus value={val}
                              onChange={e=>{setShiftCell(s.id,date,e.target.value);}}
                              onBlur={()=>setEditingCell(null)}
                              style={{width:52,fontSize:10,padding:"2px",borderRadius:4,border:`1.5px solid ${color}`,fontFamily:"inherit",background:"white",cursor:"pointer"}}>
                              {SHIFT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                            </select>
                          ):(
                            <div onClick={()=>setEditingCell(key)}
                              style={{width:28,height:28,borderRadius:5,background:color,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",fontSize:9,color:"white",fontWeight:700,boxShadow:`0 1px 3px ${color}66`,cursor:"pointer"}}
                              title="クリックでプルダウン変更">
                              {SHIFT_ABBR[val]}
                            </div>
                          )}
                        </td>
                      );
                    })}
                    <td style={{padding:"6px 8px",borderBottom:"1px solid #f1f5f9",borderLeft:"2px solid #e2e8f0"}}>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {Object.entries(summary).filter(([,v])=>v>0).map(([k,v])=>(
                          <span key={k} style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:10,fontWeight:700,color:SHIFT_COLORS[k]}}>
                            <span style={{width:8,height:8,borderRadius:2,background:SHIFT_COLORS[k],display:"inline-block"}}></span>{k}{v}
                          </span>
                        ))}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{padding:"10px 16px",fontSize:11,color:"#94a3b8",borderTop:"1px solid #f1f5f9"}}>
          ※ セルをクリックするとプルダウンで変更できます。「保存する」で確定してください。
        </div>
      </div>
    </div>
  );
}
