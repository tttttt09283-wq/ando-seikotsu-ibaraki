    const pb={};
    bookings.forEach(b=>{if(!pb[b.patient_name])pb[b.patient_name]=[];pb[b.patient_name].push(b);});
    const result={};
    Object.values(pb).forEach(list=>{const sorted=[...list].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));sorted.forEach((b,i)=>{result[b.id]=i+1;});});
    return result;
  },[bookings]);

  // 会計済みのbooking_idセット
  const paidBookingIds=React.useMemo(()=>new Set(payments.map(p=>p.booking_id).filter(Boolean)),[payments]);

  function openAdd(date=null,time=null){
    setForm({patient_name:"",phone:"",staff_id:isAdmin?1:user.id,date:date||todayStr,time:time||"10:00",menu:MENUS[0],line_notify:true,reminded:false});
    setConflict(false);setEditId(null);setView("form");
  }
  function openEdit(b){
    if(!isAdmin&&b.staff_id!==user.id)return;
    setForm({...b});setEditId(b.id);setConflict(false);setView("form");
  }
  async function save(){
    if(!form.patient_name.trim())return;
    if(bookings.some(b=>b.id!==editId&&b.staff_id===form.staff_id&&b.date===form.date&&overlaps(b,form))){setConflict(true);return;}
    try{
      if(editId!==null){try{await sb.update("bookings",editId,form);}catch{}setBookings(prev=>prev.map(b=>b.id===editId?{...form,id:editId}:b));}
      else{try{await sb.insert("bookings",form);}catch{}setBookings(prev=>[...prev,{...form,id:Date.now()}]);}
      showToast(editId!==null?"予約を更新しました":"予約を登録しました");setView("calendar");
    }catch{showToast("保存しました");}
  }
  async function del(id){
    try{await sb.delete("bookings",id);}catch{}
    setBookings(prev=>prev.filter(b=>b.id!==id));setDelConfirm(null);setView("calendar");showToast("削除しました","delete");
  }

  const todayBreakCount=breaks.filter(b=>b.date===todayStr).length;

  // ===== サイドバーメニュー定義 =====
  const SvgPlus=()=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
  const SvgClock=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/><line x1="12" y1="3" x2="12" y2="1"/></svg>;
  const SvgCal=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
  const SvgList=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor"/></svg>;
  const SvgPeople=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="7" r="3"/><path d="M2 21v-1a7 7 0 0 1 7-7h0a7 7 0 0 1 7 7v1"/><circle cx="18" cy="8" r="2.5"/><path d="M22 21v-1a5 5 0 0 0-4-4.9"/></svg>;
  const SvgChart=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>;
  const SvgShift=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="12" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="12" y1="18" x2="16" y2="18"/></svg>;
  const SvgRefresh=()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>;

  const sideMenuItems = [
    {id:"add",label:"新規予約",icon:<SvgPlus/>,special:"btn-add",action:()=>openAdd()},
    {id:"break",label:"休憩管理",icon:<SvgClock/>,special:"",action:()=>setShowBreakModal(true)},
    {id:"calendar",label:"カレンダー",icon:<SvgCal/>,special:""},
    {id:"patients",label:"患者管理",icon:<SvgPeople/>,special:""},
    {id:"stats",label:"サマリー",icon:<SvgChart/>,special:""},
    {id:"shift",label:"シフト",icon:<SvgShift/>,special:""},
  ];

  if(loading)return(<div className="loading"><div className="loading-spinner"></div><div style={{fontWeight:700,color:"#1e3a5f",fontSize:14}}>読み込み中...</div></div>);

  return(
    <div style={{background:"#eef2f7",minHeight:"100vh"}}>
      {/* ヘッダー */}
      <div style={{background:"linear-gradient(135deg,#0f2744,#1e4d8c)"}}>
        <div style={{maxWidth:"100%",padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setView("calendar")} style={{width:36,height:36,background:"rgba(255,255,255,.12)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid rgba(255,255,255,.2)",cursor:"pointer",flexShrink:0,transition:"background .15s"}} onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,.22)"} onMouseOut={e=>e.currentTarget.style.background="rgba(255,255,255,.12)"}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </button>
              <div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.5)",letterSpacing:2,textTransform:"uppercase"}}>Staff System</div>
                <div style={{fontSize:17,fontWeight:800,color:"white"}}>{CLINIC_NAME}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowMenu(v=>!v)} className="btn btn-icon" style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:user.color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,color:"white",boxShadow:`0 0 0 2px rgba(255,255,255,.3)`}}>{user.initial}</div>
                  <span style={{fontSize:13,fontWeight:600,color:"white"}}>{user.name}</span>
                  {isAdmin&&<span className="badge badge-yellow" style={{fontSize:9,padding:"1px 5px"}}>管理者</span>}
                </button>
                {showMenu&&(
                  <div style={{position:"absolute",right:0,top:"calc(100% + 8px)",background:"white",borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.18)",minWidth:160,zIndex:200,overflow:"hidden",border:"1px solid #e2e8f0"}}>
                    <button onClick={()=>{fetchAll();setShowMenu(false);}} style={{width:"100%",padding:"10px 14px",background:"none",border:"none",textAlign:"left",cursor:"pointer",fontSize:13,color:"#2563eb",fontWeight:700,borderBottom:"1px solid #f1f5f9"}}>同期</button>
                    <button onClick={onLogout} style={{width:"100%",padding:"10px 14px",background:"none",border:"none",textAlign:"left",cursor:"pointer",fontSize:13,color:"#ef4444",fontWeight:700}}>ログアウト</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* メインレイアウト：サイドバー＋コンテンツ */}
      <div style={{display:"flex",minHeight:"calc(100vh - 68px)"}} onClick={()=>setShowMenu(false)}>

        {/* ===== 左サイドバー（常時表示） ===== */}
        <div className="sidebar">
          {sideMenuItems.map(item=>{
            const isActive = !item.action && view===item.id;
            return (
              <button
                key={item.id}
                className={`sidebar-btn ${item.special} ${isActive?"active":""}`}
                onClick={()=>{
                  if(item.action) item.action();
                  else setView(item.id);
                }}
              >
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:22}}>{item.icon}</div>
                <span>{item.label}</span>
              </button>
            );
          })}
          <div style={{flex:1}}/>
          {isAdmin&&(
            <button onClick={insertTestBooking} className="sidebar-btn" style={{height:46,fontSize:9,opacity:.8,gap:3,flexDirection:"column",background:"rgba(217,119,6,.3)",borderColor:"rgba(217,119,6,.5)"}}>
              <span style={{fontSize:14}}>🧪</span>
              <span>テスト<br/>予約</span>
            </button>
          )}
          <button onClick={fetchAll} className="sidebar-btn" style={{height:42,fontSize:10,opacity:.7,gap:4,flexDirection:"row"}}>
            <SvgRefresh/><span>同期</span>
          </button>
        </div>

        {/* ===== メインコンテンツ ===== */}
        <div style={{flex:1,padding:16,minWidth:0,overflowY:"auto"}}>

          {/* スタッフフィルター（カレンダー・一覧のみ） */}
          {(view==="calendar"||view==="list")&&(
            <div className="staff-filter">
              {isAdmin&&(<button onClick={()=>setSelStaff(null)} className="staff-chip" style={{background:!selStaff?"#1e3a5f":"white",color:!selStaff?"white":"#374151",borderColor:!selStaff?"#1e3a5f":"#e2e8f0",boxShadow:!selStaff?"0 2px 8px rgba(30,58,95,.35)":"0 1px 3px rgba(0,0,0,.08)"}}>全員</button>)}
              {STAFF_ACCOUNTS.map(s=>(<button key={s.id} onClick={()=>setSelStaff(s.id)} className="staff-chip" style={{background:selStaff===s.id?s.color:"white",color:selStaff===s.id?"white":"#374151",borderColor:selStaff===s.id?s.color:"#e2e8f0",boxShadow:selStaff===s.id?`0 2px 8px ${s.color}55`:"0 1px 3px rgba(0,0,0,.08)"}}>{s.name}</button>))}
            </div>
          )}

          {/* カレンダービュー */}
          {view==="calendar"&&(()=>{
            const DAYS_JP=["日","月","火","水","木","金","土"];
            function getWeekStart(d){const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);return mon;}
            const weekStart=getWeekStart(baseDate);
            const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);return d;});
            const ds=fmtDate(baseDate);

            function prevWeek(){const d=new Date(weekStart);d.setDate(d.getDate()-7);setBaseDate(d);}
            function nextWeek(){const d=new Date(weekStart);d.setDate(d.getDate()+7);setBaseDate(d);}

            const MINS=Array.from({length:54},(_,i)=>{const totalMin=i*10,h=9+Math.floor(totalMin/60),m=totalMin%60;if(h>18||(h===18&&m>0))return null;return{h,m,label:`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`};}).filter(Boolean);
            const TOTAL_MINS=MINS.length;
            const HEADER_W=100;
            const screenW=Math.max(window.innerWidth-130-48,600);
            const CELL_W=Math.max(Math.floor((screenW-HEADER_W)/TOTAL_MINS),12);

            const staffList=STAFF_ACCOUNTS;
            const filteredStaff=selStaff?staffList.filter(s=>s.id===selStaff):staffList;

            function timeToX(timeStr){const[h,m]=timeStr.split(":").map(Number);return((h-9)*60+m)/10*CELL_W;}
            function durationToW(b){return(b.duration||DURATION[b.menu]||30)/10*CELL_W;}

            // 30分スロット集計
            const timeSlots30=[];
            for(let h=9;h<18;h++){for(let m=0;m<60;m+=30){
              const label=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
              const booked=bookings.filter(b=>{if(b.date!==ds)return false;const bs=toMin(b.time),be=bs+(b.duration||DURATION[b.menu]||30),ss=toMin(label),se=ss+30;return bs<se&&ss<be;}).length;
              const resting=breaks.filter(b=>b.date===ds&&b.time===label).length;
              const available=Math.max(0,filteredStaff.length-resting);
              timeSlots30.push({label,booked,available,x:(h-9)*60/10*CELL_W+m/10*CELL_W,w:30/10*CELL_W});
            }}

            return(
              <div className="card">
                {/* 曜日タブナビ */}
                <div style={{display:"flex",alignItems:"center",background:"linear-gradient(135deg,#0f2744,#1e4d8c)",padding:"8px 10px",gap:4,overflowX:"auto"}}>
                  <button onClick={prevWeek} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",borderRadius:8,width:32,height:32,cursor:"pointer",fontWeight:800,fontSize:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>◀</button>
                  {weekDates.map(d=>{
                    const dStr=fmtDate(d);
                    const isSelected=dStr===ds;
                    const isToday=dStr===todayStr;
                    const isSun=d.getDay()===0,isSat=d.getDay()===6;
                    const cnt=bookings.filter(b=>b.date===dStr).length;
                    return(
                      <button key={dStr} onClick={()=>setBaseDate(new Date(dStr+"T00:00:00"))}
                        style={{flex:1,minWidth:72,padding:"6px 4px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:800,fontSize:12,textAlign:"center",transition:"all .15s",
                          background:isSelected?"#d97706":isToday?"rgba(255,255,255,.25)":"rgba(255,255,255,.1)",
                          color:"white",boxShadow:isSelected?"0 2px 8px rgba(217,119,6,.5)":"none"}}>
                        <div>{d.getMonth()+1}/{d.getDate()}({DAYS_JP[d.getDay()]})</div>
                        {cnt>0&&<div style={{fontSize:10,opacity:.8,marginTop:1}}>{cnt}件</div>}
                      </button>
                    );
                  })}
                  <button onClick={nextWeek} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",borderRadius:8,width:32,height:32,cursor:"pointer",fontWeight:800,fontSize:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>
                </div>

                {/* 日付ピッカー */}
                <div style={{padding:"6px 12px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,background:"#f8fafc"}}>
                  <span style={{fontSize:13,fontWeight:800,color:"#1e3a5f"}}>{baseDate.getFullYear()}年{baseDate.getMonth()+1}月{baseDate.getDate()}日（{DAYS_JP[baseDate.getDay()]}）</span>
                  {ds!==todayStr&&<button className="btn btn-outline btn-xs" onClick={()=>setBaseDate(new Date())}>今日</button>}
                  <input type="date" value={ds} onChange={e=>{if(e.target.value)setBaseDate(new Date(e.target.value+"T00:00:00"));}}
                    style={{marginLeft:"auto",padding:"3px 8px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:12,color:"#374151",cursor:"pointer"}}/>
                </div>

                <div style={{overflowX:"auto"}}>
                  <div style={{minWidth:HEADER_W+TOTAL_MINS*CELL_W+20}}>

                    {/* 対応可能 / 予約数 行 */}
                    <div style={{display:"flex",borderBottom:"1px solid #e2e8f0"}}>
                      <div style={{width:HEADER_W,flexShrink:0,borderRight:"1px solid #e2e8f0",background:"#f8fafc",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"3px 4px",gap:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:"#2563eb"}}></div><span style={{fontSize:9,color:"#64748b",fontWeight:700}}>対応可能</span></div>
                        <div style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:8,height:8,borderRadius:2,background:"#059669"}}></div><span style={{fontSize:9,color:"#64748b",fontWeight:700}}>予約数</span></div>
                      </div>
                      <div style={{position:"relative",flex:1,height:34}}>
                        {timeSlots30.map(slot=>(
                          <div key={slot.label} style={{position:"absolute",left:slot.x,top:0,width:slot.w-1,height:"100%",display:"flex",flexDirection:"column",borderRight:"1px solid #e2e8f0"}}>
                            <div style={{flex:1,background:"#2563eb",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,fontWeight:800,color:"white"}}>{slot.available}</span></div>
                            <div style={{flex:1,background:"#059669",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,fontWeight:800,color:"white"}}>{slot.booked}</span></div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 時間ヘッダー */}
                    <div style={{display:"flex",borderBottom:"2px solid #e2e8f0",background:"#f8fafc"}}>
                      <div style={{width:HEADER_W,flexShrink:0,padding:"5px 8px",fontWeight:700,fontSize:11,color:"#64748b",borderRight:"1px solid #e2e8f0"}}>スタッフ</div>
                      <div style={{position:"relative",height:24,flex:1}}>
                        {MINS.filter((_,i)=>i%3===0).map(({h,m,label})=>(
                          <div key={label} style={{position:"absolute",left:(h-9)*60/10*CELL_W+m/10*CELL_W,top:0,height:"100%",borderLeft:"1px solid #e2e8f0",paddingLeft:2,display:"flex",alignItems:"center"}}>
                            <span style={{fontSize:9,fontWeight:600,color:"#94a3b8",whiteSpace:"nowrap"}}>{label}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* スタッフ行 */}
                    {filteredStaff.map(staff=>{
                      const staffBookings=bookings.filter(b=>b.date===ds&&b.staff_id===staff.id);
                      const staffBreaks=breaks.filter(b=>b.date===ds&&b.staff_id===staff.id);
                      return(
                        <div key={staff.id} style={{display:"flex",borderBottom:"1px solid #f1f5f9",minHeight:52}}>
                          <div style={{width:HEADER_W,flexShrink:0,padding:"6px 8px",borderRight:"1px solid #e2e8f0",background:"#fafbfc",display:"flex",alignItems:"center",gap:6}}>
                            <div style={{width:26,height:26,borderRadius:7,background:`linear-gradient(135deg,${staff.color},${staff.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:11,flexShrink:0,boxShadow:`0 2px 5px ${staff.color}44`}}>{staff.initial}</div>
                            <div>
                              <div style={{fontWeight:700,fontSize:11,color:"#1e293b",lineHeight:1.2}}>{staff.name}</div>
                              <div style={{fontSize:10,color:staff.color,fontWeight:700}}>{staffBookings.length}件</div>
                            </div>
                          </div>
                          <div style={{position:"relative",flex:1,minHeight:52,cursor:"pointer",background:ds===todayStr?"#fafeff":"white"}}
                            onClick={e=>{
                              const rect=e.currentTarget.getBoundingClientRect();
                              const x=e.clientX-rect.left;
                              const totalMinFromStart=Math.round(x/CELL_W)*10;
                              const h=9+Math.floor(totalMinFromStart/60);
                              const m=totalMinFromStart%60;
                              if(h>=9&&h<=17){openAdd(ds,`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);setForm(f=>f?{...f,staff_id:staff.id}:f);}
                            }}>
                            {MINS.filter((_,i)=>i%3===0).map(({h,m,label})=>(
                              <div key={label} style={{position:"absolute",left:(h-9)*60/10*CELL_W+m/10*CELL_W,top:0,bottom:0,borderLeft:"1px solid #f1f5f9",pointerEvents:"none"}}/>
                            ))}
                            {staffBreaks.map(br=>(
                              <div key={`br-${br.id}`} style={{position:"absolute",left:timeToX(br.time),top:4,bottom:4,width:CELL_W*3,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,pointerEvents:"none"}}>
                                <span style={{fontSize:9,color:"#94a3b8",fontWeight:600}}>{br.reason}</span>
                              </div>
                            ))}
                            {staffBookings.map(b=>{
                              const x=timeToX(b.time);const w=durationToW(b);const cnt=visitCounts[b.id]||1;
                              const isPaid=paidBookingIds.has(b.id);
                              return(
                                <div key={b.id} onClick={e=>{e.stopPropagation();setBookingPopup({booking:b,x:e.clientX,y:e.clientY});}}
                                  style={{position:"absolute",left:x,top:3,bottom:3,width:Math.max(w-2,20),background:isPaid?"linear-gradient(135deg,#9ca3af,#6b7280)":`linear-gradient(135deg,${staff.color},${staff.color}bb)`,borderRadius:6,padding:"2px 5px",cursor:"pointer",boxShadow:isPaid?"0 1px 3px rgba(0,0,0,.2)":`0 2px 6px ${staff.color}44`,display:"flex",flexDirection:"column",justifyContent:"center",overflow:"hidden",zIndex:2,opacity:isPaid?.75:1}}>
                                  <div style={{fontWeight:800,fontSize:10,color:"white",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isPaid?"✓ ":""}{b.patient_name}</div>
                                  <div style={{fontSize:9,color:"rgba(255,255,255,.85)"}}>{b.time}{cnt>1&&<span style={{marginLeft:2,background:"rgba(255,255,255,.25)",borderRadius:2,padding:"0 2px"}}>{cnt}回</span>}</div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })()}

          {/* 患者管理 */}
          {view==="patients"&&<PatientsPanel bookings={bookings} onHistory={setHistoryPatient}/>}

          {/* サマリー */}
          {view==="stats"&&<StatsPanel bookings={bookings} payments={payments} todayStr={todayStr}/>}
          {view==="shift"&&<ShiftPanel currentUser={user}/>}

          {/* 予約フォーム */}
          {view==="form"&&form&&(
            <FormPanel form={form} setForm={setForm} editId={editId} conflict={conflict} setConflict={setConflict} isAdmin={isAdmin} bookings={bookings} save={save} onClose={()=>setView("calendar")} onDelete={()=>setDelConfirm(bookings.find(b=>b.id===editId))}/>
          )}
        </div>
      </div>

      {/* 予約ブロック アクションポップアップ */}
      {bookingPopup&&(()=>{
        const b=bookingPopup.booking;
        const s=STAFF_ACCOUNTS.find(x=>x.id===b.staff_id)||{color:"#888",name:"不明"};
        const cnt=visitCounts[b.id]||1;
        const posLeft=Math.min(bookingPopup.x, window.innerWidth-200);
        const posTop=Math.min(bookingPopup.y, window.innerHeight-220);
        return(
          <>
            {/* オーバーレイ（クリックで閉じる） */}
            <div onClick={()=>setBookingPopup(null)} style={{position:"fixed",inset:0,zIndex:300}}/>
            {/* ポップアップ */}
            <div style={{position:"fixed",left:posLeft,top:posTop,zIndex:400,background:"white",borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,.2)",width:190,overflow:"hidden",border:"1px solid #e2e8f0"}}>
              {/* ヘッダー */}
              <div style={{background:`linear-gradient(135deg,${s.color},${s.color}cc)`,padding:"10px 14px"}}>
                <div style={{fontWeight:800,fontSize:14,color:"white"}}>{b.patient_name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:2}}>{b.date}　{b.time}　{s.name}</div>
                {cnt>1&&<div style={{fontSize:10,color:"rgba(255,255,255,.7)",marginTop:1}}>{cnt}回目</div>}
              </div>
              {/* アクション */}
              <div style={{padding:8,display:"flex",flexDirection:"column",gap:4}}>
                <button onClick={()=>{
                  window.open(`pos.html?id=${b.id}`,"_blank");
                  setBookingPopup(null);
                }} style={{width:"100%",padding:"9px 12px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                  会計へ進む
                </button>
                <button onClick={()=>{
                  window.open(`treatment.html?id=${b.id}`,"_blank");
                  setBookingPopup(null);
                }} style={{width:"100%",padding:"9px 12px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  施術記録
                </button>
                <button onClick={()=>{setHistoryPatient(b.patient_name);setBookingPopup(null);}} style={{width:"100%",padding:"9px 12px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
                  来院履歴
                </button>
                {(isAdmin||b.staff_id===user.id)&&(
                  <button onClick={()=>{openEdit(b);setBookingPopup(null);}} style={{width:"100%",padding:"9px 12px",background:"#f8fafc",color:"#374151",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    予約を編集
                  </button>
                )}
              </div>
            </div>
          </>
        );
      })()}

      {historyPatient&&<PatientHistoryModal patientName={historyPatient} bookings={bookings} onClose={()=>setHistoryPatient(null)}/>}
      {showBreakModal&&<BreakModal onClose={()=>setShowBreakModal(false)} bookings={bookings} breaks={breaks} setBreaks={setBreaks}/>}

      {delConfirm&&(
        <div className="confirm-box">
          <div style={{background:"white",borderRadius:14,padding:24,maxWidth:300,width:"100%",boxShadow:"0 16px 48px rgba(0,0,0,.2)"}}>
            <div style={{width:52,height:52,background:"#fef2f2",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:24}}>🗑</div>
            <div style={{fontWeight:800,fontSize:16,textAlign:"center",marginBottom:6,color:"#1e293b"}}>削除しますか？</div>
            <div style={{color:"#64748b",fontSize:13,textAlign:"center",marginBottom:20,lineHeight:1.6}}>{delConfirm.patient_name}さん<br/>{delConfirm.date} {delConfirm.time}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} className="btn btn-outline" style={{flex:1,justifyContent:"center",padding:11}}>キャンセル</button>
              <button onClick={()=>del(delConfirm.id)} className="btn btn-danger" style={{flex:1,justifyContent:"center",padding:11}}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {toast&&(<div className="toast" style={{background:toast.type==="delete"?"#1e293b":"#059669",color:"white"}}>{toast.type==="delete"?"削除しました":"✓ "}{toast.msg}</div>)}
    </div>
  );
}

function App(){
  const [user,setUser]=React.useState(null);
  const [checking,setChecking]=React.useState(true);

  React.useEffect(()=>{
    async function restoreSession(){
      try{
        const session=await sb.getSession();
        const saved=sessionStorage.getItem("ando_user");
        if(session&&saved){
          setUser(JSON.parse(saved));
        }
      }catch{}
      setChecking(false);
    }
    restoreSession();
  },[]);

  function handleLogin(u){
    try{sessionStorage.setItem("ando_user",JSON.stringify(u));}catch{}
    setUser(u);
  }
  function handleLogout(){
    try{sessionStorage.removeItem("ando_user");}catch{}
    sb.logout();
    setUser(null);
  }

  if(checking)return(<div className="loading"><div className="loading-spinner"></div><div style={{fontWeight:700,color:"#1e3a5f",fontSize:14}}>確認中...</div></div>);
  if(!user)return <LoginScreen onLogin={handleLogin}/>;
  return <Dashboard user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
