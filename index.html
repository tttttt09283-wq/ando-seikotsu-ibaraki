// 全itemsをフラット化するヘルパー
function allCatItems(cat){ return cat.subs.flatMap(s=>s.items); }

// 後方互換：全メニュー名一覧・時間マップ
const MENUS = MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>i.name));
const DURATION = Object.fromEntries(MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>[i.name,i.duration])));
const MENU_PRICE = Object.fromEntries(MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>[i.name,i.price])));
const DURATION_OPTIONS = Array.from({length:12},(_,i)=>(i+1)*10); // 10〜120分

const SLOTS = (()=>{const s=[];for(let h=9;h<=19;h++){for(let m=0;m<60;m+=10){if(h===19&&m>0) break;s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);}}return s;})();

// Supabase公式クライアント（Authセッション管理付き）
// storage を sessionStorage にすることで「タブを閉じるまでログイン維持」を実現
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: window.sessionStorage, persistSession: true, autoRefreshToken: true }
});

const sb = {
  async query(table,method="GET",body=null,filters=""){
    // ログイン中ならセッショントークンを、未ログインならanonキーを使う
    const {data:{session}} = await supabaseClient.auth.getSession();
    const token = session ? session.access_token : SUPABASE_ANON_KEY;
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${filters}`,{
      method,headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${token}`,"Content-Type":"application/json","Prefer":"return=representation"},
      body:body?JSON.stringify(body):null,
    });
    const text=await res.text();return text?JSON.parse(text):[];
  },
  select:(t,f="")=>sb.query(t,"GET",null,f),
  insert:(t,d)=>sb.query(t,"POST",d),
  update:(t,id,d)=>sb.query(t,"PATCH",d,`?id=eq.${id}`),
  delete:(t,id)=>sb.query(t,"DELETE",null,`?id=eq.${id}`),

  // ===== Auth関連 =====
  async login(email,password){
    const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});
    if(error) throw error;
    return data;
  },
  async logout(){
    await supabaseClient.auth.signOut();
  },
  async getSession(){
    const {data:{session}}=await supabaseClient.auth.getSession();
    return session;
  },
};

const today=new Date();
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function getWeekDates(base){
  const day=base.getDay(),mon=new Date(base);
  mon.setDate(base.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function overlaps(a,b){
  const as=toMin(a.time),ae=as+(a.duration||DURATION[a.menu]||30),bs=toMin(b.time),be=bs+(b.duration||DURATION[b.menu]||30);
  return as<be&&bs<ae;
}

function BreakModal({onClose,bookings,breaks,setBreaks}){
  const [selDate,setSelDate]=React.useState(fmtDate(today));

  const [reason,setReason]=React.useState("休憩");
  const [saving,setSaving]=React.useState(false);
  const [toast,setToast]=React.useState("");
  const todayBreaks=breaks.filter(b=>b.date===selDate);
  async function addBreak(){
    if(selTimes.length===0){setToast("時間帯を選択してください");setTimeout(()=>setToast(""),2500);return;}
    setSaving(true);
    try{
      const newBreaks=[];
      for(const t of selTimes){
        const data=await sb.insert("staff_breaks",{staff_id:selStaff,date:selDate,time:t,reason});
        if(Array.isArray(data)&&data.length>0)newBreaks.push(...data);
        else newBreaks.push({id:Date.now()+Math.random(),staff_id:selStaff,date:selDate,time:t,reason});
      }
      setBreaks(prev=>[...prev,...newBreaks]);setSelTimes([]);
      setToast(selTimes.length+"件登録しました");setTimeout(()=>setToast(""),2500);
    }catch(e){setToast("エラー");setTimeout(()=>setToast(""),3000);}
    setSaving(false);

    try{await sb.delete("staff_breaks",id);}catch{}

          <div style={{background:"#f8fafc",borderRadius:10,padding:14,marginBottom:18,border:"1px solid #e2e8f0"}}>
            <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>休憩を登録</div>

// ===== 分析ダッシュボード =====
function StatsPanel({bookings,payments,todayStr}){
  const today=new Date(todayStr+"T00:00:00");
  const fmt=n=>"¥"+Number(n||0).toLocaleString();
  const DAYS_JP=["日","月","火","水","木","金","土"];

  // 期間設定
  function getRange(type){
    const now=new Date(todayStr+"T00:00:00");
    const pad=n=>String(n).padStart(2,"0");
    const toStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if(type==="today") return{start:todayStr,end:todayStr};
    if(type==="month"){const s=new Date(now.getFullYear(),now.getMonth(),1);const e=new Date(now.getFullYear(),now.getMonth()+1,0);return{start:toStr(s),end:toStr(e)};}
    if(type==="last_month"){const s=new Date(now.getFullYear(),now.getMonth()-1,1);const e=new Date(now.getFullYear(),now.getMonth(),0);return{start:toStr(s),end:toStr(e)};}
    if(type==="3months"){const s=new Date(now.getFullYear(),now.getMonth()-2,1);return{start:toStr(s),end:todayStr};}
    if(type==="6months"){const s=new Date(now.getFullYear(),now.getMonth()-5,1);return{start:toStr(s),end:todayStr};}
    if(type==="1year"){const s=new Date(now.getFullYear()-1,now.getMonth()+1,1);return{start:toStr(s),end:todayStr};}
    return{start:todayStr,end:todayStr};
  }

  const [rangeType,setRangeType]=React.useState("month");
  const [customStart,setCustomStart]=React.useState(todayStr.slice(0,7)+"-01");
  const [customEnd,setCustomEnd]=React.useState(todayStr);

  const range=rangeType==="custom"?{start:customStart,end:customEnd}:getRange(rangeType);
  const inRange=(d)=>d>=range.start&&d<=range.end;

  // 期間内の予約・会計
  const bks=bookings.filter(b=>b.date&&inRange(b.date));
  const pays=payments.filter(p=>p.payment_date&&inRange(p.payment_date));

  // === 指標計算 ===
  const totalBk=bks.length;
  const paidBk=pays.length;
  const cancelledBk=bks.filter(b=>b.cancelled).length;
  const confirmedBk=totalBk-cancelledBk;

  // 売上
  const totalSales=pays.reduce((s,p)=>s+(p.total_amount||0),0);
  const insSales=pays.reduce((s,p)=>s+(p.insurance_amount||0),0);
  const jifeeSales=pays.reduce((s,p)=>s+(p.jifee_amount||0),0);

  // ユニーク患者
  const uniquePatients=[...new Set(bks.map(b=>b.patient_name))];
  const totalUnique=uniquePatients.length;
  const allPatientDates={};
  bookings.forEach(b=>{if(!allPatientDates[b.patient_name])allPatientDates[b.patient_name]=[];allPatientDates[b.patient_name].push(b.date);});
  let newCount=0,revisitCount=0;
  uniquePatients.forEach(name=>{
    const all=(allPatientDates[name]||[]).sort();
    const first=all[0];
    if(first&&first>=range.start&&first<=range.end) newCount++;
    else revisitCount++;
  });
  const newRate=totalUnique>0?Math.round(newCount/totalUnique*100):0;

  // 単価・LTV
  const allUnitPrice=paidBk>0?Math.round(totalSales/paidBk):0;
  const ltv=totalUnique>0?Math.round(totalSales/totalUnique):0;

  // 離反（30日以上未来院）
  const cutoff=new Date(today);cutoff.setDate(cutoff.getDate()-30);
  const cutoffStr=cutoff.toISOString().split("T")[0];
  const allUnique=[...new Set(bookings.map(b=>b.patient_name))];
  const churnCount=allUnique.filter(name=>{
    const last=(allPatientDates[name]||[]).sort().slice(-1)[0];
    return last&&last<cutoffStr&&!bks.some(b=>b.patient_name===name);
  }).length;
  const churnRate=allUnique.length>0?((churnCount/allUnique.length)*100).toFixed(1):"0";

  // 曜日別
  const dayCount=[0,0,0,0,0,0,0];
  bks.forEach(b=>{if(b.date){const d=new Date(b.date+"T00:00:00");dayCount[d.getDay()]++;}});
  const maxDay=Math.max(...dayCount,1);

  // 時間帯別（時間を取得）
  const hourCount={};
  bks.forEach(b=>{if(b.time){const h=parseInt(b.time.split(":")[0]);hourCount[h]=(hourCount[h]||0)+1;}});
  const hourEntries=Object.entries(hourCount).sort((a,b)=>Number(a[0])-Number(b[0]));
  const maxHour=Math.max(...Object.values(hourCount),1);

  // コース別（menu）
  const menuCount={};
  bks.forEach(b=>{if(b.menu)menuCount[b.menu]=(menuCount[b.menu]||0)+1;});
  const menuEntries=Object.entries(menuCount).sort((a,b)=>b[1]-a[1]);
  const maxMenu=Math.max(...Object.values(menuCount),1);

  // 月別推移（全期間の月別予約数）
  const monthlyMap={};
  bookings.forEach(b=>{if(b.date){const m=b.date.slice(0,7);monthlyMap[m]=(monthlyMap[m]||0)+1;}});
  const monthlyEntries=Object.entries(monthlyMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12);
  const maxMonthly=Math.max(...monthlyEntries.map(e=>e[1]),1);

  // インサイト
  const peakDay=dayCount.indexOf(Math.max(...dayCount));
  const peakHour=hourEntries.length>0?hourEntries.reduce((a,b)=>b[1]>a[1]?b:a,hourEntries[0]):null;

  const rangeButtons=[
    {id:"month",label:"今月"},
    {id:"last_month",label:"先月"},
    {id:"3months",label:"3ヶ月"},
    {id:"6months",label:"半年"},
    {id:"1year",label:"1年"},
    {id:"custom",label:"カスタム"},
  ];

  const cardStyle={background:"white",borderRadius:12,padding:"16px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"};

  // バーチャート（水平）
  function HBar({label,count,max,color="#059669",highlight}){
    const pct=max>0?Math.round(count/max*100):0;
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <div style={{width:24,fontSize:12,color:highlight?"#ef4444":"#374151",fontWeight:highlight?800:600,textAlign:"right",flexShrink:0}}>{label}</div>
        <div style={{flex:1,height:18,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:highlight?"#ef4444":color,borderRadius:4,transition:"width .3s"}}/>
        </div>
        <div style={{width:28,fontSize:12,fontWeight:700,color:"#374151",textAlign:"right",flexShrink:0}}>{count}</div>
        {highlight&&<span style={{fontSize:10,fontWeight:800,color:"#ef4444",background:"#fee2e2",padding:"1px 5px",borderRadius:4}}>最多</span>}
      </div>
    );
  }

  return(
    <div style={{maxWidth:900,margin:"0 auto"}}>

      {/* 期間選択 */}
      <div style={{...cardStyle,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="date" value={customStart} onChange={e=>{setCustomStart(e.target.value);setRangeType("custom");}}
              style={{padding:"6px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontWeight:600}}/>
            <span style={{color:"#94a3b8",fontSize:13}}>〜</span>
            <input type="date" value={customEnd} onChange={e=>{setCustomEnd(e.target.value);setRangeType("custom");}}
              style={{padding:"6px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontWeight:600}}/>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {rangeButtons.filter(b=>b.id!=="custom").map(b=>(
              <button key={b.id} onClick={()=>setRangeType(b.id)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,border:"1.5px solid",borderColor:rangeType===b.id?"#059669":"#e2e8f0",background:rangeType===b.id?"#059669":"white",color:rangeType===b.id?"white":"#374151",cursor:"pointer",fontFamily:"inherit"}}>{b.label}</button>
            ))}
          </div>
        </div>
        <div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>期間：{range.start} 〜 {range.end}</div>
      </div>

      {/* 予約サマリー */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
        {[
          {label:"総予約数",value:totalBk,color:"#374151",icon:"📋"},
          {label:"来院済み",value:paidBk,color:"#059669",icon:"✅"},
          {label:"確定・受付",value:confirmedBk,color:"#2563eb",icon:"📅"},
          {label:"キャンセル",value:cancelledBk,color:"#ef4444",icon:"❌"},
        ].map(item=>(
          <div key={item.label} style={{...cardStyle,textAlign:"center",marginBottom:0,padding:"14px 10px"}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:6}}>{item.label}</div>
            <div style={{fontSize:28,fontWeight:800,color:item.color}}>{item.value}</div>
          </div>
        ))}
      </div>

      {/* 売上・単価 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:12}}>
        <div style={{...cardStyle,marginBottom:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>売上サマリー</div>
          {[{label:"月計売上",val:totalSales,color:"#d97706"},{label:"保険窓口計",val:insSales,color:"#2563eb"},{label:"自費売上計",val:jifeeSales,color:"#059669"}].map(item=>(
            <div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
              <span style={{fontSize:12,color:"#64748b"}}>{item.label}</span>
              <span style={{fontSize:14,fontWeight:800,color:item.color}}>{fmt(item.val)}</span>
            </div>
          ))}
        </div>
        <div style={{...cardStyle,marginBottom:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>単価・LTV</div>
          {[
            {label:"全体単価",val:fmt(allUnitPrice),sub:"会計1件あたり",color:"#1e3a5f"},
            {label:"LTV（月間）",val:fmt(ltv),sub:"売上÷患者数",color:"#d97706"},
            {label:"新規来院率",val:newRate+"%",sub:`新規${newCount}名 / 全${totalUnique}名`,color:"#059669"},
            {label:"離反率",val:churnRate+"%",sub:`${churnCount}名が30日以上未来院`,color:"#ef4444"},
          ].map(item=>(
            <div key={item.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div><div style={{fontSize:12,color:"#64748b"}}>{item.label}</div><div style={{fontSize:10,color:"#94a3b8"}}>{item.sub}</div></div>
              <span style={{fontSize:15,fontWeight:800,color:item.color}}>{item.val}</span>
            </div>
          ))}
        </div>
      </div>

      {/* 曜日・時間帯 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div style={{...cardStyle,marginBottom:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>予約希望の曜日</div>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>曜日別</div>
          {DAYS_JP.map((d,i)=>(
            <HBar key={d} label={d} count={dayCount[i]} max={maxDay} color={i===0?"#ef4444":i===6?"#7c3aed":"#059669"} highlight={dayCount[i]===Math.max(...dayCount)&&dayCount[i]>0}/>
          ))}
        </div>
        <div style={{...cardStyle,marginBottom:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>予約希望の時間帯</div>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>時間帯別</div>
          {hourEntries.length===0?<div style={{textAlign:"center",color:"#94a3b8",fontSize:12,padding:16}}>データなし</div>:
            hourEntries.map(([h,c])=>(
              <HBar key={h} label={h+"時"} count={c} max={maxHour} color="#7c3aed" highlight={c===maxHour}/>
            ))
          }
        </div>
      </div>

      {/* 月別推移・コース別 */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div style={{...cardStyle,marginBottom:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:16}}>月別予約数推移</div>
          {monthlyEntries.length===0?<div style={{textAlign:"center",color:"#94a3b8",fontSize:12,padding:16}}>データなし</div>:(
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100,padding:"0 4px"}}>
              {monthlyEntries.map(([m,c])=>{
                const pct=maxMonthly>0?Math.round(c/maxMonthly*100):0;
                const isCurrent=m===todayStr.slice(0,7);
                return(
                  <div key={m} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:9,color:"#94a3b8",fontWeight:600}}>{c}</div>
                    <div style={{width:"100%",height:`${Math.max(pct,4)}%`,background:isCurrent?"#059669":"#bfdbfe",borderRadius:"3px 3px 0 0",minHeight:4}}/>
                    <div style={{fontSize:9,color:"#94a3b8",whiteSpace:"nowrap"}}>{m.slice(5)}月</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div style={{...cardStyle,marginBottom:0}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>コース別</div>
          {menuEntries.length===0?<div style={{textAlign:"center",color:"#94a3b8",fontSize:12,padding:16}}>データなし</div>:
            menuEntries.map(([menu,count])=>(
              <div key={menu} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#059669",flexShrink:0}}/>
                <div style={{flex:1,fontSize:12,color:"#374151",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{menu}</div>
                <div style={{width:120,height:8,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.round(count/maxMenu*100)}%`,background:"#059669",borderRadius:4}}/>
                </div>
                <div style={{fontSize:12,fontWeight:700,color:"#374151",minWidth:28,textAlign:"right"}}>{count}</div>
              </div>
            ))
          }
        </div>
      </div>

      {/* 来院タイプ */}
      <div style={{...cardStyle,marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>来院タイプ</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[
            {label:"初めて",count:newCount,color:"#059669"},
            {label:"リピーター",count:revisitCount,color:"#d97706"},
          ].map(item=>{
            const pct=totalUnique>0?Math.round(item.count/totalUnique*100):0;
            return(
              <div key={item.label} style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:item.color,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#374151",fontWeight:600,marginBottom:4}}>{item.label}</div>
                  <div style={{height:8,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:item.color,borderRadius:4}}/>
                  </div>
                </div>
                <div style={{fontSize:12,fontWeight:700,color:"#374151",whiteSpace:"nowrap"}}>{item.count}件 {pct}%</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* インサイト */}
      <div style={{...cardStyle,background:"#f0fdf4",border:"1px solid #86efac",marginBottom:0}}>
        <div style={{fontWeight:800,fontSize:13,color:"#065f46",marginBottom:12}}>インサイト</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[
            {label:"予約が多い曜日",value:dayCount.some(c=>c>0)?DAYS_JP[peakDay]+"曜日":"—",sub:dayCount[peakDay]+"件",color:"#059669"},
            {label:"予約が多い時間帯",value:peakHour?peakHour[0]+"時台":"—",sub:peakHour?peakHour[1]+"件":"",color:"#2563eb"},
            {label:"新規来院率",value:newRate+"%",sub:`新規${newCount}名`,color:"#d97706"},
            {label:"平均単価",value:fmt(allUnitPrice),sub:"1件あたり",color:"#1e3a5f"},
            {label:"離反率",value:churnRate+"%",sub:churnCount+"名が離反",color:parseFloat(churnRate)>20?"#ef4444":"#374151"},
            {label:"LTV（月間）",value:fmt(ltv),sub:"売上÷患者数",color:"#7c3aed"},
          ].map(item=>(
            <div key={item.label} style={{background:"white",borderRadius:10,padding:"12px 14px",border:"1px solid #dcfce7"}}>
              <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{item.label}</div>
              <div style={{fontSize:20,fontWeight:800,color:item.color}}>{item.value}</div>
              <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{item.sub}</div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}


function FormPanel({form,setForm,editId,conflict,setConflict,isAdmin,bookings,save,onClose,onDelete,businessHours,closures}){
  const [searchQ,setSearchQ]=React.useState("");
  const [searchResults,setSearchResults]=React.useState([]);
  const [searching,setSearching]=React.useState(false);
  const [showSearch,setShowSearch]=React.useState(editId===null&&!form.patient_name);
  const [selCategory,setSelCategory]=React.useState(MENU_CATEGORIES[0].id);
  const [selSub,setSelSub]=React.useState(MENU_CATEGORIES[0].subs[0].id);

  const selectedMenus=form.menus||[];
  const totalPrice=selectedMenus.reduce((s,m)=>s+(MENU_PRICE[m]||0),0);
  const visitCount=React.useMemo(()=>{
    if(!form.patient_name) return 0;
    const prev=bookings.filter(b=>b.patient_name===form.patient_name&&b.id!==editId);
    return prev.length+1;
  },[form.patient_name,bookings,editId]);

  // ===== 営業時間・臨時休業日ヘルパー =====
  const bh=businessHours||[];
  const tc=closures||[];
  function getDayHours(dayOfWeek){
    return bh.find(h=>h.day_of_week===dayOfWeek)||null;
  }
  const dateClosedByTemp=form.date?tc.some(c=>c.date===form.date):false;
  const dayHoursForDate=form.date?getDayHours(new Date(form.date+"T00:00:00").getDay()):null;
  const dateClosedByWeekday=bh.length>0&&dayHoursForDate&&dayHoursForDate.is_open===false;
  const isSelectedDateClosed=dateClosedByTemp||dateClosedByWeekday;
  function isTimeAllowed(t){
    if(!form.date) return true;
    if(bh.length===0) return true;
    const dh=getDayHours(new Date(form.date+"T00:00:00").getDay());
    if(!dh||dh.is_open===false) return false;
    const tm=toMin(t);
    const openM=toMin(dh.open_time||"09:00");
    const closeM=toMin(dh.close_time||"19:00");
    if(tm<openM||tm>=closeM) return false;
    const brs=dh.break_times||[];
    for(const br of brs){
      const bs=toMin(br.start),be=toMin(br.end);
      if(tm>=bs&&tm<be) return false;
    }
    return true;
  }

  function toggleMenu(name,dur){
    const next=selectedMenus.includes(name)?selectedMenus.filter(m=>m!==name):[...selectedMenus,name];
    const maxDur=next.length>0?Math.max(...next.map(m=>DURATION[m]||30)):dur;
    setForm(f=>({...f,menus:next,menu:next[0]||"",duration:maxDur}));
  }

  async function searchPatients(q){
    if(!q.trim()){setSearchResults([]);return;}
    setSearching(true);
    try{
      const [byName,byKarte]=await Promise.all([
        sb.select("bookings","?patient_name=ilike.*"+encodeURIComponent(q)+"*&order=date.desc&limit=20"),
        sb.select("bookings","?karte_no=eq."+encodeURIComponent(q)+"&order=date.desc&limit=10")
      ]);
      const all=[...(Array.isArray(byName)?byName:[]),...(Array.isArray(byKarte)?byKarte:[])];
      const seen={};const unique=[];
      all.forEach(b=>{const key=b.patient_name;if(!seen[key]){seen[key]=true;unique.push(b);}});
      setSearchResults(unique.slice(0,10));
    }catch(e){console.error(e);}
    setSearching(false);
  }

  function selectPatient(b){
    setForm(f=>({...f,patient_name:b.patient_name,phone:b.phone||"",karte_no:b.karte_no||"",line_user_id:b.line_user_id||null,line_notify:!!b.line_user_id}));
    setSearchQ("");setSearchResults([]);setShowSearch(false);
  }

  return(
    <div className="card" style={{maxWidth:520,padding:22}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f"}}>{editId!==null?"予約を編集":"新規予約"}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8",lineHeight:1}}>x</button>
      </div>
      {conflict&&<div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#dc2626",fontSize:13,fontWeight:700}}>ダブルブッキングになります</div>}
      {showSearch?(
        <div style={{background:"#f0f9ff",borderRadius:10,padding:14,marginBottom:16,border:"1px solid #bae6fd"}}>
          <div style={{fontWeight:800,fontSize:13,color:"#0369a1",marginBottom:10}}>既存患者を検索</div>
          <div style={{position:"relative",marginBottom:8}}>
            <input className="form-input" placeholder="患者名またはカルテ番号で検索..." value={searchQ} onChange={e=>{setSearchQ(e.target.value);searchPatients(e.target.value);}} style={{paddingRight:40}} autoFocus/>
            {searching&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#94a3b8"}}>検索中...</div>}
          </div>
          {searchResults.length>0&&(
            <div style={{background:"white",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden",maxHeight:220,overflowY:"auto"}}>
              {searchResults.map((b,i)=>(
                <button key={i} onClick={()=>selectPatient(b)} style={{width:"100%",padding:"10px 14px",background:"none",border:"none",borderBottom:"1px solid #f1f5f9",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{b.patient_name}</div>
                    <div style={{fontSize:12,color:"#64748b"}}>{b.phone||""}</div>
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",textAlign:"right"}}>
                    <div>{b.date}</div>
                    {b.line_user_id&&<div style={{color:"#059669",fontWeight:700}}>LINE</div>}
                  </div>
                </button>
              ))}
            </div>
          )}
          {searchQ&&!searching&&searchResults.length===0&&<div style={{fontSize:13,color:"#94a3b8",textAlign:"center",padding:"8px 0"}}>該当患者なし</div>}
          <button onClick={()=>setShowSearch(false)} className="btn btn-outline btn-sm" style={{marginTop:8,width:"100%",justifyContent:"center"}}>新規患者として入力</button>
        </div>
      ):(
        <div style={{marginBottom:14}}>
          {form.patient_name&&(
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",marginBottom:10,border:"1px solid #bbf7d0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{form.patient_name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{form.phone}</div>
                {visitCount>0&&<div style={{fontSize:11,color:"#059669",fontWeight:700}}>来院{visitCount}回目</div>}
              </div>
              {editId===null&&<button onClick={()=>setShowSearch(true)} className="btn btn-outline btn-xs">変更</button>}
            </div>
          )}
        </div>
      )}
      {!showSearch&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:14}}>
          <div><label className="form-label">患者名 *</label><input className="form-input" value={form.patient_name||""} placeholder="山本 花子" onChange={e=>{setForm(f=>({...f,patient_name:e.target.value}));setConflict(false);}}/></div>
          <div style={{minWidth:110}}><label className="form-label">カルテ番号</label><input className="form-input" value={form.karte_no||""} placeholder="K-001" onChange={e=>setForm(f=>({...f,karte_no:e.target.value}))}/></div>
        </div>
      )}
      <div className="form-group"><label className="form-label">電話番号</label><input type="tel" className="form-input" value={form.phone||""} placeholder="090-0000-0000" onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div><label className="form-label">日付</label><input type="date" className="form-input" value={form.date||""} onChange={e=>{setForm(f=>({...f,date:e.target.value,time:""}));setConflict(false);}}/></div>
        <div>
          <label className="form-label">時間</label>
          <select className="form-input" value={form.time||""} onChange={e=>{setForm(f=>({...f,time:e.target.value}));setConflict(false);}} disabled={isSelectedDateClosed}>
            <option value="">選択</option>
            {SLOTS.map(t=>{
              const allowed=isTimeAllowed(t);
              return <option key={t} value={t} disabled={!allowed} style={{color:allowed?"inherit":"#d1d5db"}}>{t}{allowed?"":" ×休業"}</option>;
            })}
          </select>
        </div>
      </div>
      {isSelectedDateClosed&&(
        <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#dc2626",fontSize:13,fontWeight:700}}>
          ⚠ この日は{dateClosedByTemp?"臨時休業日":"定休日"}に設定されています。予約を入れる場合は営業時間・休憩時間設定をご確認ください。
        </div>
      )}
      {isAdmin&&(
        <div className="form-group">
          <label className="form-label">担当スタッフ</label>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {STAFF_ACCOUNTS.map(s=>(

// ===== 営業時間・休憩パネル =====
function BusinessHoursPanel(){
  const DAYS_JP=["日","月","火","水","木","金","土"];
  const DAY_COLORS=["#ef4444","#374151","#374151","#374151","#374151","#374151","#7c3aed"];
  const DEFAULT_HOURS=DAYS_JP.map((_,i)=>({day:i,is_open:i!==0,open_time:"09:00",close_time:"19:00",break_times:[]}));

  const [stores,setStores]=React.useState([]);
  const [selStoreId,setSelStoreId]=React.useState(1);
  const [hours,setHours]=React.useState(DEFAULT_HOURS);
  const [closures,setClosures]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [saving,setSaving]=React.useState(false);
  const [toast,setToast]=React.useState("");
  const [newClosure,setNewClosure]=React.useState({date:"",memo:""});

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}

  // 店舗一覧取得
  React.useEffect(()=>{
    sb.select("stores","?order=id.asc").then(data=>{
      if(Array.isArray(data)&&data.length>0){
        setStores(data);
        setSelStoreId(data[0].id);
      }
    }).catch(()=>{});
  },[]);

  // 営業時間・臨時休業取得
  React.useEffect(()=>{loadData();},[selStoreId]);

  async function loadData(){
    setLoading(true);
    try{
      const[bh,tc]=await Promise.all([
        sb.select("business_hours",`?store_id=eq.${selStoreId}&order=day_of_week.asc,id.desc`),
        sb.select("temp_closures",`?store_id=eq.${selStoreId}&order=date.asc`),
      ]);
      if(Array.isArray(bh)&&bh.length>0){
        const merged=DEFAULT_HOURS.map(def=>{
          const found=bh.find(h=>h.day_of_week===def.day); // id.desc順なので最新の行が先に見つかる
          return found?{day:def.day,id:found.id,is_open:found.is_open,open_time:found.open_time||"09:00",close_time:found.close_time||"19:00",break_times:found.break_times||[]}:def;
        });
        setHours(merged);
      }else{
        setHours(DEFAULT_HOURS.map(d=>({...d,break_times:[]})));
      }
      setClosures(Array.isArray(tc)?tc:[]);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  function updateHour(day,key,val){
    setHours(prev=>prev.map(h=>h.day===day?{...h,[key]:val}:h));
  }

  function addBreak(day){
    setHours(prev=>prev.map(h=>h.day===day?{...h,break_times:[...(h.break_times||[]),{start:"12:00",end:"13:00"}]}:h));
  }

  function updateBreak(day,idx,key,val){
    setHours(prev=>prev.map(h=>{
      if(h.day!==day) return h;
      const bt=[...(h.break_times||[])];
      bt[idx]={...bt[idx],[key]:val};
      return{...h,break_times:bt};
    }));
  }

  function removeBreak(day,idx){
    setHours(prev=>prev.map(h=>{
      if(h.day!==day) return h;
      const bt=(h.break_times||[]).filter((_,i)=>i!==idx);
      return{...h,break_times:bt};
    }));
  }

  async function saveHours(){
    setSaving(true);
    try{
      const token=(await supabaseClient.auth.getSession()).data.session?.access_token||SUPABASE_ANON_KEY;
      const updatedHours=[];
      for(const h of hours){
        const payload={store_id:selStoreId,day_of_week:h.day,is_open:h.is_open,open_time:h.open_time,close_time:h.close_time,break_times:h.break_times||[]};
        if(h.id){
          // 既存行がある場合は更新（重複行を作らない）
          await fetch(`${SUPABASE_URL}/rest/v1/business_hours?id=eq.${h.id}`,{
            method:"PATCH",
            headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json",Prefer:"return=representation"},
            body:JSON.stringify(payload)
          });
          updatedHours.push(h);
        }else{
          // 行がまだ無い場合のみ新規作成
          const res=await fetch(`${SUPABASE_URL}/rest/v1/business_hours`,{
            method:"POST",
            headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json",Prefer:"return=representation"},
            body:JSON.stringify(payload)
          });
          const created=await res.json().catch(()=>null);
          const newId=Array.isArray(created)&&created.length>0?created[0].id:null;
          updatedHours.push({...h,id:newId});
        }
      }
      setHours(updatedHours);
      showToast("営業時間を保存しました");
    }catch(e){alert("保存に失敗しました："+e.message);}
    setSaving(false);
  }

  async function addClosure(){
    if(!newClosure.date){alert("日付を入力してください");return;}
    try{
      const result=await sb.insert("temp_closures",{store_id:selStoreId,date:newClosure.date,memo:newClosure.memo||null});
      if(Array.isArray(result)&&result.length>0) setClosures(prev=>[...prev,result[0]].sort((a,b)=>a.date.localeCompare(b.date)));
      setNewClosure({date:"",memo:""});
      showToast("臨時休業日を追加しました");
    }catch(e){alert("追加に失敗しました");}
  }

  async function deleteClosure(id){
    try{
      await sb.delete("temp_closures",id);
      setClosures(prev=>prev.filter(c=>c.id!==id));
      showToast("削除しました");
    }catch(e){alert("削除に失敗しました");}
  }

  const selStore=stores.find(s=>s.id===selStoreId);

  return(
    <div style={{maxWidth:800,margin:"0 auto"}}>
      {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}

      {/* 店舗選択 */}
      {stores.length>0&&(
        <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>店舗選択</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {stores.map(s=>(
              <button key={s.id} onClick={()=>setSelStoreId(s.id)}
                style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid",borderColor:selStoreId===s.id?"#059669":"#e2e8f0",background:selStoreId===s.id?"#059669":"white",color:selStoreId===s.id?"white":"#374151",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                {s.name}
              </button>
            ))}
          </div>
        </div>
      )}

      {loading?(
        <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>読み込み中...</div>
      ):(
        <>
          {/* 営業時間設定 */}
          <div style={{background:"white",borderRadius:12,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9",overflow:"hidden"}}>
            <div style={{padding:"14px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:14,color:"#1e3a5f"}}>
              営業時間・休憩時間設定
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#f8fafc"}}>
                  {["曜日","営業","開始","終了","休憩時間"].map(h=>(
                    <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:12,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {hours.map(h=>(
                  <tr key={h.day} style={{borderBottom:"1px solid #f1f5f9",verticalAlign:"top"}}>
                    {/* 曜日 */}
                    <td style={{padding:"16px 14px",fontWeight:800,fontSize:15,color:DAY_COLORS[h.day],width:40}}>{DAYS_JP[h.day]}</td>
                    {/* 営業トグル */}
                    <td style={{padding:"16px 14px",width:70}}>
                      <div onClick={()=>updateHour(h.day,"is_open",!h.is_open)}
                        style={{width:44,height:24,borderRadius:12,background:h.is_open?"#059669":"#d1d5db",cursor:"pointer",position:"relative",transition:"background .2s"}}>
                        <div style={{position:"absolute",top:2,left:h.is_open?20:2,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
                      </div>
                    </td>
                    {/* 開始 */}
                    <td style={{padding:"12px 14px"}}>
                      <input type="time" value={h.open_time} disabled={!h.is_open}
                        onChange={e=>updateHour(h.day,"open_time",e.target.value)}
                        style={{padding:"8px 10px",border:"1.5px solid",borderColor:h.is_open?"#e2e8f0":"#f1f5f9",borderRadius:8,fontSize:14,fontFamily:"inherit",background:h.is_open?"white":"#f8fafc",color:h.is_open?"#374151":"#d1d5db",width:120}}/>
                    </td>
                    {/* 終了 */}
                    <td style={{padding:"12px 14px"}}>
                      <input type="time" value={h.close_time} disabled={!h.is_open}
                        onChange={e=>updateHour(h.day,"close_time",e.target.value)}
                        style={{padding:"8px 10px",border:"1.5px solid",borderColor:h.is_open?"#e2e8f0":"#f1f5f9",borderRadius:8,fontSize:14,fontFamily:"inherit",background:h.is_open?"white":"#f8fafc",color:h.is_open?"#374151":"#d1d5db",width:120}}/>
                    </td>
                    {/* 休憩時間 */}
                    <td style={{padding:"12px 14px"}}>
                      {h.is_open&&(
                        <div>
                          {(h.break_times||[]).map((bt,idx)=>(
                            <div key={idx} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                              <input type="time" value={bt.start} onChange={e=>updateBreak(h.day,idx,"start",e.target.value)}
                                style={{padding:"6px 8px",border:"1.5px solid #e2e8f0",borderRadius:6,fontSize:13,fontFamily:"inherit",width:100}}/>
                              <span style={{color:"#94a3b8",fontSize:12}}>〜</span>
                              <input type="time" value={bt.end} onChange={e=>updateBreak(h.day,idx,"end",e.target.value)}
                                style={{padding:"6px 8px",border:"1.5px solid #e2e8f0",borderRadius:6,fontSize:13,fontFamily:"inherit",width:100}}/>
                              <button onClick={()=>removeBreak(h.day,idx)}
                                style={{padding:"4px 8px",background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:6,fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#ef4444"}}>✕</button>
                            </div>
                          ))}
                          <button onClick={()=>addBreak(h.day)}
                            style={{padding:"5px 12px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>
                            + 追加
                          </button>
                        </div>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{padding:"14px 16px",borderTop:"1px solid #f1f5f9"}}>
              <button onClick={saveHours} disabled={saving}
                style={{padding:"10px 24px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",opacity:saving?0.7:1}}>
                {saving?"保存中...":"保存"}
              </button>
            </div>
          </div>

          {/* 臨時休業日設定 */}
          <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9",overflow:"hidden"}}>
            <div style={{padding:"14px 16px",borderBottom:"1px solid #f1f5f9",fontWeight:800,fontSize:14,color:"#1e3a5f"}}>臨時休業日設定</div>
            <div style={{padding:"14px 16px",borderBottom:"1px solid #f1f5f9"}}>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>日付</div>
                  <input type="date" value={newClosure.date} onChange={e=>setNewClosure(p=>({...p,date:e.target.value}))}
                    style={{padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
                </div>
                <div style={{flex:1,minWidth:150}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>メモ</div>
                  <input value={newClosure.memo} onChange={e=>setNewClosure(p=>({...p,memo:e.target.value}))} placeholder="研修のため等"
                    style={{width:"100%",padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
                </div>
                <div style={{paddingTop:22}}>
                  <button onClick={addClosure}
                    style={{padding:"9px 20px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
                    追加
                  </button>
                </div>
              </div>
            </div>
            <div style={{padding:"14px 16px"}}>
              {closures.length===0?(
                <div style={{textAlign:"center",color:"#94a3b8",fontSize:13,padding:"16px 0"}}>臨時休業日が設定されていません</div>
              ):closures.map(c=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",flexShrink:0}}/>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{c.date}</div>
                      {c.memo&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>{c.memo}</div>}
                    </div>
                  </div>
                  <button onClick={()=>deleteClosure(c.id)}
                    style={{padding:"5px 12px",background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#ef4444"}}>
                    削除
                  </button>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ===== メニュー・コース管理パネル =====
function MenuMgmtPanel(){
  const CATEGORIES=["保険診療","自費治療","回数券","フリーパス"];
  const CATEGORY_COLORS={"保険診療":"#2563eb","自費治療":"#059669","回数券":"#d97706","フリーパス":"#7c3aed"};
  const CATEGORY_BG={"保険診療":"#dbeafe","自費治療":"#dcfce7","回数券":"#fef3c7","フリーパス":"#f5f3ff"};

  const [menus,setMenus]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [selCategory,setSelCategory]=React.useState("all");
  const [editId,setEditId]=React.useState(null); // null=一覧, "new"=新規, number=編集
  const [form,setForm]=React.useState({name:"",category:"自費治療",duration:60,price:0,price_label:"",description:"",active:true});
  const [saving,setSaving]=React.useState(false);
  const [toast,setToast]=React.useState("");
  const [searchQ,setSearchQ]=React.useState("");

  React.useEffect(()=>{loadMenus();},[]);

  async function loadMenus(){
    setLoading(true);
    try{
      const data=await sb.select("menus","?order=display_order.asc,id.asc");
      setMenus(Array.isArray(data)?data:[]);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}
  function fmt(n){return"¥"+Number(n||0).toLocaleString();}

  function openNew(){
    setForm({name:"",category:"自費治療",duration:60,price:0,price_label:"",description:"",active:true});
    setEditId("new");
  }

  function openEdit(menu){
    setForm({name:menu.name||"",category:menu.category||"自費治療",duration:menu.duration||60,price:menu.price||0,price_label:menu.price_label||"",description:menu.description||"",active:menu.active!==false});
    setEditId(menu.id);
  }

  async function saveMenu(){
    if(!form.name.trim()){alert("メニュー名を入力してください");return;}
    setSaving(true);
    try{
      const payload={name:form.name,category:form.category,duration:parseInt(form.duration)||0,price:parseInt(form.price)||0,price_label:form.price_label||null,description:form.description||null,active:form.active};
      if(editId==="new"){
        const result=await sb.insert("menus",{...payload,display_order:menus.length+1});
        if(Array.isArray(result)&&result.length>0) setMenus(prev=>[...prev,result[0]]);
        showToast("メニューを追加しました");
      }else{
        await sb.update("menus",editId,payload);
        setMenus(prev=>prev.map(m=>m.id===editId?{...m,...payload}:m));
        showToast("メニューを更新しました");
      }
      setEditId(null);
      loadMenus();
    }catch(e){alert("保存に失敗しました："+e.message);}
    setSaving(false);
  }

  async function toggleActive(menu){
    try{
      await sb.update("menus",menu.id,{active:!menu.active});
      setMenus(prev=>prev.map(m=>m.id===menu.id?{...m,active:!m.active}:m));
    }catch(e){alert("更新に失敗しました");}
  }

  async function deleteMenu(menu){
    if(!confirm(`「${menu.name}」を削除しますか？`)) return;
    try{
      await sb.delete("menus",menu.id);
      setMenus(prev=>prev.filter(m=>m.id!==menu.id));
      showToast("削除しました");
    }catch(e){alert("削除に失敗しました");}
  }

  function priceText(menu){
    if(menu.price_label) return menu.price_label;
    if(menu.price===0) return "¥0";
    return fmt(menu.price);
  }

  // フィルタ
  const filtered=menus.filter(m=>{
    if(selCategory!=="all"&&m.category!==selCategory) return false;
    if(searchQ&&!m.name.includes(searchQ)&&!(m.category||"").includes(searchQ)) return false;
    return true;
  });

  // カテゴリ別グループ
  const grouped={};
  CATEGORIES.forEach(c=>{grouped[c]=filtered.filter(m=>m.category===c);});

  // ===== 編集フォーム =====
  if(editId!==null){
    return(
      <div style={{maxWidth:600,margin:"0 auto"}}>
        {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#64748b",fontSize:13,fontFamily:"inherit"}}>← 一覧に戻る</button>
          <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>{editId==="new"?"メニューを追加":"メニューを編集"}</div>
        </div>
        <div style={{background:"white",borderRadius:12,padding:"20px",boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
          {/* カテゴリ */}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:8}}>カテゴリ *</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {CATEGORIES.map(c=>(
                <button key={c} onClick={()=>setForm(p=>({...p,category:c}))}
                  style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid",borderColor:form.category===c?CATEGORY_COLORS[c]:"#e2e8f0",background:form.category===c?CATEGORY_COLORS[c]:"white",color:form.category===c?"white":CATEGORY_COLORS[c],fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  {c}
                </button>
              ))}
            </div>
          </div>
          {/* 名前 */}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>メニュー名 *</label>
            <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="例：アジャスト（骨格矯正）"
              style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
          </div>
          {/* 時間・料金 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>時間（分）</label>
              <input type="number" value={form.duration} onChange={e=>setForm(p=>({...p,duration:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>料金（円）</label>
              <input type="number" value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))}
                style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
            </div>
          </div>
          {/* 料金表示テキスト */}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>料金表示テキスト（任意）</label>
            <input value={form.price_label} onChange={e=>setForm(p=>({...p,price_label:e.target.value}))} placeholder="例：負担割合に応じて / 初回無料"
              style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>入力した場合、料金数値より優先して表示されます</div>
          </div>
          {/* 説明 */}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>説明（任意）</label>
            <textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} rows={3} placeholder="メニューの説明・備考"
              style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"none"}}/>
          </div>
          {/* 表示状態 */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20,padding:"10px 14px",background:"#f8fafc",borderRadius:8}}>
            <div onClick={()=>setForm(p=>({...p,active:!p.active}))}
              style={{width:44,height:24,borderRadius:12,background:form.active?"#059669":"#d1d5db",cursor:"pointer",position:"relative",flexShrink:0}}>
              <div style={{position:"absolute",top:2,left:form.active?20:2,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>{form.active?"有効（予約フォームに表示）":"無効（非表示）"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setEditId(null)} style={{flex:1,padding:"11px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>キャンセル</button>
            <button onClick={saveMenu} disabled={saving} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",opacity:saving?0.7:1}}>
              {saving?"保存中...":"💾 保存する"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ===== 一覧画面 =====
  return(
    <div style={{maxWidth:900,margin:"0 auto"}}>
      {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}

      {/* ヘッダー */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>メニュー・コース管理</div>
        <button onClick={openNew} style={{padding:"9px 18px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 6px rgba(5,150,105,.3)"}}>
          + メニューを追加
        </button>
      </div>

      {/* 検索＋カテゴリフィルタ */}
      <div style={{background:"white",borderRadius:10,padding:"12px 14px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
        <input placeholder="メニュー名で検索" value={searchQ} onChange={e=>setSearchQ(e.target.value)}
          style={{width:"100%",padding:"8px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontFamily:"inherit",marginBottom:10}}/>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setSelCategory("all")} style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid",borderColor:selCategory==="all"?"#1e3a5f":"#e2e8f0",background:selCategory==="all"?"#1e3a5f":"white",color:selCategory==="all"?"white":"#374151",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>すべて</button>
          {CATEGORIES.map(c=>(
            <button key={c} onClick={()=>setSelCategory(c)}
              style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid",borderColor:selCategory===c?CATEGORY_COLORS[c]:"#e2e8f0",background:selCategory===c?CATEGORY_COLORS[c]:"white",color:selCategory===c?"white":CATEGORY_COLORS[c],fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              {c}
            </button>
          ))}
        </div>
      </div>

      {loading?(
        <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>読み込み中...</div>
      ):(
        /* カテゴリ別グループ表示 */
        (selCategory==="all"?CATEGORIES:CATEGORIES.filter(c=>c===selCategory)).map(cat=>{
          const items=grouped[cat]||[];
          if(items.length===0&&selCategory==="all") return null;
          return(
            <div key={cat} style={{marginBottom:20}}>
              {/* カテゴリヘッダー */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <span style={{padding:"3px 12px",borderRadius:20,fontSize:12,fontWeight:800,background:CATEGORY_BG[cat],color:CATEGORY_COLORS[cat]}}>{cat}</span>
                <div style={{flex:1,height:1,background:"#e2e8f0"}}/>
                <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{items.length}件</span>
              </div>

              {items.length===0?(
                <div style={{background:"white",borderRadius:10,padding:"20px",textAlign:"center",color:"#94a3b8",fontSize:13,border:"1px dashed #e2e8f0"}}>
                  {cat}のメニューはありません
                </div>
              ):(
                <div style={{background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9"}}>
                  {/* テーブルヘッダー */}
                  <div style={{display:"grid",gridTemplateColumns:"2.5fr 1fr 1.5fr 0.8fr 1fr 1.5fr",background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                    {["メニュー名","時間","料金","状態","表示URL","操作"].map(h=>(
                      <div key={h} style={{padding:"9px 12px",fontSize:11,fontWeight:700,color:"#64748b"}}>{h}</div>
                    ))}
                  </div>
                  {items.map((menu,i)=>(
                    <div key={menu.id} style={{display:"grid",gridTemplateColumns:"2.5fr 1fr 1.5fr 0.8fr 1fr 1.5fr",borderBottom:i<items.length-1?"1px solid #f1f5f9":"none",alignItems:"center",opacity:menu.active?1:0.6}}>
                      {/* メニュー名 */}
                      <div style={{padding:"12px"}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:2}}>{menu.name}</div>
                        {!menu.active&&<span style={{fontSize:10,fontWeight:700,color:"#ef4444",background:"#fee2e2",padding:"1px 6px",borderRadius:4}}>非表示</span>}
                        {menu.description&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{menu.description}</div>}
                      </div>
                      {/* 時間 */}
                      <div style={{padding:"12px",fontSize:13,color:"#374151"}}>
                        {menu.duration>0?`${menu.duration}分`:"—"}
                      </div>
                      {/* 料金 */}
                      <div style={{padding:"12px",fontSize:13,fontWeight:700,color:CATEGORY_COLORS[cat]}}>
                        {priceText(menu)}
                      </div>
                      {/* 状態 */}
                      <div style={{padding:"12px"}}>
                        <div onClick={()=>toggleActive(menu)} style={{width:36,height:20,borderRadius:10,background:menu.active?"#059669":"#d1d5db",cursor:"pointer",position:"relative"}}>
                          <div style={{position:"absolute",top:2,left:menu.active?16:2,width:16,height:16,borderRadius:"50%",background:"white",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
                        </div>
                      </div>
                      {/* URLコピー */}
                      <div style={{padding:"12px"}}>
                        <button onClick={()=>{navigator.clipboard.writeText(`https://ando-seikotsu-ibaraki.vercel.app/booking.html`).then(()=>showToast("URLをコピーしました"));}}
                          style={{padding:"4px 10px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>
                          コピー
                        </button>
                      </div>
                      {/* 操作 */}
                      <div style={{padding:"12px",display:"flex",gap:6}}>
                        <button onClick={()=>openEdit(menu)} style={{padding:"5px 10px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>編集</button>
                        <button onClick={()=>deleteMenu(menu)} style={{padding:"5px 10px",background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#ef4444"}}>削除</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })
      )}
    </div>
  );
}

// ===== スタッフ管理パネル =====
function StaffMgmtPanel({currentUser}){
  const DAYS_JP=["日","月","火","水","木","金","土"];
  const DAY_COLORS=["#ef4444","#374151","#374151","#374151","#374151","#374151","#7c3aed"];
  const DEFAULT_SHIFTS=DAYS_JP.map((_,i)=>({day:i,is_working:i!==0,start_time:"09:00",end_time:"19:00"}));

  const [mode,setMode]=React.useState("list"); // "list" | "shift"
  const [selStaffId,setSelStaffId]=React.useState(null);
  const [shiftTab,setShiftTab]=React.useState("weekly"); // "weekly" | "monthly"
  const [weeklyShifts,setWeeklyShifts]=React.useState(DEFAULT_SHIFTS);
  const [loadingShift,setLoadingShift]=React.useState(false);
  const [saving,setSaving]=React.useState(false);
  const [toast,setToast]=React.useState("");
  const [bulkOpen,setBulkOpen]=React.useState(false);
  const [bulkStart,setBulkStart]=React.useState("09:00");
  const [bulkEnd,setBulkEnd]=React.useState("19:00");

  // 月次シフト用
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const [selMonth,setSelMonth]=React.useState(todayStr.slice(0,7));
  const [monthShifts,setMonthShifts]=React.useState({});
  const [monthHolidays,setMonthHolidays]=React.useState({});
  const [editingCell,setEditingCell]=React.useState(null);
  const SHIFT_TYPES=["出勤","休み","有休","振替","祝振替"];
  const SHIFT_COLORS={"出勤":"#2563eb","休み":"#9ca3af","有休":"#059669","振替":"#d97706","祝振替":"#7c3aed"};
  const SHIFT_ABBR={"出勤":"勤","休み":"休","有休":"有","振替":"振","祝振替":"祝"};

  const selStaff=STAFF_ACCOUNTS.find(s=>s.id===selStaffId)||null;

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2500);}

  // 月次シフトのロード
  React.useEffect(()=>{
    try{
      const s=localStorage.getItem(`shifts_${selMonth}`);
      if(s) setMonthShifts(JSON.parse(s));
      else setMonthShifts({});
      const h=localStorage.getItem("holiday_balance");
      if(h) setMonthHolidays(JSON.parse(h));
      else{const init={};STAFF_ACCOUNTS.forEach(s=>{init[s.id]={有休残:10,振替残:0,祝振替残:0};});setMonthHolidays(init);}
    }catch{}
  },[selMonth,mode,shiftTab]);

  function saveMonthShifts(){
    try{
      localStorage.setItem(`shifts_${selMonth}`,JSON.stringify(monthShifts));
      localStorage.setItem("holiday_balance",JSON.stringify(monthHolidays));
      showToast("保存しました");
    }catch{showToast("エラー");}
  }

  function setShiftCell(staffId,date,val){
    const key=`${staffId}_${date}`;
    const cur=monthShifts[key]||"出勤";
    const newH={...monthHolidays};
    if(!newH[staffId]) newH[staffId]={有休残:10,振替残:0,祝振替残:0};
    if(cur==="有休") newH[staffId].有休残=(newH[staffId].有休残||0)+1;
    if(cur==="振替") newH[staffId].振替残=(newH[staffId].振替残||0)+1;
    if(cur==="祝振替") newH[staffId].祝振替残=(newH[staffId].祝振替残||0)+1;
    if(val==="有休") newH[staffId].有休残=Math.max(0,(newH[staffId].有休残||0)-1);
    if(val==="振替") newH[staffId].振替残=Math.max(0,(newH[staffId].振替残||0)-1);
    if(val==="祝振替") newH[staffId].祝振替残=Math.max(0,(newH[staffId].祝振替残||0)-1);
    setMonthHolidays(newH);
    setMonthShifts(prev=>({...prev,[key]:val}));
    setEditingCell(null);
  }

  // 月の日付生成
  const [y,m]=selMonth.split("-").map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  const dates=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(y,m-1,i+1);
    return{date:`${y}-${String(m).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`,day:d.getDay(),label:i+1};
  });

  async function openShift(staff){
    setSelStaffId(staff.id);
    setLoadingShift(true);
    setMode("shift");
    setShiftTab("weekly");
    try{
      const data=await sb.select("staff_weekly_shifts",`?staff_id=eq.${staff.id}&order=day_of_week.asc`);
      if(Array.isArray(data)&&data.length>0){
        const merged=DEFAULT_SHIFTS.map(def=>{
          const found=data.find(d=>d.day_of_week===def.day);
          return found?{day:def.day,is_working:found.is_working,start_time:found.start_time||"09:00",end_time:found.end_time||"19:00"}:def;
        });
        setWeeklyShifts(merged);
      }else{
        setWeeklyShifts(DEFAULT_SHIFTS.map(d=>({...d})));
      }
    }catch(e){setWeeklyShifts(DEFAULT_SHIFTS.map(d=>({...d})));}
    setLoadingShift(false);
  }

  function updateShift(day,key,val){setWeeklyShifts(prev=>prev.map(s=>s.day===day?{...s,[key]:val}:s));}

  async function saveWeeklyShifts(){
    if(!selStaff) return;
    setSaving(true);
    try{
      const token=(await supabaseClient.auth.getSession()).data.session?.access_token||SUPABASE_ANON_KEY;
      for(const shift of weeklyShifts){
        await fetch(`${SUPABASE_URL}/rest/v1/staff_weekly_shifts`,{
          method:"POST",
          headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${token}`,"Content-Type":"application/json",Prefer:"resolution=merge-duplicates"},
          body:JSON.stringify({staff_id:selStaff.id,day_of_week:shift.day,is_working:shift.is_working,start_time:shift.start_time,end_time:shift.end_time})
        });
      }
      showToast(`${selStaff.name}のシフトを保存しました`);
    }catch(e){alert("保存に失敗しました："+e.message);}
    setSaving(false);
  }

  function applyBulk(){
    setWeeklyShifts(prev=>prev.map(s=>s.is_working?{...s,start_time:bulkStart,end_time:bulkEnd}:s));
    setBulkOpen(false);
    showToast("一括適用しました");
  }

  // ===== シフト設定画面 =====
  if(mode==="shift"&&selStaff){
    return(
      <div style={{maxWidth:900,margin:"0 auto"}}>
        {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}

        {/* 全スタッフ一括（折りたたみ） */}
        <div style={{background:"white",borderRadius:12,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9",overflow:"hidden"}}>
          <button onClick={()=>setBulkOpen(v=>!v)} style={{width:"100%",padding:"14px 16px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left",fontFamily:"inherit"}}>
            <span style={{fontSize:12,color:"#374151"}}>▶ 全スタッフ一括シフト設定</span>
            <span style={{fontSize:11,color:"#94a3b8"}}>全スタッフに同じ週固定シフトを一括適用</span>
          </button>
          {bulkOpen&&(
            <div style={{padding:"0 16px 16px",borderTop:"1px solid #f1f5f9"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"14px 0"}}>
                {[{label:"開始時間",val:bulkStart,set:setBulkStart},{label:"終了時間",val:bulkEnd,set:setBulkEnd}].map(f=>(
                  <div key={f.label}><label style={{display:"block",fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>{f.label}</label>
                  <input type="time" value={f.val} onChange={e=>f.set(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontFamily:"inherit"}}/></div>
                ))}
              </div>
              <button onClick={applyBulk} style={{width:"100%",padding:"10px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>一括適用する</button>
            </div>
          )}
        </div>

        {/* スタッフ名＋タブ */}
        <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9",overflow:"hidden"}}>
          <div style={{padding:"16px",borderBottom:"1px solid #f1f5f9"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{width:36,height:36,borderRadius:10,background:selStaff.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:15}}>{selStaff.initial}</div>
              <div style={{fontSize:16,fontWeight:800,color:"#1e3a5f"}}>{selStaff.name} のシフト設定</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {[{id:"weekly",label:"週固定シフト"},{id:"monthly",label:"月次シフト表"}].map(t=>(
                <button key={t.id} onClick={()=>setShiftTab(t.id)} style={{padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:700,border:"1.5px solid",borderColor:shiftTab===t.id?"#059669":"#e2e8f0",background:shiftTab===t.id?"#059669":"white",color:shiftTab===t.id?"white":"#374151",cursor:"pointer",fontFamily:"inherit"}}>{t.label}</button>
              ))}
            </div>
          </div>

          {/* 週固定シフト */}
          {shiftTab==="weekly"&&(
            <div style={{padding:"16px"}}>
              <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>毎週繰り返す基本シフトを設定します。月次シフト表で個別調整もできます。</div>
              {loadingShift?<div style={{textAlign:"center",padding:24,color:"#94a3b8"}}>読み込み中...</div>:(
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:"#f8fafc"}}>
                      {["曜日","出勤","開始","終了"].map(h=>(<th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:12,fontWeight:700,color:"#64748b",borderBottom:"1px solid #e2e8f0"}}>{h}</th>))}
                    </tr>
                  </thead>
                  <tbody>
                    {weeklyShifts.map(shift=>(
                      <tr key={shift.day} style={{borderBottom:"1px solid #f1f5f9"}}>
                        <td style={{padding:"14px",fontWeight:800,fontSize:15,color:DAY_COLORS[shift.day],width:50}}>{DAYS_JP[shift.day]}</td>
                        <td style={{padding:"14px",width:80}}>
                          <div onClick={()=>updateShift(shift.day,"is_working",!shift.is_working)}
                            style={{width:44,height:24,borderRadius:12,background:shift.is_working?"#059669":"#d1d5db",cursor:"pointer",position:"relative",transition:"background .2s"}}>
                            <div style={{position:"absolute",top:2,left:shift.is_working?20:2,width:20,height:20,borderRadius:"50%",background:"white",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
                          </div>
                        </td>
                        <td style={{padding:"14px"}}>
                          <input type="time" value={shift.start_time} disabled={!shift.is_working}
                            onChange={e=>updateShift(shift.day,"start_time",e.target.value)}
                            style={{padding:"8px 10px",border:"1.5px solid",borderColor:shift.is_working?"#e2e8f0":"#f1f5f9",borderRadius:8,fontSize:14,fontFamily:"inherit",background:shift.is_working?"white":"#f8fafc",color:shift.is_working?"#374151":"#d1d5db",width:130}}/>
                        </td>
                        <td style={{padding:"14px"}}>
                          <input type="time" value={shift.end_time} disabled={!shift.is_working}
                            onChange={e=>updateShift(shift.day,"end_time",e.target.value)}
                            style={{padding:"8px 10px",border:"1.5px solid",borderColor:shift.is_working?"#e2e8f0":"#f1f5f9",borderRadius:8,fontSize:14,fontFamily:"inherit",background:shift.is_working?"white":"#f8fafc",color:shift.is_working?"#374151":"#d1d5db",width:130}}/>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
              <div style={{display:"flex",gap:10,marginTop:20}}>
                <button onClick={()=>{setMode("list");setSelStaffId(null);}} style={{flex:1,padding:"11px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>キャンセル</button>
                <button onClick={saveWeeklyShifts} disabled={saving} style={{flex:2,padding:"11px",background:"linear-gradient(135deg,#059669,#047857)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",opacity:saving?0.7:1}}>{saving?"保存中...":"保存"}</button>
              </div>
            </div>
          )}

          {/* 月次シフト表 */}
          {shiftTab==="monthly"&&(
            <div style={{padding:"16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                <input type="month" value={selMonth} onChange={e=>setSelMonth(e.target.value)}
                  style={{padding:"6px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:700}}/>
                <button onClick={saveMonthShifts} className="btn btn-primary btn-sm" style={{marginLeft:"auto"}}>💾 保存する</button>
              </div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>セルをクリックするとシフト種別が切り替わります。</div>
              {/* 凡例 */}
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                {SHIFT_TYPES.map(t=>(
                  <span key={t} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:700}}>
                    <span style={{width:10,height:10,borderRadius:2,background:SHIFT_COLORS[t],display:"inline-block"}}></span>{t}
                  </span>
                ))}
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{background:"#f8fafc"}}>
                      <th style={{padding:"6px 12px",textAlign:"left",fontWeight:700,color:"#64748b",borderBottom:"2px solid #e2e8f0",minWidth:80}}>スタッフ</th>
                      {dates.map(({date,day,label})=>(
                        <th key={date} style={{padding:"4px 2px",textAlign:"center",fontWeight:700,borderBottom:"2px solid #e2e8f0",minWidth:32,
                          color:day===0?"#ef4444":day===6?"#7c3aed":"#374151",
                          background:day===0?"#fff1f2":day===6?"#faf5ff":"#f8fafc"}}>
                          <div>{label}</div>
                          <div style={{fontSize:9,fontWeight:600}}>{"日月火水木金土"[day]}</div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {/* 個人シフトのみ表示 */}
                    {[selStaff].map(s=>{
                      const bal=monthHolidays[s.id]||{有休残:10,振替残:0,祝振替残:0};
                      return(
                        <tr key={s.id}>
                          <td style={{padding:"6px 12px",borderBottom:"1px solid #f1f5f9",fontWeight:700,fontSize:12,background:"white"}}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <div style={{width:20,height:20,borderRadius:5,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:10}}>{s.initial}</div>
                              {s.name.replace(" 先生","")}
                            </div>
                          </td>
                          {dates.map(({date,day})=>{
                            const key=`${s.id}_${date}`;
                            const val=monthShifts[key]||"出勤";
                            const color=SHIFT_COLORS[val];
                            const isEditing=editingCell===key;
                            return(
                              <td key={date} style={{padding:2,textAlign:"center",borderBottom:"1px solid #f1f5f9",borderRight:"1px solid #f1f5f9",
                                background:day===0?"#fff8f8":day===6?"#faf8ff":"white"}}>
                                {isEditing?(
                                  <select autoFocus value={val}
                                    onChange={e=>setShiftCell(s.id,date,e.target.value)}
                                    onBlur={()=>setEditingCell(null)}
                                    style={{width:52,fontSize:10,padding:"2px",borderRadius:4,border:`1.5px solid ${color}`,fontFamily:"inherit",background:"white",cursor:"pointer"}}>
                                    {SHIFT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                                  </select>
                                ):(
                                  <div onClick={()=>setEditingCell(key)}
                                    style={{width:28,height:26,borderRadius:6,background:color,color:"white",fontSize:10,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"auto",boxShadow:`0 1px 3px ${color}66`}}>
                                    {SHIFT_ABBR[val]}
                                  </div>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:16,display:"flex",gap:10}}>
                <button onClick={()=>setShiftTab("weekly")} style={{padding:"9px 16px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>← 週固定に戻る</button>
                <button onClick={()=>{setMode("list");setSelStaffId(null);}} style={{padding:"9px 16px",background:"white",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#374151"}}>一覧に戻る</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== スタッフ一覧画面 =====
  return(
    <div style={{maxWidth:800,margin:"0 auto"}}>
      {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#15803d",fontWeight:700,fontSize:13}}>{toast}</div>}
      <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #f1f5f9",overflow:"hidden"}}>
        <div style={{padding:"16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #f1f5f9"}}>
