.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#eef2f7;}
.loading-spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.confirm-box{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:400;padding:16px;}

// 全itemsをフラット化するヘルパー
function allCatItems(cat){ return cat.subs.flatMap(s=>s.items); }

// 後方互換：全メニュー名一覧・時間マップ
const MENUS = MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>i.name));
const DURATION = Object.fromEntries(MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>[i.name,i.duration])));
const MENU_PRICE = Object.fromEntries(MENU_CATEGORIES.flatMap(c=>allCatItems(c).map(i=>[i.name,i.price])));
const DURATION_OPTIONS = Array.from({length:12},(_,i)=>(i+1)*10); // 10〜120分

const SLOTS = ["09:00","09:30","10:00","10:30","11:00","11:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];

const sb = {
  async query(table,method="GET",body=null,filters=""){
    const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${filters}`,{
      method,headers:{"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${SUPABASE_ANON_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"},
      body:body?JSON.stringify(body):null,
    });
    const text=await res.text();return text?JSON.parse(text):[];
  },
  select:(t,f="")=>sb.query(t,"GET",null,f),
  insert:(t,d)=>sb.query(t,"POST",d),
  update:(t,id,d)=>sb.query(t,"PATCH",d,`?id=eq.${id}`),
  delete:(t,id)=>sb.query(t,"DELETE",null,`?id=eq.${id}`),
};

const today=new Date();
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function getWeekDates(base){
  const day=base.getDay(),mon=new Date(base);
  mon.setDate(base.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function overlaps(a,b){
  const as=toMin(a.time),ae=as+(a.duration||DURATION[a.menu]||30),bs=toMin(b.time),be=bs+(b.duration||DURATION[b.menu]||30);
  return as<be&&bs<ae;
}

// ===== 患者履歴モーダル =====
function PatientHistoryModal({patientName,bookings,onClose}){
  const [treatments,setTreatments]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const patientBookings=bookings.filter(b=>b.patient_name===patientName).sort((a,b)=>b.date.localeCompare(a.date));
  React.useEffect(()=>{
    async function load(){
      if(patientBookings.length===0){setLoading(false);return;}
      const ids=patientBookings.map(b=>b.id).join(",");
      const data=await sb.select("treatments",`?booking_id=in.(${ids})&order=treated_at.desc`);
      setTreatments(Array.isArray(data)?data:[]);setLoading(false);
    }
    load();
  },[]);
  const visitCount=patientBookings.length;
  const treatCount=treatments.length;
  const contracts=treatments.filter(t=>t.result==="成約").length;
  function resultBadge(r){
    if(!r) return null;
    const map={"成約":["badge-green","成約"],"持ち帰り":["badge-yellow","持ち帰り"],"バツ":["badge-red","バツ"]};
    const[cls,label]=map[r]||["badge-gray",r];
    return <span className={`badge ${cls}`}>{label}</span>;
  }
  function jifeeText(t){
    if(!t.jifee_type||t.jifee_type==="なし") return null;
    if(t.jifee_type==="回数券") return `回数券 ${t.jifee_count||""}枚`;
    if(t.jifee_type==="FP（フリーパス）") return `FP`;
    return null;
  }
  return (
    <div className="modal-overlay">
      <div className="modal-box">
        <div className="modal-header" style={{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)"}}>
          <div>
            <div style={{fontWeight:800,fontSize:17,color:"white"}}>{patientName} 様</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:2}}>施術・来院履歴</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div style={{padding:16}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"来院回数",value:`${visitCount}回`,color:"#2563eb"},{label:"施術記録",value:`${treatCount}件`,color:"#059669"},{label:"成約数",value:`${contracts}件`,color:"#d97706"}].map(item=>(
              <div key={item.label} className="stat-card" style={{borderTopColor:item.color,textAlign:"center",padding:12}}>
                <div style={{fontSize:22,fontWeight:800,color:item.color,margin:"4px 0 2px"}}>{item.value}</div>
                <div style={{fontSize:11,color:"#9ca3af",fontWeight:600}}>{item.label}</div>
              </div>
            ))}
          </div>
          {loading?(<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>読み込み中...</div>):patientBookings.length===0?(<div style={{textAlign:"center",padding:30,color:"#9ca3af"}}>予約記録がありません</div>):patientBookings.map((b,i)=>{
            const staff=STAFF_ACCOUNTS.find(s=>s.id===b.staff_id)||{name:"不明",color:"#888",initial:"？"};
            const treat=treatments.find(t=>t.booking_id===b.id);
            const isFirst=i===patientBookings.length-1;
            return (
              <div key={b.id} style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:`1px solid ${treat?"#bbf7d0":"#e2e8f0"}`,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                <div style={{background:treat?"#f0fdf4":"#f8fafc",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+(treat?"#bbf7d0":"#e2e8f0")}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:800,fontSize:13,color:"#1e3a5f"}}>{b.date} {b.time}</span>
                    {isFirst&&<span className="badge badge-orange">初回</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:staff.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:11,boxShadow:`0 0 0 2px white,0 0 0 3px ${staff.color}`}}>{staff.initial}</div>
                    <span style={{fontSize:12,color:"#374151",fontWeight:600}}>{staff.name}</span>
                  </div>
                </div>
                <div style={{padding:"8px 14px",background:"white"}}>
                  <span className="badge badge-gray" style={{marginBottom:treat?6:0}}>{b.menu}</span>
                  {b.line_user_id&&<span className="badge badge-green" style={{marginLeft:6}}>LINE連携</span>}
                </div>
                {treat&&(
                  <div style={{padding:"8px 14px",background:"white",borderTop:"1px solid #f1f5f9"}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
                      {treat.treatment_types&&treat.treatment_types.split("・").map(t=>(<span key={t} className="badge badge-blue">{t}</span>))}
                    </div>
                    {treat.body_parts&&<div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>{treat.body_parts}</div>}
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                      {resultBadge(treat.result)}
                      {jifeeText(treat)&&<span className="badge badge-yellow">{jifeeText(treat)}</span>}
                    </div>
                    {treat.memo&&<div style={{marginTop:5,fontSize:12,color:"#9ca3af"}}>{treat.memo}</div>}
                  </div>
                )}
                {!treat&&<div style={{padding:"6px 14px",background:"white",fontSize:12,color:"#d1d5db",borderTop:"1px solid #f1f5f9"}}>施術記録なし</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>

function BreakModal({onClose,bookings,breaks,setBreaks}){
  const [selDate,setSelDate]=React.useState(fmtDate(today));

  const [selTimes,setSelTimes]=React.useState([]);
  const [reason,setReason]=React.useState("休憩");
  const [saving,setSaving]=React.useState(false);
  const [toast,setToast]=React.useState("");
  const todayBreaks=breaks.filter(b=>b.date===selDate);
  async function addBreak(){
    if(selTimes.length===0){setToast("時間帯を選択してください");setTimeout(()=>setToast(""),2500);return;}
    setSaving(true);
    try{
      const newBreaks=[];
      for(const t of selTimes){
        const data=await sb.insert("staff_breaks",{staff_id:selStaff,date:selDate,time:t,reason});
        if(Array.isArray(data)&&data.length>0)newBreaks.push(...data);
        else newBreaks.push({id:Date.now()+Math.random(),staff_id:selStaff,date:selDate,time:t,reason});
      }
      setBreaks(prev=>[...prev,...newBreaks]);setSelTimes([]);
      setToast(selTimes.length+"件登録しました");setTimeout(()=>setToast(""),2500);
    }catch(e){setToast("エラー");setTimeout(()=>setToast(""),3000);}
    setSaving(false);
  }
  async function delBreak(id){
    try{await sb.delete("staff_breaks",id);}catch{}
    setBreaks(prev=>prev.filter(b=>b.id!==id));
  }
  return(
    <div className="modal-overlay">

        <div style={{padding:20}}>
          {toast&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#15803d",fontSize:13,fontWeight:700}}>{toast}</div>}
          <div style={{background:"#f8fafc",borderRadius:10,padding:14,marginBottom:18,border:"1px solid #e2e8f0"}}>
            <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>休憩を登録</div>
            <div className="form-group">
              <label className="form-label">日付</label>
              <input type="date" className="form-input" value={selDate} onChange={e=>setSelDate(e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">スタッフ</label>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {STAFF_ACCOUNTS.map(s=>(<button key={s.id} onClick={()=>setSelStaff(s.id)} className="btn" style={{background:selStaff===s.id?s.color:"white",color:selStaff===s.id?"white":"#374151",border:`2px solid ${s.color}`,borderRadius:20,padding:"5px 12px",fontSize:12,boxShadow:selStaff===s.id?`0 2px 8px ${s.color}66`:"none"}}>{s.name}</button>))}
              </div>

              <label className="form-label">時間帯（複数選択可）</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
                {SLOTS.map(t=>{const isSel=selTimes.includes(t);return <button key={t} onClick={()=>setSelTimes(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t])} className="btn" style={{padding:"7px 4px",borderRadius:7,border:`2px solid ${isSel?"#1e3a5f":"#e2e8f0"}`,background:isSel?"#1e3a5f":"white",color:isSel?"white":"#374151",fontSize:12,fontWeight:isSel?700:400,boxShadow:isSel?"0 2px 6px rgba(30,58,95,.3)":"none"}}>{t}</button>;})}
              </div>

function StatsPanel({bookings,payments,todayStr}){
  const [tab,setTab]=React.useState("daily");
  const [selMonth,setSelMonth]=React.useState(todayStr.slice(0,7));
  const [selDate,setSelDate]=React.useState(todayStr);
  const fmt=n=>"¥"+Number(n||0).toLocaleString();
  const DAYS=["日","月","火","水","木","金","土"];
  const dayBookings=bookings.filter(b=>b.date===selDate);
  const dayPayments=payments.filter(p=>p.payment_date===selDate);
  const dayTotal=dayPayments.reduce((s,p)=>s+(p.total_amount||0),0);
  const dayIns=dayPayments.reduce((s,p)=>s+(p.insurance_amount||0),0);
  const dayJifee=dayPayments.reduce((s,p)=>s+(p.jifee_amount||0),0);
  const monthBookings=bookings.filter(b=>b.date&&b.date.startsWith(selMonth));
  const monthPayments=payments.filter(p=>p.payment_date&&p.payment_date.startsWith(selMonth));
  const monthTotal=monthPayments.reduce((s,p)=>s+(p.total_amount||0),0);
  const monthIns=monthPayments.reduce((s,p)=>s+(p.insurance_amount||0),0);
  const monthJifee=monthPayments.reduce((s,p)=>s+(p.jifee_amount||0),0);
  function calcTechSales(pmts){
    const techMap={};
    pmts.forEach(p=>{if(!p.memo) return;p.memo.split("・").forEach(tech=>{if(!techMap[tech]) techMap[tech]={count:0,amount:0};techMap[tech].count++;const types=p.memo.split("・").length;techMap[tech].amount+=Math.round((p.jifee_amount||0)/types);});});
    return Object.entries(techMap).sort((a,b)=>b[1].amount-a[1].amount);
  }
  function calcStaffSales(pmts,bks){
    return STAFF_ACCOUNTS.map(s=>{
      const staffPmts=pmts.filter(p=>p.staff_id===s.id);
      const staffBks=bks.filter(b=>b.staff_id===s.id);
      return {...s,count:staffBks.length,total:staffPmts.reduce((sum,p)=>sum+(p.total_amount||0),0),ins:staffPmts.reduce((sum,p)=>sum+(p.insurance_amount||0),0),jifee:staffPmts.reduce((sum,p)=>sum+(p.jifee_amount||0),0)};
    });
  }
  function calcRetention(bks){
    const patientMap={};
    bks.forEach(b=>{if(!patientMap[b.patient_name]) patientMap[b.patient_name]=[];patientMap[b.patient_name].push(b.date);});
    let newPatients=0,retained=0;
    Object.values(patientMap).forEach(dates=>{if(dates.length===1) newPatients++;else if(dates.length>=2){newPatients++;retained++;}});
    return {newPatients,retained,rate:newPatients>0?Math.round(retained/newPatients*100):0};
  }
  function calcDailySales(){
    const map={};
    monthPayments.forEach(p=>{if(!map[p.payment_date]) map[p.payment_date]={date:p.payment_date,total:0,ins:0,jifee:0,count:0};map[p.payment_date].total+=p.total_amount||0;map[p.payment_date].ins+=p.insurance_amount||0;map[p.payment_date].jifee+=p.jifee_amount||0;map[p.payment_date].count++;});
    return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  }
  const tabStyle=(t)=>({padding:"7px 14px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,background:tab===t?"#1e3a5f":"white",color:tab===t?"white":"#64748b",boxShadow:tab===t?"0 2px 6px rgba(30,58,95,.3)":"0 1px 3px rgba(0,0,0,.06)",fontFamily:"inherit"});
  const monthRetention=calcRetention(monthBookings);
  const allRetention=calcRetention(bookings);
  return(
    <div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[["daily","日計"],["monthly","月計"],["tech","技術別"],["staff","スタッフ別"],["retention","新患継続"]].map(([t,label])=>(<button key={t} onClick={()=>setTab(t)} style={tabStyle(t)}>{label}</button>))}
      </div>
      {tab==="daily"&&(
        <div>
          <div style={{marginBottom:14}}><input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{padding:"8px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:700}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"来院数",value:`${dayBookings.length}件`,color:"#2563eb"},{label:"会計済み",value:`${dayPayments.length}件`,color:"#059669"},{label:"日計売上",value:fmt(dayTotal),color:"#d97706"}].map(item=>(<div key={item.label} className="stat-card" style={{borderTopColor:item.color,padding:14,textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:item.color}}>{item.value}</div><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginTop:2}}>{item.label}</div></div>))}
          </div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{padding:"12px 16px"}}>
              <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>売上内訳</div>
              {[{label:"保険窓口負担計",val:dayIns,color:"#2563eb"},{label:"自費売上計",val:dayJifee,color:"#059669"},{label:"合計",val:dayTotal,color:"#d97706",bold:true}].map(item=>(<div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}><span style={{fontSize:13,color:"#374151",fontWeight:item.bold?800:600}}>{item.label}</span><span style={{fontSize:item.bold?18:14,fontWeight:800,color:item.color}}>{fmt(item.val)}</span></div>))}
            </div>
          </div>
          <div className="card">
            <div style={{padding:"12px 16px"}}>
              <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>スタッフ別（本日）</div>
              {calcStaffSales(dayPayments,dayBookings).map(s=>(<div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:30,height:30,borderRadius:8,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:12}}>{s.initial}</div><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:700}}>{s.name}</span><span style={{fontSize:13,fontWeight:800,color:s.color}}>{s.count}件　{fmt(s.total)}</span></div><div style={{height:6,background:"#f1f5f9",borderRadius:3}}><div style={{height:"100%",width:`${Math.min(s.count*20,100)}%`,background:s.color,borderRadius:3}}></div></div></div></div>))}
            </div>

            {[{label:"来院数",value:`${monthBookings.length}件`,color:"#2563eb"},{label:"会計件数",value:`${monthPayments.length}件`,color:"#059669"},{label:"月計売上",value:fmt(monthTotal),color:"#d97706"}].map(item=>(<div key={item.label} className="stat-card" style={{borderTopColor:item.color,padding:14,textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:item.color}}>{item.value}</div><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginTop:2}}>{item.label}</div></div>))}

          <div className="card" style={{marginBottom:12}}>

              <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>スタッフ別売上（{selMonth}）</div>
              {calcStaffSales(monthPayments,monthBookings).map(s=>(<div key={s.id} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f1f5f9"}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${s.color},${s.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:14,boxShadow:`0 2px 6px ${s.color}44`}}>{s.initial}</div><div><div style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>{s.name}</div><div style={{fontSize:12,color:"#64748b"}}>{s.count}件来院</div></div><div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontWeight:800,fontSize:18,color:s.color}}>{fmt(s.total)}</div></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{[{label:"保険",val:s.ins,color:"#2563eb"},{label:"自費",val:s.jifee,color:"#059669"}].map(item=>(<div key={item.label} style={{background:"#f8fafc",borderRadius:8,padding:"8px 12px",borderLeft:`3px solid ${item.color}`}}><div style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>{item.label}</div><div style={{fontSize:15,fontWeight:800,color:item.color}}>{fmt(item.val)}</div></div>))}</div></div>))}
            </div>
          </div>
        </div>
      )}
      {tab==="retention"&&(()=>{
        const todayD=new Date();
        // 全予約から患者ごとの来院履歴を構築（全期間）
        function buildPatientMap(bks){
          const pm={};
          bks.forEach(b=>{
            if(!pm[b.patient_name]) pm[b.patient_name]={dates:[],staffIds:[]};
            pm[b.patient_name].dates.push(b.date);
            pm[b.patient_name].staffIds.push(b.staff_id);
          });
          Object.values(pm).forEach(p=>{
            const combined=p.dates.map((d,i)=>({date:d,staff:p.staffIds[i]})).sort((a,b)=>a.date.localeCompare(b.date));
            p.sorted=combined;
            p.totalVisits=combined.length;
            p.lastDate=combined[combined.length-1].date;
            p.lastStaff=combined[combined.length-1].staff;
            // 初回担当
            p.firstStaff=combined[0].staff;
          });
          return pm;
        }

        const allPM=buildPatientMap(bookings);
        const monthPM=buildPatientMap(monthBookings);

        // 離反判定：最終来院から30日以上
        function isChurned(lastDate){
          const last=new Date(lastDate+"T00:00:00");
          const diffDays=Math.floor((todayD-last)/(1000*60*60*24));
          return diffDays>=30;
        }

        // スタッフ別集計（全期間の担当ベース：初回担当スタッフで分類）
        function calcStaffRetention(pm){
          return STAFF_ACCOUNTS.map(s=>{
            // 初回担当が自分の患者
            const myPatients=Object.values(pm).filter(p=>p.firstStaff===s.id);
            const total=myPatients.length;
            const retained2=myPatients.filter(p=>p.totalVisits>=2).length;
            const retained8=myPatients.filter(p=>p.totalVisits>=8).length;
            const churned=myPatients.filter(p=>isChurned(p.lastDate)).length;
            // 2〜8回ごとの継続数
            const visitDist={};
            for(let v=1;v<=8;v++) visitDist[v]=myPatients.filter(p=>p.totalVisits>=v).length;
            // 2→3, 3→4...の継続率
            const stepRates={};
            for(let v=2;v<=8;v++){
              const prev=visitDist[v-1];
              stepRates[v]=prev>0?Math.round(visitDist[v]/prev*100):0;
            }
            return {
              ...s, total, retained2, retained8, churned,
              rate2:total>0?Math.round(retained2/total*100):0,
              churnRate:total>0?Math.round(churned/total*100):0,
              visitDist, stepRates,
            };
          });
        }

        const staffStats=calcStaffRetention(allPM);
        const staffStatsMonth=calcStaffRetention(monthPM);

        // 全体サマリー（月次）
        const totalNew=Object.values(monthPM).length;
        const totalRetained=Object.values(monthPM).filter(p=>p.totalVisits>=2).length;
        const totalRate=totalNew>0?Math.round(totalRetained/totalNew*100):0;
        const totalChurned=Object.values(allPM).filter(p=>isChurned(p.lastDate)).length;

        return(
          <div>
            <div style={{marginBottom:14}}>
              <input type="month" value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{padding:"8px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,fontWeight:700}}/>
              <span style={{fontSize:11,color:"#94a3b8",marginLeft:10}}>※月次は選択月に初来院した患者が対象。離反は全期間集計。</span>
            </div>

            {/* 全体サマリー */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
              {[
                {label:"新患数",value:`${totalNew}名`,color:"#2563eb"},
                {label:"2回目継続",value:`${totalRetained}名`,color:"#059669"},
                {label:"継続率",value:`${totalRate}%`,color:"#d97706"},
                {label:"離反患者(全期間)",value:`${totalChurned}名`,color:"#ef4444"},
              ].map(item=>(
                <div key={item.label} className="stat-card" style={{borderTopColor:item.color,padding:12,textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:item.color}}>{item.value}</div>
                  <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,marginTop:2}}>{item.label}</div>
                </div>
              ))}
            </div>

            {/* スタッフ別カード */}
            <div style={{fontWeight:800,fontSize:14,color:"#1e3a5f",marginBottom:10}}>スタッフ別 新患継続分析（{selMonth}・初回担当ベース）</div>
            {staffStatsMonth.map(s=>(
              <div key={s.id} className="card" style={{marginBottom:14}}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:10,background:`linear-gradient(135deg,${s.color}11,white)`}}>
                  <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${s.color},${s.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:15,boxShadow:`0 2px 8px ${s.color}44`}}>{s.initial}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{s.name}</div>
                    <div style={{fontSize:12,color:"#64748b"}}>担当新患：{s.total}名</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:800,color:s.total>0?s.color:"#d1d5db"}}>{s.rate2}%</div>
                    <div style={{fontSize:10,color:"#94a3b8"}}>2回目継続率</div>
                  </div>
                </div>
                <div style={{padding:"12px 16px"}}>
                  {/* 基本指標 */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
                    {[
                      {label:"新患数",val:`${s.total}名`,color:"#2563eb"},
                      {label:"2回継続",val:`${s.retained2}名`,color:"#059669"},
                      {label:"離反数",val:`${s.churned}名`,color:"#ef4444"},
                    ].map(item=>(
                      <div key={item.label} style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px",textAlign:"center",borderTop:`2px solid ${item.color}`}}>
                        <div style={{fontSize:16,fontWeight:800,color:item.color}}>{item.val}</div>
                        <div style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>{item.label}</div>
                      </div>
                    ))}
                  </div>

                  {/* 2〜8回目の継続ファネル */}
                  <div style={{fontWeight:700,fontSize:12,color:"#475569",marginBottom:8}}>来院回数別 継続ファネル（2〜8回目）</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{background:"#f8fafc"}}>
                          <th style={{padding:"6px 8px",textAlign:"left",color:"#64748b",fontWeight:700,borderBottom:"1px solid #e2e8f0"}}>回数</th>
                          {[2,3,4,5,6,7,8].map(v=>(<th key={v} style={{padding:"6px 8px",textAlign:"center",color:"#64748b",fontWeight:700,borderBottom:"1px solid #e2e8f0"}}>{v}回目</th>))}
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td style={{padding:"6px 8px",fontWeight:700,color:"#374151",borderBottom:"1px solid #f1f5f9"}}>継続数</td>
                          {[2,3,4,5,6,7,8].map(v=>(
                            <td key={v} style={{padding:"6px 8px",textAlign:"center",fontWeight:800,color:s.color,borderBottom:"1px solid #f1f5f9"}}>
                              {s.visitDist[v]||0}名
                            </td>
                          ))}
                        </tr>
                        <tr>
                          <td style={{padding:"6px 8px",fontWeight:700,color:"#374151",borderBottom:"1px solid #f1f5f9"}}>前回比</td>
                          {[2,3,4,5,6,7,8].map(v=>{
                            const rate=s.stepRates[v]||0;
                            const color=rate>=70?"#059669":rate>=50?"#d97706":"#ef4444";
                            return(
                              <td key={v} style={{padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                                <span style={{fontWeight:700,color,background:color+"18",borderRadius:4,padding:"1px 5px"}}>{rate}%</span>
                              </td>
                            );
                          })}
                        </tr>
                        <tr>
                          <td style={{padding:"6px 4px",fontWeight:600,color:"#94a3b8",fontSize:10}}>バー</td>
                          {[2,3,4,5,6,7,8].map(v=>{
                            const pct=s.total>0?Math.round((s.visitDist[v]||0)/Math.max(s.total,1)*100):0;
                            return(
                              <td key={v} style={{padding:"4px 8px",verticalAlign:"middle"}}>
                                <div style={{height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}>
                                  <div style={{height:"100%",width:`${pct}%`,background:s.color,borderRadius:3}}/>
                                </div>
                              </td>
                            );
                          })}
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  {/* 離反詳細 */}
                  {s.churned>0&&(()=>{
                    const churnedPatients=Object.entries(allPM).filter(([,p])=>p.firstStaff===s.id&&isChurned(p.lastDate));
                    return(
                      <div style={{marginTop:12,background:"#fef2f2",borderRadius:8,padding:"10px 12px",border:"1px solid #fecaca"}}>
                        <div style={{fontWeight:700,fontSize:12,color:"#991b1b",marginBottom:6}}>
                          ⚠️ 離反患者 {s.churned}名（最終来院から30日以上）
                        </div>
                        <div style={{maxHeight:120,overflowY:"auto"}}>
                          {churnedPatients.map(([name,p])=>{
                            const last=new Date(p.lastDate+"T00:00:00");
                            const days=Math.floor((todayD-last)/(1000*60*60*24));
                            return(
                              <div key={name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #fee2e2",fontSize:12}}>
                                <span style={{fontWeight:600,color:"#374151"}}>{name}</span>
                                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                                  <span style={{color:"#64748b"}}>{p.totalVisits}回来院</span>
                                  <span style={{color:"#ef4444",fontWeight:700}}>{days}日経過</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            ))}

            {/* 来院回数分布（全スタッフ比較） */}
            <div className="card" style={{marginTop:4}}>
              <div style={{padding:"14px 16px"}}>
                <div style={{fontWeight:800,fontSize:13,color:"#1e3a5f",marginBottom:12}}>スタッフ別 来院回数分布（全期間）</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"#f8fafc"}}>
                        <th style={{padding:"8px 10px",textAlign:"left",color:"#64748b",fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>スタッフ</th>
                        {[1,2,3,4,5,6,7,"8+"].map(v=>(<th key={v} style={{padding:"8px 6px",textAlign:"center",color:"#64748b",fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>{v}回</th>))}
                        <th style={{padding:"8px 6px",textAlign:"center",color:"#ef4444",fontWeight:700,borderBottom:"2px solid #e2e8f0"}}>離反</th>
                      </tr>
                    </thead>
                    <tbody>
                      {staffStats.map(s=>(
                        <tr key={s.id}>
                          <td style={{padding:"8px 10px",borderBottom:"1px solid #f1f5f9"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:22,height:22,borderRadius:6,background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:10}}>{s.initial}</div>
                              <span style={{fontWeight:700,fontSize:12,color:"#1e293b"}}>{s.name.replace(" 先生","")}</span>
                            </div>
                          </td>
                          {[1,2,3,4,5,6,7].map(v=>{
                            const count=Object.values(allPM).filter(p=>p.firstStaff===s.id&&p.totalVisits===v).length;
                            return(<td key={v} style={{padding:"8px 6px",textAlign:"center",fontWeight:count>0?700:400,color:count>0?s.color:"#d1d5db",borderBottom:"1px solid #f1f5f9"}}>{count>0?count:"-"}</td>);
                          })}
                          <td style={{padding:"8px 6px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                            {(()=>{const count=Object.values(allPM).filter(p=>p.firstStaff===s.id&&p.totalVisits>=8).length;return <span style={{fontWeight:count>0?700:400,color:count>0?s.color:"#d1d5db"}}>{count>0?count:"-"}</span>;})()} 
                          </td>
                          <td style={{padding:"8px 6px",textAlign:"center",borderBottom:"1px solid #f1f5f9"}}>
                            <span style={{fontWeight:s.churned>0?700:400,color:s.churned>0?"#ef4444":"#d1d5db"}}>{s.churned>0?s.churned:"-"}</span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ===== 予約フォーム =====
function FormPanel({form,setForm,editId,conflict,setConflict,isAdmin,bookings,save,onClose,onDelete}){
  const [searchQ,setSearchQ]=React.useState("");
  const [searchResults,setSearchResults]=React.useState([]);
  const [searching,setSearching]=React.useState(false);
  const [showSearch,setShowSearch]=React.useState(editId===null);

  // メニューの現在カテゴリ・サブカテゴリを初期化
  const initCat=()=>{
    const menus=Array.isArray(form.menus)&&form.menus.length>0?form.menus:[form.menu].filter(Boolean);
    if(!menus.length) return MENU_CATEGORIES[0].id;
    const cat=MENU_CATEGORIES.find(c=>allCatItems(c).some(i=>menus.includes(i.name)));
    return cat?cat.id:MENU_CATEGORIES[0].id;
  };
  const initSub=(catId)=>{
    const cat=MENU_CATEGORIES.find(c=>c.id===catId)||MENU_CATEGORIES[0];
    const menus=Array.isArray(form.menus)&&form.menus.length>0?form.menus:[form.menu].filter(Boolean);
    if(!menus.length) return cat.subs[0].id;
    const sub=cat.subs.find(s=>s.items.some(i=>menus.includes(i.name)));
    return sub?sub.id:cat.subs[0].id;
  };
  const [selCategory,setSelCategory]=React.useState(initCat);
  const [selSub,setSelSub]=React.useState(()=>initSub(initCat()));

  // 選択中メニュー一覧（配列）
  const selectedMenus=Array.isArray(form.menus)&&form.menus.length>0?form.menus:(form.menu?[form.menu]:[]);
  function toggleMenu(itemName, itemDuration){
    const cur=selectedMenus;
    const next=cur.includes(itemName)?cur.filter(m=>m!==itemName):[...cur,itemName];
    // durationは選択メニューの最大値
    const maxDur=next.length>0?Math.max(...next.map(m=>DURATION[m]||30)):itemDuration;
    setForm(f=>({...f,menus:next,menu:next[0]||"",duration:maxDur}));
  }
  function clearMenus(){setForm(f=>({...f,menus:[],menu:"",duration:30}));}

  async function searchPatients(q){
    if(!q.trim()){setSearchResults([]);return;}
    setSearching(true);
    try{
      const [byName,byKarte]=await Promise.all([sb.select("bookings",`?patient_name=ilike.*${encodeURIComponent(q)}*&order=date.desc&limit=20`),sb.select("bookings",`?karte_no=eq.${encodeURIComponent(q)}&order=date.desc&limit=10`)]);
      const all=[...(Array.isArray(byName)?byName:[]),...(Array.isArray(byKarte)?byKarte:[])];
      const seen={};const unique=[];
      all.forEach(b=>{const key=b.patient_name;if(!seen[key]){seen[key]=true;unique.push(b);}});
      setSearchResults(unique.slice(0,10));
    }catch(e){console.error(e);}
    setSearching(false);
  }
  function selectPatient(b){
    setForm(f=>({...f,patient_name:b.patient_name,phone:b.phone||"",karte_no:b.karte_no||"",line_user_id:b.line_user_id||null,line_notify:!!b.line_user_id}));
    setSearchQ("");setSearchResults([]);setShowSearch(false);
  }
  const visitCount=React.useMemo(()=>{if(!form.patient_name) return 0;return bookings.filter(b=>b.patient_name===form.patient_name).length;},[form.patient_name,bookings]);
  return(
    <div className="card" style={{maxWidth:520,padding:22}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f"}}>{editId!==null?"予約を編集":"新規予約"}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8",lineHeight:1}}>✕</button>
      </div>
      {conflict&&<div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:8,padding:"10px 14px",marginBottom:14,color:"#dc2626",fontSize:13,fontWeight:700}}>ダブルブッキングになります</div>}
      {showSearch?(
        <div style={{background:"#f0f9ff",borderRadius:10,padding:14,marginBottom:16,border:"1px solid #bae6fd"}}>
          <div style={{fontWeight:800,fontSize:13,color:"#0369a1",marginBottom:10}}>既存患者を検索</div>
          <div style={{position:"relative",marginBottom:8}}>
            <input className="form-input" placeholder="患者名またはカルテ番号で検索..." value={searchQ} onChange={e=>{setSearchQ(e.target.value);searchPatients(e.target.value);}} style={{paddingRight:40}} autoFocus/>
            {searching&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#94a3b8"}}>検索中...</div>}
          </div>
          {searchResults.length>0&&(
            <div style={{background:"white",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden",maxHeight:220,overflowY:"auto"}}>
              {searchResults.map((b,i)=>(<button key={i} onClick={()=>selectPatient(b)} style={{width:"100%",padding:"10px 14px",background:"none",border:"none",borderBottom:"1px solid #f1f5f9",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{b.patient_name}</div><div style={{fontSize:12,color:"#64748b"}}>{b.phone||"電話なし"}{b.karte_no?`　カルテ：${b.karte_no}`:""}</div></div><div style={{fontSize:11,color:"#94a3b8",textAlign:"right"}}><div>{b.date}</div>{b.line_user_id&&<div style={{color:"#059669",fontWeight:700}}>LINE✓</div>}</div></button>))}
            </div>
          )}
          {searchQ&&!searching&&searchResults.length===0&&<div style={{fontSize:13,color:"#94a3b8",textAlign:"center",padding:"8px 0"}}>該当患者なし</div>}
          <button onClick={()=>setShowSearch(false)} className="btn btn-outline btn-sm" style={{marginTop:8,width:"100%",justifyContent:"center"}}>新規患者として入力</button>
        </div>
      ):(
        <div style={{marginBottom:14}}>
          {form.patient_name&&(
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",marginBottom:10,border:"1px solid #bbf7d0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{form.patient_name}</div>
                <div style={{fontSize:12,color:"#64748b"}}>{form.phone}{form.karte_no?`　カルテ：${form.karte_no}`:""}</div>
                {visitCount>0&&<div style={{fontSize:11,color:"#059669",fontWeight:700}}>来院{visitCount}回目</div>}
              </div>
              {editId===null&&<button onClick={()=>setShowSearch(true)} className="btn btn-outline btn-xs">変更</button>}
            </div>
          )}
        </div>
      )}
      {!showSearch&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:14}}>
          <div><label className="form-label">患者名 *</label><input className="form-input" value={form.patient_name||""} placeholder="山本 花子" onChange={e=>{setForm(f=>({...f,patient_name:e.target.value}));setConflict(false);}}/></div>
          <div style={{minWidth:110}}><label className="form-label">カルテ番号</label><input className="form-input" value={form.karte_no||""} placeholder="K-001" onChange={e=>setForm(f=>({...f,karte_no:e.target.value}))}/></div>
        </div>
      )}
      <div className="form-group"><label className="form-label">電話番号</label><input type="tel" className="form-input" value={form.phone||""} placeholder="090-0000-0000" onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></div>

              const cat=MENU_CATEGORIES.find(c=>allCatItems(c).some(i=>i.name===m))||MENU_CATEGORIES[0];

                <span key={m} style={{display:"inline-flex",alignItems:"center",gap:4,background:cat.color,color:"white",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>

            </span>
          </div>
        )}

        {/* Lv1: 大分類 */}
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {MENU_CATEGORIES.map(c=>(
            <button key={c.id} onClick={()=>{setSelCategory(c.id);setSelSub(c.subs[0].id);}}
              className="btn" style={{flex:1,padding:"7px 4px",borderRadius:8,fontSize:12,fontWeight:700,background:selCategory===c.id?c.color:"white",color:selCategory===c.id?"white":"#374151",border:`2px solid ${selCategory===c.id?c.color:"#e2e8f0"}`,boxShadow:selCategory===c.id?`0 2px 8px ${c.color}44`:"none",justifyContent:"center"}}>
              {c.label}
            </button>
          ))}
        </div>

        {/* Lv2: サブ分類（保険→3割/2割/1割、自費→1回/回数券FP） */}
        {(()=>{
          const cat=MENU_CATEGORIES.find(c=>c.id===selCategory)||MENU_CATEGORIES[0];
          if(cat.subs.length<=1) return null;
          return(
            <div style={{display:"flex",gap:5,marginBottom:8}}>
              {cat.subs.map(sub=>(
                <button key={sub.id} onClick={()=>setSelSub(sub.id)}

                  {sub.label}
                </button>
              ))}
            </div>
          );
        })()}

        {/* Lv3: メニュー一覧（複数選択） */}
        {(()=>{
          const cat=MENU_CATEGORIES.find(c=>c.id===selCategory)||MENU_CATEGORIES[0];
          const sub=cat.subs.find(s=>s.id===selSub)||cat.subs[0];
          return(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,maxHeight:220,overflowY:"auto",padding:2}}>
              {sub.items.map(item=>{
                const isSel=selectedMenus.includes(item.name);
                return(
                  <button key={item.name} onClick={()=>toggleMenu(item.name,item.duration)}
                    className="btn" style={{padding:"8px 10px",borderRadius:8,fontSize:12,fontWeight:isSel?700:500,textAlign:"left",justifyContent:"flex-start",flexDirection:"column",alignItems:"flex-start",height:"auto",background:isSel?cat.color+"18":"#f8fafc",color:isSel?cat.color:"#374151",border:`1.5px solid ${isSel?cat.color:"#e2e8f0"}`,position:"relative"}}>
                    {isSel&&<span style={{position:"absolute",top:5,right:6,fontSize:10,fontWeight:800,color:cat.color}}>✓</span>}
                    <span style={{fontWeight:700,paddingRight:14}}>{item.name}</span>
                    <span style={{fontSize:10,color:isSel?cat.color:"#94a3b8",marginTop:2}}>¥{item.price.toLocaleString()}</span>
                  </button>

        })()}

      {/* 施術時間 */}
      <div className="form-group">
        <label className="form-label">施術時間</label>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>

            const isSel=(form.duration||DURATION[form.menu]||30)===min;
            return(
              <button key={min} onClick={()=>setForm(f=>({...f,duration:min}))} className="btn"
                style={{padding:"6px 8px",borderRadius:8,fontSize:12,fontWeight:isSel?700:500,background:isSel?"#1e3a5f":"white",color:isSel?"white":"#374151",border:`1.5px solid ${isSel?"#1e3a5f":"#e2e8f0"}`,minWidth:44,justifyContent:"center"}}>
                {min}分
              </button>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,padding:"10px 12px",background:"#f0fdf4",borderRadius:8,border:"1px solid #bbf7d0"}}>
        <input type="checkbox" id="ln" checked={!!form.line_notify} onChange={e=>setForm(f=>({...f,line_notify:e.target.checked}))} style={{width:16,height:16,accentColor:"#059669"}}/>
        <label htmlFor="ln" style={{fontSize:13,color:"#059669",fontWeight:700,cursor:"pointer"}}>LINEリマインドを前日に送る</label>

      <div style={{display:"flex",gap:10}}>
        {editId!==null&&<button onClick={onDelete} className="btn btn-danger" style={{flex:1,justifyContent:"center",padding:11,fontSize:14}}>削除</button>}
        <button onClick={save} className="btn btn-primary" style={{flex:2,justifyContent:"center",padding:11,fontSize:14}}>{editId!==null?"更新する":"予約を登録"}</button>
      </div>
    </div>
  );
}

// ===== 患者管理パネル =====
function PatientsPanel({bookings,onHistory}){
  const [patientQ,setPatientQ]=React.useState("");
  const [sortBy,setSortBy]=React.useState("count");

  const pm={};
  bookings.forEach(b=>{
    if(!pm[b.patient_name])pm[b.patient_name]={name:b.patient_name,phone:b.phone,count:0,lastDate:"",lastStaff:null};
    pm[b.patient_name].count++;
    if(b.date>pm[b.patient_name].lastDate){pm[b.patient_name].lastDate=b.date;pm[b.patient_name].lastStaff=b.staff_id;}
  });
  const allPatients=Object.values(pm);

  const q=patientQ.trim().toLowerCase();
  const filtered=allPatients.filter(p=>{
    if(!q) return true;
    return p.name.toLowerCase().includes(q)||(p.phone&&p.phone.replace(/-/g,"").includes(q.replace(/-/g,"")));
  });
  const sorted=[...filtered].sort((a,b)=>{
    if(sortBy==="name") return a.name.localeCompare(b.name,"ja");
    if(sortBy==="lastDate") return b.lastDate.localeCompare(a.lastDate);
    return b.count-a.count;
  });

  function highlight(text){
    if(!q||!text) return text;
    const idx=text.toLowerCase().indexOf(q);
    if(idx===-1) return text;
    return <span>{text.slice(0,idx)}<mark style={{background:"#fef08a",borderRadius:2,padding:"0 1px"}}>{text.slice(idx,idx+q.length)}</mark>{text.slice(idx+q.length)}</span>;
  }

  return(
    <div>
      {/* 検索・フィルターバー */}
      <div style={{background:"white",borderRadius:12,padding:"14px 16px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
        <div style={{position:"relative",marginBottom:10}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16,color:"#94a3b8",pointerEvents:"none"}}>🔍</span>
          <input
            className="form-input"
            placeholder="患者名・電話番号で検索..."
            value={patientQ}
            onChange={e=>setPatientQ(e.target.value)}
            style={{paddingLeft:38,paddingRight:patientQ?36:12}}
          />
          {patientQ&&(
            <button onClick={()=>setPatientQ("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"#e2e8f0",border:"none",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:12,color:"#64748b",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#94a3b8",fontWeight:600,whiteSpace:"nowrap"}}>並び替え：</span>
          {[["count","来院回数"],["lastDate","最終来院日"],["name","患者名"]].map(([val,label])=>(
            <button key={val} onClick={()=>setSortBy(val)} className="btn" style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700,background:sortBy===val?"#1e3a5f":"white",color:sortBy===val?"white":"#64748b",border:`1.5px solid ${sortBy===val?"#1e3a5f":"#e2e8f0"}`,boxShadow:sortBy===val?"0 2px 6px rgba(30,58,95,.25)":"none"}}>{label}</button>
          ))}
        </div>
      </div>

      {/* 件数 */}
      <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:13,color:"#64748b",fontWeight:700}}>
          {q?`「${patientQ}」の検索結果：${sorted.length}名`:`患者数：${allPatients.length}名`}
        </span>
        {q&&sorted.length===0&&<span className="badge badge-red">該当なし</span>}
      </div>

      {/* 患者一覧 */}
      {sorted.length===0&&q?(
        <div className="card" style={{padding:40,textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:12}}>🔍</div>
          <div style={{fontWeight:700,color:"#374151",marginBottom:6}}>「{patientQ}」に一致する患者が見つかりません</div>
          <div style={{fontSize:13,color:"#94a3b8"}}>患者名または電話番号で検索してください</div>
          <button onClick={()=>setPatientQ("")} className="btn btn-outline btn-sm" style={{marginTop:14}}>検索をクリア</button>
        </div>
      ):sorted.map(p=>{
        const s=STAFF_ACCOUNTS.find(x=>x.id===p.lastStaff)||{color:"#888",name:"不明",initial:"？"};
        return(
          <div key={p.name} className="card" style={{marginBottom:8}}>
            <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
                <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${s.color},${s.color}99)`,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:800,fontSize:16,flexShrink:0,boxShadow:`0 3px 8px ${s.color}44`}}>{p.name.charAt(0)}</div>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <span style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{highlight(p.name)}</span>
                    {p.count>=2?<span className="badge badge-yellow">{p.count}回来院</span>:<span className="badge badge-gray">初回</span>}
                  </div>
                  <div style={{fontSize:12,color:"#64748b"}}>最終：{p.lastDate}　前回担当：{s.name}</div>
                  {p.phone&&<div style={{fontSize:12,color:"#94a3b8"}}>{highlight(p.phone)}</div>}
                </div>
              </div>
              <button onClick={()=>onHistory(p.name)} className="btn btn-primary btn-sm" style={{whiteSpace:"nowrap",flexShrink:0}}>履歴を見る</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  const [baseDate,setBaseDate]=React.useState(today);
  const [form,setForm]=React.useState(null);
  const [editId,setEditId]=React.useState(null);
  const [conflict,setConflict]=React.useState(false);
  const [toast,setToast]=React.useState(null);
  const [delConfirm,setDelConfirm]=React.useState(null);
  const [showMenu,setShowMenu]=React.useState(false);
  const [showBreakModal,setShowBreakModal]=React.useState(false);
  const [viewIntake,setViewIntake]=React.useState(null);
  const [bookingPopup,setBookingPopup]=React.useState(null); // {booking, x, y}
  const [historyPatient,setHistoryPatient]=React.useState(null);
  const [payments,setPayments]=React.useState([]);

  const isAdmin=user.role==="admin";
  const todayStr=fmtDate(today);

  async function fetchAll(){
    try{
      const [b,br,py]=await Promise.all([sb.select("bookings","?order=date.asc,time.asc"),sb.select("staff_breaks","?order=date.asc,time.asc"),sb.select("payments","?order=payment_date.desc")]);
      setBookings(Array.isArray(b)?b:[]);setBreaks(Array.isArray(br)?br:[]);setPayments(Array.isArray(py)?py:[]);
    }catch(e){console.error(e);}
    setLoading(false);
  }

  React.useEffect(()=>{fetchAll();const t=setInterval(fetchAll,30000);return()=>clearInterval(t);},[]);

  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3000);}

  const filtered=React.useMemo(()=>selStaff?bookings.filter(b=>b.staff_id===selStaff):(isAdmin?bookings:bookings.filter(b=>b.staff_id===user.id)),[bookings,selStaff,isAdmin,user.id]);

  const visitCounts=React.useMemo(()=>{
    const pb={};
    bookings.forEach(b=>{if(!pb[b.patient_name])pb[b.patient_name]=[];pb[b.patient_name].push(b);});
    const result={};
    Object.values(pb).forEach(list=>{const sorted=[...list].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));sorted.forEach((b,i)=>{result[b.id]=i+1;});});
    return result;
  },[bookings]);

  function openAdd(date=null,time=null){
    setForm({patient_name:"",phone:"",staff_id:isAdmin?1:user.id,date:date||todayStr,time:time||"10:00",menu:MENUS[0],line_notify:true,reminded:false});
    setConflict(false);setEditId(null);setView("form");
  }
  function openEdit(b){
    if(!isAdmin&&b.staff_id!==user.id)return;
    setForm({...b});setEditId(b.id);setConflict(false);setView("form");
  }
  async function save(){
    if(!form.patient_name.trim())return;
    if(bookings.some(b=>b.id!==editId&&b.staff_id===form.staff_id&&b.date===form.date&&overlaps(b,form))){setConflict(true);return;}
    try{
      if(editId!==null){try{await sb.update("bookings",editId,form);}catch{}setBookings(prev=>prev.map(b=>b.id===editId?{...form,id:editId}:b));}
      else{try{await sb.insert("bookings",form);}catch{}setBookings(prev=>[...prev,{...form,id:Date.now()}]);}
      showToast(editId!==null?"予約を更新しました":"予約を登録しました");setView("calendar");
    }catch{showToast("保存しました");}

          {view==="calendar"&&(()=>{
            const ds=fmtDate(baseDate);
            const MINS=Array.from({length:54},(_,i)=>{const totalMin=i*10,h=9+Math.floor(totalMin/60),m=totalMin%60;if(h>18||(h===18&&m>0)) return null;return {h,m,label:`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`};}).filter(Boolean);

            <div style={{width:52,height:52,background:"#fef2f2",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",fontSize:24}}>🗑</div>
            <div style={{fontWeight:800,fontSize:16,textAlign:"center",marginBottom:6,color:"#1e293b"}}>削除しますか？</div>
            <div style={{color:"#64748b",fontSize:13,textAlign:"center",marginBottom:20,lineHeight:1.6}}>{delConfirm.patient_name}さん<br/>{delConfirm.date} {delConfirm.time}</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setDelConfirm(null)} className="btn btn-outline" style={{flex:1,justifyContent:"center",padding:11}}>キャンセル</button>
              <button onClick={()=>del(delConfirm.id)} className="btn btn-danger" style={{flex:1,justifyContent:"center",padding:11}}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {toast&&(<div className="toast" style={{background:toast.type==="delete"?"#1e293b":"#059669",color:"white"}}>{toast.type==="delete"?"削除しました":"✓ "}{toast.msg}</div>)}
    </div>
  );
}

function App(){
  const [user,setUser]=React.useState(null);
  if(!user)return <LoginScreen onLogin={setUser}/>;
  return <Dashboard user={user} onLogout={()=>setUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
