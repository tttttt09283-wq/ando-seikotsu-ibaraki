<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>あんど整骨院 ご予約</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f4f8;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const CLINIC_NAME = "あんど整骨院";
const CLINIC_TEL = "0000-00-0000";
const SUPABASE_URL = "https://dctlirxcwitcupaewiyt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjdGxpcnhjd2l0Y3VwYWV3aXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTI1NTgsImV4cCI6MjA5Nzk2ODU1OH0.ym1WINmz3W7T2HWvtzWkQcKs96RB5JU1JZL7EiMz704";

const sb = {
  async query(table, method="GET", body=null, filters="") {
    const url = `${SUPABASE_URL}/rest/v1/${table}${filters}`;
    const res = await fetch(url, {
      method,
      headers: {"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${SUPABASE_ANON_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"},
      body: body ? JSON.stringify(body) : null,
    });
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  },
  select:(table,filters="")=>sb.query(table,"GET",null,filters),
  insert:(table,data)=>sb.query(table,"POST",data),
};

const STAFF = [
  {id:1, name:"岩永 先生", specialty:"骨盤矯正・腰痛専門", color:"#2563eb", initial:"岩"},
  {id:2, name:"大皿 先生", specialty:"スポーツ外傷・肩こり専門", color:"#059669", initial:"大"},
  {id:3, name:"定井 先生", specialty:"鍼灸・自律神経専門", color:"#d97706", initial:"定"},
  {id:4, name:"細永 先生", specialty:"産後ケア・女性専門", color:"#7c3aed", initial:"細"},
];

const MENUS = [
  {id:1, name:"初診カウンセリング", duration:60, price:"¥3,300", desc:"初めての方。問診・検査・施術をじっくり行います", icon:"🩺"},
  {id:2, name:"再診施術", duration:30, price:"¥2,200", desc:"2回目以降の方向けの施術コース", icon:"🔄"},
  {id:3, name:"鍼灸施術", duration:45, price:"¥4,400", desc:"東洋医学に基づく鍼灸で根本改善", icon:"🌿"},
  {id:4, name:"骨盤矯正", duration:40, price:"¥3,850", desc:"産後・姿勢改善に特化した骨盤ケア", icon:"⚡"},
  {id:5, name:"マッサージ", duration:30, price:"¥2,750", desc:"疲労回復・コリほぐしに効果的", icon:"💆"},
];

const SLOTS = ["09:00","09:30","10:00","10:30","11:00","11:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];
const DAYS_JP = ["日","月","火","水","木","金","土"];
const STEPS = ["メニュー","スタッフ","日時","お名前","確認"];

function getDays(n) {
  return Array.from({length:n},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i+1); return d;
  });
}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtDateJP(d){return `${d.getMonth()+1}月${d.getDate()}日（${DAYS_JP[d.getDay()]}）`;}

function App() {
  const [step,setStep]=React.useState(0);
  const [menu,setMenu]=React.useState(null);
  const [staff,setStaff]=React.useState(null);
  const [anyStaff,setAnyStaff]=React.useState(false);
  const [selDate,setSelDate]=React.useState(null);
  const [selTime,setSelTime]=React.useState(null);
  const [takenSlots,setTakenSlots]=React.useState([]);
  const [form,setForm]=React.useState({name:"",nameKana:"",phone:"",concern:"",lineNotify:false});
  const [errors,setErrors]=React.useState({});
  const [done,setDone]=React.useState(false);
  const [submitting,setSubmitting]=React.useState(false);

  const days = getDays(14);
  const selectedMenu = MENUS.find(m=>m.id===menu);
  const selectedStaff = STAFF.find(s=>s.id===staff);

  // 日付・スタッフ選択時に埋まっているスロットを取得
  React.useEffect(()=>{
    if(!selDate||(!staff&&!anyStaff))return;
    async function fetch(){
      try{
        const sid=anyStaff?"":staff;
        const filter=anyStaff
          ?`?date=eq.${fmtDate(selDate)}`
          :`?date=eq.${fmtDate(selDate)}&staff_id=eq.${staff}`;
        const data=await sb.select("bookings",filter);
        setTakenSlots(Array.isArray(data)?data.map(b=>b.time):[]);
      }catch{setTakenSlots([]);}
    }
    fetch();
  },[selDate,staff,anyStaff]);

  function validate(){
    const e={};
    if(!form.name.trim())e.name="お名前を入力してください";
    if(!form.phone.trim())e.phone="電話番号を入力してください";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  async function submit(){
    if(!validate())return;
    setSubmitting(true);
    try{
      await sb.insert("bookings",{
        patient_name:form.name,
        phone:form.phone,
        staff_id:anyStaff?1:staff,
        date:fmtDate(selDate),
        time:selTime,
        menu:selectedMenu.name+`（${selectedMenu.duration}分）`,
        line_notify:form.lineNotify,
        reminded:false,
      });
    }catch{}
    setDone(true);
    setSubmitting(false);
  }

  function reset(){
    setStep(0);setMenu(null);setStaff(null);setAnyStaff(false);
    setSelDate(null);setSelTime(null);setForm({name:"",nameKana:"",phone:"",concern:"",lineNotify:false});
    setDone(false);
  }

  if(done) return (
    <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",padding:"18px 16px",textAlign:"center"}}>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:2}}>{CLINIC_NAME}</div>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:"40px 16px",textAlign:"center"}}>
        <div style={{fontSize:72,marginBottom:16}}>🎉</div>
        <div style={{fontSize:22,fontWeight:800,color:"#1e3a5f",marginBottom:8}}>予約が完了しました！</div>
        <div style={{color:"#666",fontSize:14,marginBottom:28,lineHeight:1.8}}>ご予約ありがとうございます。<br/>確認のご連絡をさせていただく場合があります。</div>
        <div style={{background:"#f0f7ff",borderRadius:14,padding:20,textAlign:"left",marginBottom:24}}>
          {[
            ["メニュー",`${selectedMenu?.icon} ${selectedMenu?.name}`],
            ["担当",anyStaff?"おまかせ":selectedStaff?.name],
            ["日時",selDate?`${fmtDateJP(selDate)} ${selTime}`:""],
            ["お名前",`${form.name} 様`],
            ["電話番号",form.phone],
          ].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #e5e7eb"}}>
              <span style={{fontSize:13,color:"#9ca3af",fontWeight:600}}>{l}</span>
              <span style={{fontSize:14,color:"#1e3a5f",fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:"#fef9ec",border:"1px solid #fde68a",borderRadius:10,padding:"12px 16px",marginBottom:24,fontSize:13,color:"#92400e",textAlign:"left"}}>
          🔔 キャンセル・変更は<strong>{CLINIC_TEL}</strong>までご連絡ください。
        </div>
        <button onClick={reset} style={{width:"100%",background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",border:"none",borderRadius:10,padding:14,fontWeight:800,fontSize:14,cursor:"pointer"}}>
          別の予約をする
        </button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
      {/* ヘッダー */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",padding:"18px 16px",textAlign:"center"}}>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:2}}>{CLINIC_NAME}</div>
        <div style={{fontSize:12,opacity:0.75,marginTop:2}}>オンライン予約</div>
      </div>

      {/* ステッパー */}
      <div style={{background:"white",borderBottom:"1px solid #eee",padding:"12px 16px"}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          {STEPS.map((label,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",flex:i<STEPS.length-1?1:"none"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,background:i<step?"#059669":i===step?"#1e3a5f":"#e5e7eb",color:i<=step?"white":"#9ca3af"}}>
                  {i<step?"✓":i+1}
                </div>
                <div style={{fontSize:10,marginTop:3,color:i===step?"#1e3a5f":"#9ca3af",fontWeight:i===step?700:400}}>{label}</div>
              </div>
              {i<STEPS.length-1&&<div style={{flex:1,height:2,background:i<step?"#059669":"#e5e7eb",margin:"0 4px",marginBottom:14}}/>}
            </div>
          ))}
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px"}}>

        {/* STEP 0: メニュー */}
        {step===0&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>どのメニューをご希望ですか？</div>
            {MENUS.map(m=>(
              <button key={m.id} onClick={()=>{setMenu(m.id);setStep(1);}}
                style={{width:"100%",background:menu===m.id?"#eff6ff":"white",border:`2px solid ${menu===m.id?"#2563eb":"#e5e7eb"}`,borderRadius:12,padding:14,marginBottom:10,textAlign:"left",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <div style={{fontSize:28}}>{m.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div style={{fontWeight:700,fontSize:15,color:"#1e3a5f"}}>{m.name}</div>
                      <div style={{fontWeight:700,color:"#059669"}}>{m.price}</div>
                    </div>
                    <div style={{fontSize:12,color:"#666",marginTop:3}}>{m.desc}</div>
                    <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>⏱ {m.duration}分</div>
                  </div>
                </div>
              </button>
            ))}
          </div>
        )}

        {/* STEP 1: スタッフ */}
        {step===1&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>担当の先生を選んでください</div>
            <button onClick={()=>{setAnyStaff(true);setStaff(null);setStep(2);}}
              style={{width:"100%",background:anyStaff?"#f0fdf4":"white",border:`2px solid ${anyStaff?"#059669":"#e5e7eb"}`,borderRadius:12,padding:14,marginBottom:10,textAlign:"left",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎲</div>
                <div>
                  <div style={{fontWeight:700,color:"#1e3a5f"}}>おまかせ（空いている先生）</div>
                  <div style={{fontSize:12,color:"#666"}}>一番早く予約できる先生をご案内</div>
                </div>
              </div>
            </button>
            {STAFF.map(s=>(
              <button key={s.id} onClick={()=>{setStaff(s.id);setAnyStaff(false);setStep(2);}}
                style={{width:"100%",background:staff===s.id?"#eff6ff":"white",border:`2px solid ${staff===s.id?s.color:"#e5e7eb"}`,borderRadius:12,padding:14,marginBottom:10,textAlign:"left",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:18,fontWeight:700}}>{s.initial}</div>
                  <div>
                    <div style={{fontWeight:700,color:"#1e3a5f"}}>{s.name}</div>
                    <div style={{fontSize:12,color:"#666"}}>{s.specialty}</div>
                  </div>
                </div>
              </button>
            ))}
            <button onClick={()=>setStep(0)} style={{background:"white",color:"#666",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 16px",cursor:"pointer",fontWeight:600,marginTop:4}}>← 戻る</button>
          </div>
        )}

        {/* STEP 2: 日時 */}
        {step===2&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>日時を選んでください</div>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#555",marginBottom:8}}>📅 日付</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                {days.slice(0,12).map((d,i)=>{
                  const isSat=d.getDay()===6,isSun=d.getDay()===0;
                  const isSel=selDate&&fmtDate(selDate)===fmtDate(d);
                  return <button key={i} onClick={()=>{setSelDate(d);setSelTime(null);}}
                    style={{padding:"8px 4px",borderRadius:8,border:isSel?"2px solid #1e3a5f":"1.5px solid #e5e7eb",background:isSel?"#1e3a5f":"white",color:isSel?"white":isSun?"#ef4444":isSat?"#3b82f6":"#333",fontWeight:isSel?700:400,cursor:"pointer",fontSize:12,lineHeight:1.5}}>
                    <div>{d.getMonth()+1}/{d.getDate()}</div>
                    <div style={{fontSize:10}}>（{DAYS_JP[d.getDay()]}）</div>
                  </button>;
                })}
              </div>
            </div>
            {selDate&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:13,fontWeight:700,color:"#555",marginBottom:8}}>🕐 時間</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {SLOTS.map(t=>{
                    const taken=takenSlots.includes(t);
                    const isSel=selTime===t;
                    return <button key={t} disabled={taken} onClick={()=>setSelTime(t)}
                      style={{padding:"9px 4px",borderRadius:8,border:isSel?"2px solid #1e3a5f":"1.5px solid #e5e7eb",background:taken?"#f3f4f6":isSel?"#1e3a5f":"white",color:taken?"#d1d5db":isSel?"white":"#333",cursor:taken?"not-allowed":"pointer",fontSize:13,textDecoration:taken?"line-through":"none",fontWeight:isSel?700:400}}>
                      {t}
                    </button>;
                  })}
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(1)} style={{background:"white",color:"#666",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 16px",cursor:"pointer",fontWeight:600}}>← 戻る</button>
              <button onClick={()=>setStep(3)} disabled={!selDate||!selTime}
                style={{flex:1,background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",border:"none",borderRadius:10,padding:11,fontWeight:800,cursor:"pointer",fontSize:14,opacity:(!selDate||!selTime)?0.4:1}}>
                次へ →
              </button>
            </div>
          </div>
        )}

        {/* STEP 3: 名前入力 */}
        {step===3&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>お客様情報を入力してください</div>
            {[
              {label:"お名前 *",key:"name",type:"text",placeholder:"山本 花子"},
              {label:"フリガナ",key:"nameKana",type:"text",placeholder:"ヤマモト ハナコ"},
              {label:"電話番号 *",key:"phone",type:"tel",placeholder:"090-0000-0000"},
            ].map(({label,key,type,placeholder})=>(
              <div key={key} style={{marginBottom:16}}>
                <label style={{display:"block",fontSize:13,fontWeight:700,color:"#444",marginBottom:6}}>{label}</label>
                <input type={type} value={form[key]} placeholder={placeholder}
                  onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
                  style={{width:"100%",padding:"12px",border:errors[key]?"2px solid #ef4444":"1.5px solid #ddd",borderRadius:10,fontSize:15,boxSizing:"border-box"}}/>
                {errors[key]&&<div style={{color:"#ef4444",fontSize:12,marginTop:4}}>⚠ {errors[key]}</div>}
              </div>
            ))}
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#444",marginBottom:6}}>症状・ご要望（任意）</label>
              <textarea value={form.concern} onChange={e=>setForm(f=>({...f,concern:e.target.value}))}
                placeholder="例：腰痛が3ヶ月続いています。" rows={3}
                style={{width:"100%",padding:12,border:"1.5px solid #ddd",borderRadius:10,fontSize:14,boxSizing:"border-box",resize:"none"}}/>
            </div>
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 14px",marginBottom:20}}>
              <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer"}}>
                <input type="checkbox" checked={form.lineNotify} onChange={e=>setForm(f=>({...f,lineNotify:e.target.checked}))} style={{marginTop:2,width:16,height:16,flexShrink:0}}/>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:"#065f46"}}>🟢 LINEでリマインドを受け取る</div>
                  <div style={{fontSize:12,color:"#059669",marginTop:2}}>前日17時に予約確認メッセージが届きます</div>
                </div>
              </label>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(2)} style={{background:"white",color:"#666",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 16px",cursor:"pointer",fontWeight:600}}>← 戻る</button>
              <button onClick={()=>{if(validate())setStep(4);}} style={{flex:1,background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",border:"none",borderRadius:10,padding:11,fontWeight:800,cursor:"pointer",fontSize:14}}>
                確認画面へ →
              </button>
            </div>
          </div>
        )}

        {/* STEP 4: 確認 */}
        {step===4&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>予約内容を確認してください</div>
            <div style={{background:"white",borderRadius:14,border:"2px solid #e5e7eb",overflow:"hidden",marginBottom:20}}>
              <div style={{background:"#1e3a5f",color:"white",padding:"12px 16px",fontSize:13,fontWeight:700}}>📋 予約内容</div>
              {[
                ["メニュー",`${selectedMenu?.icon} ${selectedMenu?.name}（${selectedMenu?.duration}分）`],
                ["料金",selectedMenu?.price],
                ["担当",anyStaff?"おまかせ":selectedStaff?.name],
                ["日付",selDate?fmtDateJP(selDate):""],
                ["時間",selTime],
                ["お名前",`${form.name} 様`],
                ["電話番号",form.phone],
                ["LINE通知",form.lineNotify?"あり（前日17時）":"なし"],
                ...(form.concern?[["ご要望",form.concern]]:[]),
              ].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 16px",borderBottom:"1px solid #f0f0f0",gap:12}}>
                  <span style={{fontSize:13,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap",minWidth:70}}>{l}</span>
                  <span style={{fontSize:14,color:"#1e3a5f",fontWeight:600,textAlign:"right"}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{background:"#fef9ec",border:"1px solid #fde68a",borderRadius:10,padding:"12px 14px",marginBottom:20,fontSize:13,color:"#92400e"}}>
              ⚠️ キャンセル・変更は前日18時までに<br/><strong>{CLINIC_TEL}</strong>までご連絡ください。
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(3)} style={{background:"white",color:"#666",border:"1.5px solid #ddd",borderRadius:10,padding:"11px 16px",cursor:"pointer",fontWeight:600}}>← 戻る</button>
              <button onClick={submit} disabled={submitting}
                style={{flex:1,background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",border:"none",borderRadius:10,padding:11,fontWeight:800,cursor:"pointer",fontSize:15,opacity:submitting?0.7:1}}>
                {submitting?"送信中...":"予約を確定する ✓"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
