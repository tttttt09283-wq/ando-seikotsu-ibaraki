const SLOTS = (()=>{
  const slots=[];
  for(let h=9;h<=19;h++){
    for(let m=0;m<60;m+=10){
      if(h===19&&m>0) break;
      slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    }
  }
  return slots;
})();

const DAYS_JP = ["日","月","火","水","木","金","土"];
const STEPS = ["日時","お客様情報","症状・問診","確認"];
const HOW_KNOW = ["Instagram","Facebook","Twitter/X","Google検索","チラシ・ポスター","友人・知人の紹介","その他"];

  "頸部（首）","肩","上腕","肘","前腕","手首・手",

];

function toMin(t){
  var parts = t.split(":");
  return parseInt(parts[0])*60 + parseInt(parts[1]);
}
function fmtDate(d){
  return d.getFullYear()+"-"+
    String(d.getMonth()+1).padStart(2,"0")+"-"+
    String(d.getDate()).padStart(2,"0");
}
function fmtDateJP(d){
  return (d.getMonth()+1)+"月"+d.getDate()+"日（"+DAYS_JP[d.getDay()]+"）";
}
function getDays(n){
  var arr=[];
  for(var i=0;i<n;i++){
    var d=new Date();
    d.setDate(d.getDate()+i);
    arr.push(d);
  }
  return arr;
}

var sb = {
  select: function(table, filters){
    filters = filters || "";
    return fetch(SUPABASE_URL+"/rest/v1/"+table+filters, {
      headers:{
        "apikey":SUPABASE_ANON_KEY,
        "Authorization":"Bearer "+SUPABASE_ANON_KEY
      }
    }).then(function(r){return r.json();}).catch(function(){return [];});
  },
  insert: function(table, data){
    return fetch(SUPABASE_URL+"/rest/v1/"+table, {
      method:"POST",
      headers:{
        "apikey":SUPABASE_ANON_KEY,
        "Authorization":"Bearer "+SUPABASE_ANON_KEY,
        "Content-Type":"application/json",
        "Prefer":"return=representation"
      },
      body:JSON.stringify(data)
    }).then(function(r){return r.json();}).catch(function(){return null;});
  }
};

function App(){
  var useState = React.useState;
  var useEffect = React.useEffect;

  var stepState = useState(0);
  var step = stepState[0]; var setStep = stepState[1];

  var dateState = useState(null);
  var selDate = dateState[0]; var setSelDate = dateState[1];

  var timeState = useState(null);
  var selTime = timeState[0]; var setSelTime = timeState[1];

  var slotState = useState({booked:[],breaks:[]});
  var slotData = slotState[0]; var setSlotData = slotState[1];

  var doneState = useState(false);
  var done = doneState[0]; var setDone = doneState[1];

  var submittingState = useState(false);
  var submitting = submittingState[0]; var setSubmitting = submittingState[1];

  var errState = useState({});
  var errors = errState[0]; var setErrors = errState[1];

  var bookingIdState = useState(null);
  var bookingId = bookingIdState[0]; var setBookingId = bookingIdState[1];

  var lineUserIdState = useState(null);
  var lineUserId = lineUserIdState[0]; var setLineUserId = lineUserIdState[1];

  var liffReadyState = useState(false);
  var liffReady = liffReadyState[0]; var setLiffReady = liffReadyState[1];

  // リピーター判定・過去予約情報
  var isRepeatState = useState(false);
  var isRepeat = isRepeatState[0]; var setIsRepeat = isRepeatState[1];
  var pastBookingState = useState(null);
  var pastBooking = pastBookingState[0]; var setPastBooking = pastBookingState[1];

  // リピーター用メモ（任意）
  var memoState = useState("");
  var memo = memoState[0]; var setMemo = memoState[1];

  // ===== 営業時間・臨時休業日 =====
  var businessHoursState = useState([]);
  var businessHours = businessHoursState[0]; var setBusinessHours = businessHoursState[1];
  var closuresState = useState([]);
  var closures = closuresState[0]; var setClosures = closuresState[1];
  var hoursLoadedState = useState(false);
  var hoursLoaded = hoursLoadedState[0]; var setHoursLoaded = hoursLoadedState[1];

  var formState = useState({
    name:"",nameKana:"",phone:"",
    bodyParts:[],injuryCause:"",injuryCauseDetail:"",
    painWhen:"",painLevel:"",symptoms:[],
    otherClinic:"",otherClinicName:"",medicalHistory:"",
    wantContinue:"",howKnow:"",howKnowOther:"",lineNotify:false
  });
  var form = formState[0]; var setForm = formState[1];

  var days = getDays(14);

  useEffect(function(){
    liff.init({liffId: LIFF_ID}).then(function(){
      setLiffReady(true);
      if(liff.isLoggedIn()){
        liff.getProfile().then(function(profile){
          setLineUserId(profile.userId);
          // 過去予約を確認してリピーター判定
          sb.select("bookings","?line_user_id=eq."+encodeURIComponent(profile.userId)+"&order=date.desc&limit=1")
            .then(function(past){
              if(Array.isArray(past)&&past.length>0){
                setIsRepeat(true);
                setPastBooking(past[0]);
                // 過去の情報をformにセット
                setForm(function(f){return Object.assign({},f,{
                  name:past[0].patient_name||"",
                  phone:past[0].phone||"",
                  lineNotify:true,
                });});
              }
            }).catch(function(){});
        }).catch(function(){});
      }
    }).catch(function(){
      setLiffReady(true);
    });
  }, []);

  // 営業時間・臨時休業日を取得（1回だけ）
  useEffect(function(){
    Promise.all([
      sb.select("business_hours","?store_id=eq."+STORE_ID+"&order=day_of_week.asc"),
      sb.select("temp_closures","?store_id=eq."+STORE_ID)
    ]).then(function(results){
      setBusinessHours(Array.isArray(results[0])?results[0]:[]);
      setClosures(Array.isArray(results[1])?results[1]:[]);
      setHoursLoaded(true);
    }).catch(function(){
      setHoursLoaded(true);
    });
  }, []);

  useEffect(function(){
    if(!selDate) return;
    var ds = fmtDate(selDate);
    Promise.all([
      sb.select("bookings","?date=eq."+ds+"&menu=eq.無料施術体験会（60分）"),
      sb.select("staff_breaks","?date=eq."+ds)
    ]).then(function(results){
      setSlotData({
        booked: Array.isArray(results[0])?results[0]:[],
        breaks: Array.isArray(results[1])?results[1]:[]
      });
    });
  }, [selDate]);

  // ===== 営業時間ヘルパー =====
  function getDayHours(dayOfWeek){
    for(var i=0;i<businessHours.length;i++){
      if(businessHours[i].day_of_week===dayOfWeek) return businessHours[i];
    }
    return null;
  }
  function isClosedDate(d){
    var ds = fmtDate(d);
    for(var i=0;i<closures.length;i++){
      if(closures[i].date===ds) return true;
    }
    // 営業時間データが未設定の場合は制限しない（フェイルセーフ）
    if(businessHours.length===0) return false;
    var dh = getDayHours(d.getDay());
    if(!dh) return false;
    return dh.is_open===false;
  }
  function isTimeAllowed(t){
    if(!selDate) return true;
    if(businessHours.length===0) return true;
    var dh = getDayHours(selDate.getDay());
    if(!dh || dh.is_open===false) return false;
    var tm = toMin(t);
    var openM = toMin(dh.open_time||"09:00");
    var closeM = toMin(dh.close_time||"19:00");
    if(tm<openM || tm>=closeM) return false;
    var brs = dh.break_times||[];
    for(var i=0;i<brs.length;i++){
      var bs=toMin(brs[i].start), be=toMin(brs[i].end);
      if(tm>=bs && tm<be) return false;
    }
    return true;
  }

  function isSlotFull(t){
    var booked = slotData.booked.filter(function(b){return b.time===t;}).length;
    var breaks = slotData.breaks.filter(function(b){return b.time===t;}).length;
    return (booked+breaks) >= STAFF.length;
  }

  function isPastSlot(t){
    if(!selDate) return false;
    var now = new Date();
    if(fmtDate(selDate) !== fmtDate(now)) return false;
    var nowMin = now.getHours()*60 + now.getMinutes();
    return toMin(t) <= nowMin;
  }

  function getAvailableStaffId(t){
    var bookedIds = slotData.booked.filter(function(b){return b.time===t;}).map(function(b){return b.staff_id;});
    var breakIds = slotData.breaks.filter(function(b){return b.time===t;}).map(function(b){return b.staff_id;});
    var unavail = bookedIds.concat(breakIds);
    var found = STAFF.find(function(s){return unavail.indexOf(s.id)===-1;});
    return found ? found.id : 1;
  }

  function toggleArr(key, val){
    var arr = form[key];
    var newArr = arr.indexOf(val)>-1 ? arr.filter(function(x){return x!==val;}) : arr.concat([val]);
    var upd = {}; upd[key] = newArr;
    setForm(Object.assign({}, form, upd));
  }

  function setF(key, val){
    var upd = {}; upd[key] = val;
    setForm(Object.assign({}, form, upd));
  }

  function handleLineLogin(){
    if(!liffReady) return;
    if(liff.isInClient()){
      liff.getProfile().then(function(profile){
        setLineUserId(profile.userId);
        setF("lineNotify", true);
      }).catch(function(){});
    } else {
      liff.login();
    }
  }

  function validate2(){
    var e = {};
    if(!form.name.trim()) e.name = "お名前を入力してください";
    if(!form.phone.trim()) e.phone = "電話番号を入力してください";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  function validate3(){
    var e = {};
    if(form.bodyParts.length===0) e.bodyParts = "負傷部位を選択してください";
    if(!form.injuryCause) e.injuryCause = "負傷原因を選択してください";
    if(!form.painWhen) e.painWhen = "時期を選択してください";
    if(!form.wantContinue) e.wantContinue = "ご回答をお選びください";
    if(!form.howKnow) e.howKnow = "お選びください";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  function submit(){
    if(!validate3()) return;
    setSubmitting(true);
    var staffId = getAvailableStaffId(selTime);
    var howKnowText = form.howKnow==="その他" ? "その他："+form.howKnowOther : form.howKnow;
    var newBookingId = null;

    sb.insert("bookings",{
      patient_name:form.name,
      phone:form.phone,
      staff_id:staffId,
      date:fmtDate(selDate),
      time:selTime,
      menu:"無料施術体験会（60分）",
      line_notify: !!lineUserId, // LINE連携済みなら自動でリマインド
      line_user_id: lineUserId || null,
      reminded:false,
      body_parts:form.bodyParts.join("・"),
      injury_cause:form.injuryCause,
      injury_cause_detail:form.injuryCauseDetail,
      pain_when:form.painWhen,
      pain_level:form.painLevel,
      symptoms:form.symptoms.join("・"),
      other_clinic:form.otherClinic+(form.otherClinicName?"（"+form.otherClinicName+"）":""),
      medical_history:form.medicalHistory,
      want_continue:form.wantContinue,
      how_know:howKnowText
    }).then(function(result){
      // 予約IDを取得
      if(Array.isArray(result) && result.length > 0){
        newBookingId = result[0].id;
        setBookingId(newBookingId);
      }

      // グループLINEへ通知
      var msg = "🏥【あんど整骨院 新規予約】\n\n"+
        "👤 "+form.name+" 様\n"+
        "📞 "+form.phone+"\n"+
        "📅 "+fmtDateJP(selDate)+" "+selTime+"\n"+
        "🦴 負傷部位："+form.bodyParts.join("・")+"\n"+
        "⚡ 原因："+form.injuryCause+"\n"+
        "📅 いつから："+form.painWhen+"\n"+
        "💭 継続意思："+form.wantContinue+"\n"+
        "📣 経路："+howKnowText+"\n"+
        "🔔 LINE連携："+(form.lineNotify && lineUserId ? "あり" : "なし");

      fetch("/api/line-notify",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({groupId:LINE_GROUP_ID, message:msg})
      }).catch(function(){});

      // LINE連携済みの患者へ予約確認メッセージを送信
      if(lineUserId && newBookingId){
        console.log("send-confirmation呼び出し:", {userId: lineUserId, bookingId: newBookingId});
        fetch("/api/send-confirmation",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            userId: lineUserId,
            bookingId: newBookingId,
            patientName: form.name,
            date: fmtDateJP(selDate),
            time: selTime
          })
        }).then(function(r){
          console.log("send-confirmation response:", r.status);
          return r.json();
        }).then(function(d){
          console.log("send-confirmation result:", JSON.stringify(d));
        }).catch(function(e){
          console.error("send-confirmation error:", e);
        });
      } else {
        console.log("QR送信スキップ:", {lineUserId: lineUserId, bookingId: newBookingId});
      }
    }).catch(function(){}).finally(function(){
      setDone(true);
      setSubmitting(false);
    });
  }

  function reset(){
    setStep(0); setSelDate(null); setSelTime(null);
    setSlotData({booked:[],breaks:[]});
    setForm({name:"",nameKana:"",phone:"",bodyParts:[],injuryCause:"",injuryCauseDetail:"",painWhen:"",painLevel:"",symptoms:[],otherClinic:"",otherClinicName:"",medicalHistory:"",wantContinue:"",howKnow:"",howKnowOther:"",lineNotify:false});
    setDone(false); setBookingId(null); setMemo("");
  }

  // リピーター向けかんたん予約（日時だけで完結）
  function submitRepeat(){
    if(!selDate||!selTime) return;
    setSubmitting(true);
    var staffId=getAvailableStaffId(selTime);
    var newBookingId=null;
    sb.insert("bookings",{
      patient_name:pastBooking.patient_name,
      phone:pastBooking.phone||"",
      staff_id:staffId,
      date:fmtDate(selDate),
      time:selTime,
      menu:"再診（30分）",
      line_notify:true,
      line_user_id:lineUserId||null,
      reminded:false,
      // 伝えたいことがあれば症状欄に入れる
      symptoms:memo||null,
    }).then(function(result){
      var nb=Array.isArray(result)&&result.length>0?result[0]:null;
      if(nb) newBookingId=nb.id;
      setBookingId(newBookingId);
      // グループLINE通知
      fetch("/api/line-notify",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          groupId:LINE_GROUP_ID,
          message:"🏥【リピーター予約】\n👤 "+pastBooking.patient_name+" 様\n📅 "+fmtDateJP(selDate)+" "+selTime+(memo?"\n💬 "+memo:"")
        })
      }).catch(function(){});
      // QR・確認メッセージ送信
      if(lineUserId&&newBookingId){
        fetch("/api/send-confirmation",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({userId:lineUserId,bookingId:newBookingId,patientName:pastBooking.patient_name,date:fmtDateJP(selDate),time:selTime})
        }).catch(function(){});
      }
    }).catch(function(){}).finally(function(){
      setDone(true); setSubmitting(false);
    });
  }

  // テスト用ワンタップ予約
  function quickTest(){
    var today=new Date();
    var d=new Date(today);
    d.setDate(d.getDate()+1);
    setSelDate(d);

    setForm({
      name:"テスト 花子",nameKana:"テスト ハナコ",phone:"090-1234-5678",

      otherClinic:"受診していない",otherClinicName:"",medicalHistory:"なし",
      wantContinue:"はい、通いたいです",howKnow:"Instagram",howKnowOther:"",
      lineNotify:!!lineUserId
    });
    setStep(3);
  }

  var H = {
    label:{display:"block",fontSize:13,fontWeight:700,color:"#444",marginBottom:6},
    input:{width:"100%",padding:"11px 12px",border:"1.5px solid #ddd",borderRadius:10,fontSize:15,boxSizing:"border-box"},
    sec:{background:"white",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"},
    secT:{fontWeight:800,fontSize:14,color:"#1e3a5f",marginBottom:12,borderBottom:"2px solid #eff6ff",paddingBottom:8},
    btn:{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",border:"none",borderRadius:10,padding:"12px 20px",fontWeight:800,cursor:"pointer",fontSize:14,width:"100%"},
    btnB:{background:"white",color:"#666",border:"1.5px solid #ddd",borderRadius:10,padding:"12px 16px",fontWeight:600,cursor:"pointer",fontSize:14}
  };

  function chip(sel, val, onClick, color){
    color = color||"#1e3a5f";
    return React.createElement("button",{
      key:val, onClick:onClick,
      style:{padding:"8px 12px",borderRadius:20,border:"1.5px solid "+(sel?color:"#ddd"),
        background:sel?color:"white",color:sel?"white":"#444",
        fontWeight:sel?700:400,cursor:"pointer",fontSize:13,whiteSpace:"nowrap",marginBottom:4}
    }, val);
  }

  // ===== 予約完了画面 =====
  if(done) return React.createElement("div",{style:{minHeight:"100vh",background:"#f0f4f8"}},
    React.createElement("div",{style:{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",padding:"18px 16px",textAlign:"center"}},
      React.createElement("div",{style:{fontSize:20,fontWeight:800,letterSpacing:2}},CLINIC_NAME)
    ),
    React.createElement("div",{style:{maxWidth:480,margin:"0 auto",padding:"32px 16px"}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:24}},
        React.createElement("div",{style:{fontSize:64,marginBottom:12}},"🎉"),
        React.createElement("div",{style:{fontSize:22,fontWeight:800,color:"#1e3a5f",marginBottom:6}},"予約が完了しました！"),
        React.createElement("div",{style:{color:"#666",fontSize:14,lineHeight:1.8}},
          "無料施術体験会のご予約ありがとうございます。",React.createElement("br"),
          "ご来院をお待ちしております🌸"
        )
      ),

      // ===== 予約情報カード =====
      React.createElement("div",{style:{background:"white",borderRadius:14,border:"2px solid #e5e7eb",overflow:"hidden",marginBottom:12}},
        React.createElement("div",{style:{background:"#1e3a5f",color:"white",padding:"12px 16px",fontSize:13,fontWeight:700}},"📅 予約情報"),
        [
          ["メニュー","🎁 無料施術体験会（60分）¥0"],
          ["日付",selDate?fmtDateJP(selDate):""],
          ["時間",selTime||""],
          ["お名前",form.name+" 様"],
          ["電話番号",form.phone],
          ["LINEリマインド",lineUserId ? "✅ 連携済み（前日送信）" : "なし"]
        ].map(function(item){
          return React.createElement("div",{key:item[0],style:{display:"flex",justifyContent:"space-between",padding:"9px 16px",borderBottom:"1px solid #f0f0f0",gap:12}},
            React.createElement("span",{style:{fontSize:12,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap",minWidth:80}},item[0]),
            React.createElement("span",{style:{fontSize:13,color:"#1e3a5f",fontWeight:600,textAlign:"right"}},item[1])
          );
        })
      ),

        React.createElement("div",{style:{background:"white",borderRadius:14,border:"2px solid #e5e7eb",overflow:"hidden",marginBottom:12}},
          React.createElement("div",{style:{background:"#1e3a5f",color:"white",padding:"12px 16px",fontSize:13,fontWeight:700}},"📅 予約情報"),
          [
            ["メニュー","🎁 無料施術体験会（60分）¥0"],
            ["日付",selDate?fmtDateJP(selDate):""],
            ["時間",selTime],
            ["お名前",form.name+" 様"],
            ["電話番号",form.phone],
            ["LINEリマインド",lineUserId ? "✅ 連携済み（前日送信）" : "なし"]
          ].map(function(item){
            return React.createElement("div",{key:item[0],style:{display:"flex",justifyContent:"space-between",padding:"9px 16px",borderBottom:"1px solid #f0f0f0",gap:12}},
              React.createElement("span",{style:{fontSize:12,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap",minWidth:70}},item[0]),
              React.createElement("span",{style:{fontSize:13,color:"#1e3a5f",fontWeight:600,textAlign:"right"}},item[1])
            );
          })
        ),
        React.createElement("div",{style:{background:"white",borderRadius:14,border:"2px solid #e5e7eb",overflow:"hidden",marginBottom:12}},
          React.createElement("div",{style:{background:"#059669",color:"white",padding:"12px 16px",fontSize:13,fontWeight:700}},"🩺 問診情報"),
          [
            ["負傷部位",form.bodyParts.join("・")],
            ["負傷原因",form.injuryCause],
            ["いつから",form.painWhen],
            ["継続意思",form.wantContinue],
            ["何で知った",form.howKnow==="その他"?"その他："+form.howKnowOther:form.howKnow]
          ].map(function(item){
            return React.createElement("div",{key:item[0],style:{display:"flex",justifyContent:"space-between",padding:"9px 16px",borderBottom:"1px solid #f0f0f0",gap:12}},
              React.createElement("span",{style:{fontSize:12,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap",minWidth:80}},item[0]),
              React.createElement("span",{style:{fontSize:13,color:"#1e3a5f",fontWeight:600,textAlign:"right"}},item[1])
            );
          })
        ),
        React.createElement("div",{style:{background:"#fef9ec",border:"1px solid #fde68a",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:13,color:"#92400e"}},
          "⚠️ キャンセル・変更は前日18時までに",React.createElement("br"),
          React.createElement("strong",null,CLINIC_TEL),"までご連絡ください。"
        ),
        React.createElement("div",{style:{display:"flex",gap:10}},
          React.createElement("button",{onClick:function(){setStep(2);},style:H.btnB},"← 戻る"),
          React.createElement("button",{onClick:submit,disabled:submitting,
            style:Object.assign({},H.btn,{flex:1,width:"auto",opacity:submitting?0.7:1,fontSize:15})},
            submitting?"送信中...":"予約を確定する ✓"
          )
        )
      ):null
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
