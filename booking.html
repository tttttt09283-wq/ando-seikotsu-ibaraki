<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>あんど整骨院 無料施術体験会 ご予約</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f4f8;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const CLINIC_NAME = "あんど整骨院";
const CLINIC_TEL = "0000-00-0000";
const SUPABASE_URL = "https://dctlirxcwitcupaewiyt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjdGxpcnhjd2l0Y3VwYWV3aXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzOTI1NTgsImV4cCI6MjA5Nzk2ODU1OH0.ym1WINmz3W7T2HWvtzWkQcKs96RB5JU1JZL7EiMz704";

const STAFF = [
  {id:1, name:"岩永 先生", specialty:"骨盤矯正・腰痛専門", color:"#2563eb", initial:"岩"},
  {id:2, name:"大皿 先生", specialty:"スポーツ外傷・肩こり専門", color:"#059669", initial:"大"},
  {id:3, name:"定井 先生", specialty:"鍼灸・自律神経専門", color:"#d97706", initial:"定"},
  {id:4, name:"細永 先生", specialty:"産後ケア・女性専門", color:"#7c3aed", initial:"細"},
];

const SLOTS = ["09:00","09:30","10:00","10:30","11:00","11:30","13:00","13:30","14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];
const DAYS_JP = ["日","月","火","水","木","金","土"];
const STEPS = ["スタッフ","日時","お客様情報","確認"];
const HOW_KNOW = ["Instagram","Facebook","Twitter/X","Google検索","チラシ・ポスター","友人・知人の紹介","その他"];

const sb = {
  async query(table, method="GET", body=null, filters="") {
    const url = `${SUPABASE_URL}/rest/v1/${table}${filters}`;
    const res = await fetch(url, {
      method,
      headers: {"apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${SUPABASE_ANON_KEY}`,"Content-Type":"application/json","Prefer":"return=representation"},
      body: body ? JSON.stringify(body) : null,
    });
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  },
  select:(table,filters="")=>sb.query(table,"GET",null,filters),
  insert:(table,data)=>sb.query(table,"POST",data),
};

function getDays(n) {
  return Array.from({length:n},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()+i+1); return d;
  });
}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtDateJP(d){return `${d.getMonth()+1}月${d.getDate()}日（${DAYS_JP[d.getDay()]}）`;}

const S = {
  label:{display:"block",fontSize:13,fontWeight:700,color:"#444",marginBottom:6},
  input:{width:"100%",padding:"11px 12px",border:"1.5px solid #ddd",borderRadius:10,fontSize:15,boxSizing:"border-box"},
  card:{width:"100%",background:"white",border:"2px solid #e5e7eb",borderRadius:12,padding:14,marginBottom:10,textAlign:"left",cursor:"pointer"},
  cardSel:{border:"2px solid #1e3a5f",background:"#eff6ff"},
  btn:{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",border:"none",borderRadius:10,padding:"12px 20px",fontWeight:800,cursor:"pointer",fontSize:14},
  btnBack:{background:"white",color:"#666",border:"1.5px solid #ddd",borderRadius:10,padding:"12px 16px",fontWeight:600,cursor:"pointer",fontSize:14},
};

function App() {
  const [step,setStep]=React.useState(0);
  const [staff,setStaff]=React.useState(null);
  const [anyStaff,setAnyStaff]=React.useState(false);
  const [selDate,setSelDate]=React.useState(null);
  const [selTime,setSelTime]=React.useState(null);
  const [takenSlots,setTakenSlots]=React.useState({});
  const [form,setForm]=React.useState({
    name:"", nameKana:"", phone:"",
    painSince:"",          // いつから痛いか
    otherClinic:"",        // 他院・病院
    medicalHistory:"",     // 既往歴
    wantContinue:"",       // 継続意思
    howKnow:"",            // 何で知ったか
    howKnowOther:"",       // その他自由記入
    lineNotify:false,
  });
  const [errors,setErrors]=React.useState({});
  const [done,setDone]=React.useState(false);
  const [submitting,setSubmitting]=React.useState(false);

  const days = getDays(14);
  const selectedStaff = STAFF.find(s=>s.id===staff);

  // スタッフごとの予約数を取得（おまかせ用）
  async function fetchAllSlots(date) {
    try {
      const data = await sb.select("bookings", `?date=eq.${fmtDate(date)}&menu=eq.無料施術体験会（60分）`);
      if (!Array.isArray(data)) return {};
      const counts = {};
      data.forEach(b => {
        const key = `${b.staff_id}_${b.time}`;
        counts[key] = (counts[key]||0) + 1;
      });
      return counts;
    } catch { return {}; }
  }

  // スタッフ指定の場合の埋まりスロット取得
  async function fetchStaffSlots(date, staffId) {
    try {
      const data = await sb.select("bookings", `?date=eq.${fmtDate(date)}&staff_id=eq.${staffId}`);
      return Array.isArray(data) ? data.map(b=>b.time) : [];
    } catch { return []; }
  }

  React.useEffect(()=>{
    if(!selDate) return;
    if(anyStaff) {
      fetchAllSlots(selDate).then(counts => setTakenSlots(counts));
    } else if(staff) {
      fetchStaffSlots(selDate, staff).then(slots => {
        const counts = {};
        slots.forEach(t => counts[`${staff}_${t}`] = 1);
        setTakenSlots(counts);
      });
    }
  },[selDate, staff, anyStaff]);

  // おまかせの場合：そのスロットで全スタッフ埋まっているか判定
  function isSlotFull(time) {
    if(!anyStaff) {
      return !!takenSlots[`${staff}_${time}`];
    }
    // 全スタッフ（4名）が埋まっているか
    const bookedCount = STAFF.filter(s => takenSlots[`${s.id}_${time}`]).length;
    return bookedCount >= STAFF.length;
  }

  // おまかせの場合：空いているスタッフを自動選択
  function getAvailableStaff(time) {
    return STAFF.find(s => !takenSlots[`${s.id}_${time}`]);
  }

  function validate(){
    const e={};
    if(!form.name.trim()) e.name="お名前を入力してください";
    if(!form.phone.trim()) e.phone="電話番号を入力してください";
    if(!form.wantContinue) e.wantContinue="ご回答をお選びください";
    if(!form.howKnow) e.howKnow="お選びください";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  async function submit(){
    if(!validate()) return;
    setSubmitting(true);
    try {
      // おまかせの場合、空いているスタッフを自動割り当て
      const assignedStaffId = anyStaff ? (getAvailableStaff(selTime)?.id || 1) : staff;
      const howKnowText = form.howKnow==="その他" ? `その他：${form.howKnowOther}` : form.howKnow;
      await sb.insert("bookings", {
        patient_name: form.name,
        phone: form.phone,
        staff_id: assignedStaffId,
        date: fmtDate(selDate),
        time: selTime,
        menu: "無料施術体験会（60分）",
        line_notify: form.lineNotify,
        reminded: false,
      });
    } catch {}
    setDone(true);
    setSubmitting(false);
  }

  function reset(){
    setStep(0); setStaff(null); setAnyStaff(false);
    setSelDate(null); setSelTime(null); setTakenSlots({});
    setForm({name:"",nameKana:"",phone:"",painSince:"",otherClinic:"",medicalHistory:"",wantContinue:"",howKnow:"",howKnowOther:"",lineNotify:false});
    setDone(false);
  }

  // 完了画面
  if(done) return (
    <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",padding:"18px 16px",textAlign:"center"}}>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:2}}>{CLINIC_NAME}</div>
      </div>
      <div style={{maxWidth:480,margin:"0 auto",padding:"40px 16px",textAlign:"center"}}>
        <div style={{fontSize:72,marginBottom:16}}>🎉</div>
        <div style={{fontSize:22,fontWeight:800,color:"#1e3a5f",marginBottom:8}}>予約が完了しました！</div>
        <div style={{color:"#666",fontSize:14,marginBottom:28,lineHeight:1.8}}>
          無料施術体験会のご予約ありがとうございます。<br/>
          ご来院をお待ちしております🌸
        </div>
        <div style={{background:"#f0f7ff",borderRadius:14,padding:20,textAlign:"left",marginBottom:24}}>
          {[
            ["メニュー","🎁 無料施術体験会（60分）¥0"],
            ["担当",anyStaff?"おまかせ（当日ご案内）":(selectedStaff?.name||"")],
            ["日時",selDate?`${fmtDateJP(selDate)} ${selTime}`:""],
            ["お名前",`${form.name} 様`],
            ["電話番号",form.phone],
          ].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #e5e7eb",gap:12}}>
              <span style={{fontSize:13,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap"}}>{l}</span>
              <span style={{fontSize:14,color:"#1e3a5f",fontWeight:600,textAlign:"right"}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:"#fef9ec",border:"1px solid #fde68a",borderRadius:10,padding:"12px 16px",marginBottom:24,fontSize:13,color:"#92400e",textAlign:"left"}}>
          🔔 キャンセル・変更は前日18時までに<br/><strong>{CLINIC_TEL}</strong>までご連絡ください。
        </div>
        <button onClick={reset} style={{...S.btn,width:"100%"}}>別の予約をする</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
      {/* ヘッダー */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#2d6a9f)",color:"white",padding:"18px 16px",textAlign:"center"}}>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:2}}>{CLINIC_NAME}</div>
        <div style={{fontSize:12,opacity:0.75,marginTop:2}}>無料施術体験会 オンライン予約</div>
      </div>

      {/* 無料バナー */}
      <div style={{background:"#fef9ec",borderBottom:"2px solid #fde68a",padding:"10px 16px",textAlign:"center"}}>
        <span style={{fontWeight:800,color:"#92400e",fontSize:14}}>🎁 無料施術体験会（60分）¥0</span>
        <span style={{fontSize:12,color:"#a16207",marginLeft:8}}>初めての方限定</span>
      </div>

      {/* ステッパー */}
      <div style={{background:"white",borderBottom:"1px solid #eee",padding:"12px 16px"}}>
        <div style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          {STEPS.map((label,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",flex:i<STEPS.length-1?1:"none"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,background:i<step?"#059669":i===step?"#1e3a5f":"#e5e7eb",color:i<=step?"white":"#9ca3af"}}>
                  {i<step?"✓":i+1}
                </div>
                <div style={{fontSize:10,marginTop:3,color:i===step?"#1e3a5f":"#9ca3af",fontWeight:i===step?700:400}}>{label}</div>
              </div>
              {i<STEPS.length-1&&<div style={{flex:1,height:2,background:i<step?"#059669":"#e5e7eb",margin:"0 4px",marginBottom:14}}/>}
            </div>
          ))}
        </div>
      </div>

      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 16px"}}>

        {/* STEP 0: スタッフ選択 */}
        {step===0&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>担当の先生を選んでください</div>
            <button onClick={()=>{setAnyStaff(true);setStaff(null);setStep(1);}}
              style={{...S.card,...(anyStaff?S.cardSel:{})}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:44,height:44,borderRadius:"50%",background:"#e5e7eb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎲</div>
                <div>
                  <div style={{fontWeight:700,color:"#1e3a5f"}}>おまかせ（空いている先生）</div>
                  <div style={{fontSize:12,color:"#666"}}>4名全員の空き枠から予約できます</div>
                </div>
              </div>
            </button>
            {STAFF.map(s=>(
              <button key={s.id} onClick={()=>{setStaff(s.id);setAnyStaff(false);setStep(1);}}
                style={{...S.card,...(staff===s.id?{border:`2px solid ${s.color}`,background:"#eff6ff"}:{})}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:"50%",background:s.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:18,fontWeight:700}}>{s.initial}</div>
                  <div>
                    <div style={{fontWeight:700,color:"#1e3a5f"}}>{s.name}</div>
                    <div style={{fontSize:12,color:"#666"}}>{s.specialty}</div>
                  </div>
                </div>
              </button>
            ))}
          </div>
        )}

        {/* STEP 1: 日時選択 */}
        {step===1&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>日時を選んでください</div>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:700,color:"#555",marginBottom:8}}>📅 日付</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                {days.slice(0,12).map((d,i)=>{
                  const isSat=d.getDay()===6,isSun=d.getDay()===0;
                  const isSel=selDate&&fmtDate(selDate)===fmtDate(d);
                  return <button key={i} onClick={()=>{setSelDate(d);setSelTime(null);}}
                    style={{padding:"8px 4px",borderRadius:8,border:isSel?"2px solid #1e3a5f":"1.5px solid #e5e7eb",background:isSel?"#1e3a5f":"white",color:isSel?"white":isSun?"#ef4444":isSat?"#3b82f6":"#333",fontWeight:isSel?700:400,cursor:"pointer",fontSize:12,lineHeight:1.5}}>
                    <div>{d.getMonth()+1}/{d.getDate()}</div>
                    <div style={{fontSize:10}}>（{DAYS_JP[d.getDay()]}）</div>
                  </button>;
                })}
              </div>
            </div>
            {selDate&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:13,fontWeight:700,color:"#555",marginBottom:8}}>🕐 時間</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {SLOTS.map(t=>{
                    const full=isSlotFull(t);
                    const isSel=selTime===t;
                    return <button key={t} disabled={full} onClick={()=>setSelTime(t)}
                      style={{padding:"9px 4px",borderRadius:8,border:isSel?"2px solid #1e3a5f":"1.5px solid #e5e7eb",background:full?"#f3f4f6":isSel?"#1e3a5f":"white",color:full?"#d1d5db":isSel?"white":"#333",cursor:full?"not-allowed":"pointer",fontSize:13,fontWeight:isSel?700:400,textDecoration:full?"line-through":"none"}}>
                      {t}
                    </button>;
                  })}
                </div>
                {anyStaff&&<div style={{fontSize:11,color:"#9ca3af",marginTop:8}}>※ ×のスロットは4名全員が満員です</div>}
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(0)} style={S.btnBack}>← 戻る</button>
              <button onClick={()=>setStep(2)} disabled={!selDate||!selTime}
                style={{...S.btn,flex:1,opacity:(!selDate||!selTime)?0.4:1}}>
                次へ →
              </button>
            </div>
          </div>
        )}

        {/* STEP 2: お客様情報 */}
        {step===2&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>お客様情報を入力してください</div>

            {/* 基本情報 */}
            <div style={{background:"white",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#1e3a5f",marginBottom:12,borderBottom:"2px solid #eff6ff",paddingBottom:8}}>👤 基本情報</div>
              {[
                {label:"お名前 *",key:"name",type:"text",placeholder:"山本 花子"},
                {label:"フリガナ",key:"nameKana",type:"text",placeholder:"ヤマモト ハナコ"},
                {label:"電話番号 *",key:"phone",type:"tel",placeholder:"090-0000-0000"},
              ].map(({label,key,type,placeholder})=>(
                <div key={key} style={{marginBottom:14}}>
                  <label style={S.label}>{label}</label>
                  <input type={type} value={form[key]} placeholder={placeholder}
                    onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
                    style={{...S.input,border:errors[key]?"2px solid #ef4444":"1.5px solid #ddd"}}/>
                  {errors[key]&&<div style={{color:"#ef4444",fontSize:12,marginTop:4}}>⚠ {errors[key]}</div>}
                </div>
              ))}
            </div>

            {/* 症状について */}
            <div style={{background:"white",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#1e3a5f",marginBottom:12,borderBottom:"2px solid #eff6ff",paddingBottom:8}}>🩺 症状について</div>

              <div style={{marginBottom:14}}>
                <label style={S.label}>いつ頃から痛みがありますか？</label>
                <input type="text" value={form.painSince} placeholder="例：3ヶ月前から、1年ほど前から"
                  onChange={e=>setForm(f=>({...f,painSince:e.target.value}))}
                  style={S.input}/>
              </div>

              <div style={{marginBottom:14}}>
                <label style={S.label}>他の整骨院・病院にかかっていますか？</label>
                <div style={{display:"flex",gap:10,marginBottom:8}}>
                  {["はい","いいえ"].map(v=>(
                    <button key={v} onClick={()=>setForm(f=>({...f,otherClinic:v}))}
                      style={{flex:1,padding:"10px",borderRadius:8,border:`1.5px solid ${form.otherClinic===v?"#1e3a5f":"#ddd"}`,background:form.otherClinic===v?"#1e3a5f":"white",color:form.otherClinic===v?"white":"#444",fontWeight:form.otherClinic===v?700:400,cursor:"pointer",fontSize:14}}>
                      {v}
                    </button>
                  ))}
                </div>
                {form.otherClinic==="はい"&&(
                  <input type="text" value={typeof form.otherClinicName==="string"?form.otherClinicName:""} placeholder="どこに通っているか教えてください"
                    onChange={e=>setForm(f=>({...f,otherClinicName:e.target.value}))}
                    style={S.input}/>
                )}
              </div>

              <div style={{marginBottom:0}}>
                <label style={S.label}>既往歴（過去の病気・手術など）</label>
                <textarea value={form.medicalHistory} placeholder="例：腰椎ヘルニア（2020年）、なければ「なし」とご記入ください"
                  rows={3} onChange={e=>setForm(f=>({...f,medicalHistory:e.target.value}))}
                  style={{...S.input,resize:"none",lineHeight:1.6}}/>
              </div>
            </div>

            {/* 継続意思 */}
            <div style={{background:"white",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#1e3a5f",marginBottom:8,borderBottom:"2px solid #eff6ff",paddingBottom:8}}>💬 今後について</div>
              <label style={{...S.label,marginTop:8}}>お体の根本改善に向けて、今回の体験会で状態が良くなりそうであれば、今後も継続して通いたいですか？ *</label>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {["はい、通いたいです","まだわかりません","いいえ"].map(v=>(
                  <button key={v} onClick={()=>setForm(f=>({...f,wantContinue:v}))}
                    style={{padding:"11px 14px",borderRadius:8,border:`1.5px solid ${form.wantContinue===v?"#1e3a5f":"#ddd"}`,background:form.wantContinue===v?"#1e3a5f":"white",color:form.wantContinue===v?"white":"#444",fontWeight:form.wantContinue===v?700:400,cursor:"pointer",fontSize:14,textAlign:"left"}}>
                    {v}
                  </button>
                ))}
              </div>
              {errors.wantContinue&&<div style={{color:"#ef4444",fontSize:12,marginTop:6}}>⚠ {errors.wantContinue}</div>}
            </div>

            {/* 何で知ったか */}
            <div style={{background:"white",borderRadius:12,padding:16,marginBottom:14,boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#1e3a5f",marginBottom:12,borderBottom:"2px solid #eff6ff",paddingBottom:8}}>📣 当院を何でお知りになりましたか？ *</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
                {HOW_KNOW.map(v=>(
                  <button key={v} onClick={()=>setForm(f=>({...f,howKnow:v}))}
                    style={{padding:"10px 8px",borderRadius:8,border:`1.5px solid ${form.howKnow===v?"#1e3a5f":"#ddd"}`,background:form.howKnow===v?"#1e3a5f":"white",color:form.howKnow===v?"white":"#444",fontWeight:form.howKnow===v?700:400,cursor:"pointer",fontSize:13}}>
                    {v}
                  </button>
                ))}
              </div>
              {form.howKnow==="その他"&&(
                <input type="text" value={form.howKnowOther} placeholder="具体的に教えてください"
                  onChange={e=>setForm(f=>({...f,howKnowOther:e.target.value}))}
                  style={{...S.input,marginTop:10}}/>
              )}
              {errors.howKnow&&<div style={{color:"#ef4444",fontSize:12,marginTop:6}}>⚠ {errors.howKnow}</div>}
            </div>

            {/* LINE通知 */}
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 14px",marginBottom:20}}>
              <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer"}}>
                <input type="checkbox" checked={form.lineNotify} onChange={e=>setForm(f=>({...f,lineNotify:e.target.checked}))} style={{marginTop:2,width:16,height:16,flexShrink:0}}/>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:"#065f46"}}>🟢 LINEでリマインドを受け取る</div>
                  <div style={{fontSize:12,color:"#059669",marginTop:2}}>前日17時に予約確認メッセージが届きます</div>
                </div>
              </label>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(1)} style={S.btnBack}>← 戻る</button>
              <button onClick={()=>{if(validate())setStep(3);}} style={{...S.btn,flex:1}}>確認画面へ →</button>
            </div>
          </div>
        )}

        {/* STEP 3: 確認 */}
        {step===3&&(
          <div>
            <div style={{fontSize:17,fontWeight:800,color:"#1e3a5f",marginBottom:16}}>予約内容を確認してください</div>
            <div style={{background:"white",borderRadius:14,border:"2px solid #e5e7eb",overflow:"hidden",marginBottom:20}}>
              <div style={{background:"#1e3a5f",color:"white",padding:"12px 16px",fontSize:13,fontWeight:700}}>📋 予約内容</div>
              {[
                ["メニュー","🎁 無料施術体験会（60分）¥0"],
                ["担当",anyStaff?"おまかせ（当日ご案内）":(selectedStaff?.name||"")],
                ["日付",selDate?fmtDateJP(selDate):""],
                ["時間",selTime],
                ["お名前",`${form.name} 様`],
                ["電話番号",form.phone],
                ["いつから",form.painSince||"未記入"],
                ["他院・病院",form.otherClinic||(form.otherClinicName?`はい（${form.otherClinicName}）`:"未記入")],
                ["既往歴",form.medicalHistory||"未記入"],
                ["継続意思",form.wantContinue],
                ["何で知った",form.howKnow==="その他"?`その他：${form.howKnowOther}`:form.howKnow],
                ["LINE通知",form.lineNotify?"あり（前日17時）":"なし"],
              ].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"9px 16px",borderBottom:"1px solid #f0f0f0",gap:12}}>
                  <span style={{fontSize:12,color:"#9ca3af",fontWeight:600,whiteSpace:"nowrap",minWidth:80}}>{l}</span>
                  <span style={{fontSize:13,color:"#1e3a5f",fontWeight:600,textAlign:"right"}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{background:"#fef9ec",border:"1px solid #fde68a",borderRadius:10,padding:"12px 14px",marginBottom:20,fontSize:13,color:"#92400e"}}>
              ⚠️ キャンセル・変更は前日18時までに<br/><strong>{CLINIC_TEL}</strong>までご連絡ください。
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep(2)} style={S.btnBack}>← 戻る</button>
              <button onClick={submit} disabled={submitting}
                style={{...S.btn,flex:1,opacity:submitting?0.7:1,fontSize:15}}>
                {submitting?"送信中...":"予約を確定する ✓"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
